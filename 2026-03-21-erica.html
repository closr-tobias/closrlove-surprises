<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>For Erica 💕</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Caveat:wght@400;500;600&family=Special+Elite&family=Inter:wght@300;400;500;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #08080e; }
  body {
    font-family: 'Inter', sans-serif;
    min-height: 100dvh;
    touch-action: none;
    user-select: none; -webkit-user-select: none;
    overflow: hidden;
    color: #fff;
  }

  .scene {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    opacity: 0; transition: opacity 1.2s ease;
    pointer-events: none; z-index: 1;
  }
  .scene.active { opacity: 1; pointer-events: auto; z-index: 10; }

  /* SCENE 1 — COUNTDOWN */
  .s1-pulse {
    position: fixed; border-radius: 50%;
    border: 1px solid rgba(255,80,120,0);
    top: 50%; left: 50%; transform: translate(-50%,-50%);
    pointer-events: none; animation: s1ring 2.2s ease-out infinite;
  }
  .s1-pulse:nth-child(2) { animation-delay: 0.6s; }
  .s1-pulse:nth-child(3) { animation-delay: 1.2s; }
  @keyframes s1ring {
    0% { width: 140px; height: 140px; border-color: rgba(255,80,120,0.15); }
    100% { width: 500px; height: 500px; border-color: rgba(255,80,120,0); }
  }
  .s1-heart { font-size: 4rem; animation: s1beat 1.1s ease-in-out infinite; filter: drop-shadow(0 0 30px rgba(255,80,120,0.3)); }
  @keyframes s1beat {
    0%,100% { transform: scale(1); } 15% { transform: scale(1.15); }
    30% { transform: scale(1); } 45% { transform: scale(1.1); }
  }
  .s1-days {
    font-family: 'Playfair Display', serif; font-size: 5rem; font-weight: 700; margin-top: 20px;
    background: linear-gradient(135deg, #ff5078, #ff8fa3);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .s1-label { font-family: 'Caveat', cursive; font-size: 1.4rem; color: rgba(255,200,210,0.5); margin-top: 8px; }
  .s1-sub { font-size: 0.6rem; color: rgba(255,255,255,0.1); margin-top: 30px; letter-spacing: 3px; text-transform: uppercase; animation: tapPulse 2.5s ease-in-out infinite; }
  @keyframes tapPulse { 0%,100% { opacity: 0.3; } 50% { opacity: 0.8; } }

  /* SCENE 2 — LOVE LETTER */
  .s2-paper {
    width: min(85vw, 380px);
    background: linear-gradient(145deg, #1a1520, #12101a);
    border: 1px solid rgba(255,255,255,0.04);
    border-radius: 2px; padding: 40px 32px;
    box-shadow: 0 20px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.03);
    position: relative;
  }
  .s2-paper::before {
    content: ''; position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(255,255,255,0.015) 28px, rgba(255,255,255,0.015) 29px);
    pointer-events: none;
  }
  .s2-greeting { font-family: 'Caveat', cursive; font-size: 1.1rem; color: rgba(255,180,120,0.6); margin-bottom: 20px; }
  .s2-body { font-family: 'Special Elite', 'Courier New', monospace; font-size: 0.85rem; line-height: 1.8; color: rgba(255,255,255,0.7); min-height: 160px; }
  .s2-cursor { display: inline-block; width: 8px; height: 16px; background: rgba(255,180,120,0.5); animation: s2blink 0.8s step-end infinite; vertical-align: text-bottom; margin-left: 2px; }
  @keyframes s2blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
  .s2-sign { font-family: 'Caveat', cursive; font-size: 1.3rem; color: rgba(255,140,160,0.5); margin-top: 24px; opacity: 0; transition: opacity 1s ease; }

  /* SCENE 3 — LANTERN RELEASE */
  .s3-canvas { position: fixed; inset: 0; width: 100%; height: 100%; }
  .s3-prompt { position: fixed; bottom: 60px; left: 0; right: 0; text-align: center; font-family: 'Caveat', cursive; font-size: 1.25rem; color: rgba(255,220,180,0.45); z-index: 20; transition: opacity 1.5s ease; }
  .s3-message { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); font-family: 'Playfair Display', serif; font-size: 1.4rem; font-style: italic; color: rgba(255,220,180,0); text-align: center; width: 80%; transition: color 3s ease; z-index: 20; line-height: 1.6; }

  /* SCENE 4 — SCRATCH REVEAL */
  .s4-canvas { border-radius: 12px; touch-action: none; }
  .s4-hint { font-family: 'Caveat', cursive; font-size: 1.1rem; color: rgba(255,255,255,0.25); margin-top: 20px; animation: s4float 3s ease-in-out infinite; }
  @keyframes s4float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  .s4-revealed {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700; text-align: center; width: 80%; line-height: 1.4;
    background: linear-gradient(135deg, #ff5078, #ffb347); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    opacity: 0; transition: opacity 1.5s ease;
  }

  /* SCENE 5 — FINALE */
  .s5-title {
    font-family: 'Playfair Display', serif; font-size: 2.4rem; font-weight: 700; text-align: center;
    background: linear-gradient(135deg, #ff5078, #ffb347, #ff5078); background-size: 200% 200%;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    animation: s5shimmer 3s ease-in-out infinite;
  }
  @keyframes s5shimmer { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
  .s5-sub { font-family: 'Caveat', cursive; font-size: 1.5rem; color: rgba(255,200,210,0.5); margin-top: 16px; text-align: center; }
  .s5-hearts { position: fixed; inset: 0; pointer-events: none; z-index: 5; overflow: hidden; }

  /* NAV */
  .nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 100; }
  .nav-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.15); transition: all 0.4s ease; cursor: pointer; }
  .nav-dot.active { background: rgba(255,80,120,0.6); box-shadow: 0 0 10px rgba(255,80,120,0.3); transform: scale(1.3); }
</style>
</head>
<body>

<div class="scene active" id="scene1">
  <div class="s1-pulse"></div><div class="s1-pulse"></div><div class="s1-pulse"></div>
  <div class="s1-heart">❤️</div>
  <div class="s1-days" id="s1-days">19</div>
  <div class="s1-label">days until I hold you again</div>
  <div class="s1-sub">tap to continue</div>
</div>

<div class="scene" id="scene2">
  <div class="s2-paper">
    <div class="s2-greeting">My Erica,</div>
    <div class="s2-body" id="s2-text"></div>
    <div class="s2-sign" id="s2-sign">Forever yours, Tobias ❤️</div>
  </div>
</div>

<div class="scene" id="scene3">
  <canvas class="s3-canvas" id="s3-canvas"></canvas>
  <div class="s3-prompt" id="s3-prompt">hold anywhere to release a lantern</div>
  <div class="s3-message" id="s3-msg">Every lantern carries<br>a piece of my heart<br>across the ocean to you</div>
</div>

<div class="scene" id="scene4">
  <div style="position:relative;">
    <canvas class="s4-canvas" id="s4-canvas" width="300" height="300"></canvas>
    <div class="s4-revealed" id="s4-revealed">You are my<br>favorite person<br>in the universe 🌌</div>
  </div>
  <div class="s4-hint">scratch to reveal ✨</div>
</div>

<div class="scene" id="scene5">
  <div class="s5-hearts" id="s5-hearts"></div>
  <div class="s5-title">I Love You<br>Erica</div>
  <div class="s5-sub" id="s5-sub">19 more days, baby 💕</div>
</div>

<div class="nav" id="nav">
  <div class="nav-dot active" data-scene="0"></div>
  <div class="nav-dot" data-scene="1"></div>
  <div class="nav-dot" data-scene="2"></div>
  <div class="nav-dot" data-scene="3"></div>
  <div class="nav-dot" data-scene="4"></div>
</div>

<script>
const target = new Date('2026-04-09T00:00:00-07:00');
const days = Math.ceil((target - new Date()) / (1000*60*60*24));
document.getElementById('s1-days').textContent = days;
document.getElementById('s5-sub').textContent = days + ' more days, baby 💕';

const scenes = document.querySelectorAll('.scene');
const dots = document.querySelectorAll('.nav-dot');
let current = 0, transitioning = false;
const sceneInits = [null, initScene2, initScene3, initScene4, initScene5];
const initted = new Set();

function goTo(idx) {
  if (idx === current || idx < 0 || idx >= scenes.length || transitioning) return;
  transitioning = true;
  scenes[current].classList.remove('active');
  dots[current].classList.remove('active');
  current = idx;
  scenes[current].classList.add('active');
  dots[current].classList.add('active');
  if (sceneInits[current] && !initted.has(current)) { initted.add(current); sceneInits[current](); }
  setTimeout(() => transitioning = false, 600);
}

document.addEventListener('click', (e) => {
  if (e.target.closest('.nav-dot')) { goTo(parseInt(e.target.dataset.scene)); return; }
  if (current === 2 || current === 3) return;
  goTo(current + 1);
});

function initScene2() {
  const lines = [
    "I just wanted you to know that every single day, even when we're 9 hours apart, you make my world brighter.",
    "",
    "The way you laugh, the way you care about everything so deeply, the way you look at me like I'm someone worth looking at... I carry all of that with me.",
    "",
    "I can't wait to see your face again. " + days + " more sleeps.",
    "",
    "You're my favorite human on this whole planet."
  ];
  const text = lines.join('\n');
  const el = document.getElementById('s2-text');
  const sign = document.getElementById('s2-sign');
  let i = 0;
  function type() {
    if (i < text.length) {
      if (text[i] === '\n') { el.innerHTML = el.innerHTML.replace(/<span class="s2-cursor"><\/span>/,'') + '<br><span class="s2-cursor"></span>'; }
      else { el.innerHTML = el.innerHTML.replace(/<span class="s2-cursor"><\/span>/,'') + text[i] + '<span class="s2-cursor"></span>'; }
      i++;
      setTimeout(type, 22 + Math.random() * 30);
    } else {
      el.innerHTML = el.innerHTML.replace(/<span class="s2-cursor"><\/span>/,'');
      sign.style.opacity = '1';
    }
  }
  type();
}

function initScene3() {
  const canvas = document.getElementById('s3-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const lanterns = [], stars = [];
  let lanternCount = 0, holding = false, holdTimer = null;

  for (let i = 0; i < 80; i++) stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height*0.7, r: Math.random()*1.5+0.3, a: Math.random()*0.5+0.1, tw: Math.random()*Math.PI*2 });

  function createLantern(x, y) {
    lanterns.push({ x, y, vy: -0.8-Math.random()*0.5, vx: (Math.random()-0.5)*0.3, size: 24+Math.random()*12, glow: 0.3+Math.random()*0.3, fl: Math.random()*Math.PI*2 });
    lanternCount++;
    if (lanternCount >= 3) { document.getElementById('s3-prompt').style.opacity = '0'; setTimeout(() => { document.getElementById('s3-msg').style.color = 'rgba(255,220,180,0.7)'; }, 1500); }
    if (lanternCount >= 6) setTimeout(() => goTo(3), 3000);
  }

  function animate() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const sky = ctx.createLinearGradient(0,0,0,canvas.height);
    sky.addColorStop(0,'#050510'); sky.addColorStop(0.6,'#0a0a20'); sky.addColorStop(1,'#12101a');
    ctx.fillStyle = sky; ctx.fillRect(0,0,canvas.width,canvas.height);
    const t = Date.now()*0.001;
    stars.forEach(s => { ctx.fillStyle = `rgba(255,255,255,${s.a+Math.sin(t+s.tw)*0.15})`; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill(); });
    lanterns.forEach(l => {
      l.y += l.vy; l.x += l.vx+Math.sin(t+l.fl)*0.15; l.fl += 0.03;
      const fl = Math.sin(l.fl)*0.05;
      const g = ctx.createRadialGradient(l.x,l.y,0,l.x,l.y,l.size*2);
      g.addColorStop(0,`rgba(255,180,80,${(l.glow+fl)*0.3})`); g.addColorStop(1,'rgba(255,180,80,0)');
      ctx.fillStyle = g; ctx.fillRect(l.x-l.size*2,l.y-l.size*2,l.size*4,l.size*4);
      ctx.fillStyle = `rgba(255,200,120,${l.glow+fl})`; ctx.beginPath(); ctx.ellipse(l.x,l.y,l.size*0.5,l.size*0.65,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = `rgba(255,240,200,${l.glow+fl+0.15})`; ctx.beginPath(); ctx.ellipse(l.x,l.y+l.size*0.1,3,5,0,0,Math.PI*2); ctx.fill();
    });
    requestAnimationFrame(animate);
  }
  animate();

  const start = (e) => { e.preventDefault(); holding = true; const p = e.touches?e.touches[0]:e; holdTimer = setTimeout(() => { if(holding) createLantern(p.clientX,p.clientY); }, 400); };
  const end = () => { holding = false; clearTimeout(holdTimer); };
  canvas.addEventListener('touchstart', start, {passive:false}); canvas.addEventListener('mousedown', start);
  canvas.addEventListener('touchend', end); canvas.addEventListener('mouseup', end);
}

function initScene4() {
  const canvas = document.getElementById('s4-canvas');
  const ctx = canvas.getContext('2d');
  const grad = ctx.createLinearGradient(0,0,300,300);
  grad.addColorStop(0,'#8a8a9a'); grad.addColorStop(0.5,'#b0b0c0'); grad.addColorStop(1,'#8a8a9a');
  ctx.fillStyle = grad; ctx.fillRect(0,0,300,300);
  for (let i=0;i<200;i++) { ctx.fillStyle=`rgba(255,255,255,${Math.random()*0.15})`; ctx.fillRect(Math.random()*300,Math.random()*300,1,1); }
  ctx.fillStyle='rgba(255,255,255,0.15)'; ctx.font='14px Inter'; ctx.textAlign='center'; ctx.fillText('✨ scratch here ✨',150,155);
  ctx.globalCompositeOperation='destination-out';
  let scratched=0, drawing=false;
  function scratch(x,y) {
    ctx.beginPath(); ctx.arc(x,y,22,0,Math.PI*2); ctx.fill();
    scratched+=Math.PI*22*22;
    if(scratched/(300*300)>0.35) document.getElementById('s4-revealed').style.opacity='1';
    if(scratched/(300*300)>0.55) setTimeout(()=>goTo(4),2000);
  }
  const pos=(e)=>{ const r=canvas.getBoundingClientRect(),p=e.touches?e.touches[0]:e; return{x:p.clientX-r.left,y:p.clientY-r.top}; };
  canvas.addEventListener('mousedown',(e)=>{drawing=true;const p=pos(e);scratch(p.x,p.y);});
  canvas.addEventListener('mousemove',(e)=>{if(drawing){const p=pos(e);scratch(p.x,p.y);}});
  canvas.addEventListener('mouseup',()=>drawing=false);
  canvas.addEventListener('touchstart',(e)=>{e.preventDefault();e.stopPropagation();drawing=true;const p=pos(e);scratch(p.x,p.y);},{passive:false});
  canvas.addEventListener('touchmove',(e)=>{e.preventDefault();e.stopPropagation();if(drawing){const p=pos(e);scratch(p.x,p.y);}},{passive:false});
  canvas.addEventListener('touchend',(e)=>{e.stopPropagation();drawing=false;});
}

function initScene5() {
  const container=document.getElementById('s5-hearts');
  const style=document.createElement('style');
  style.textContent=`@keyframes floatUp{0%{transform:translateY(0) rotate(0);opacity:0.7;}100%{transform:translateY(-100vh) rotate(30deg);opacity:0;}}`;
  document.head.appendChild(style);
  setInterval(()=>{
    const h=document.createElement('div');
    h.textContent=['❤️','💕','💗','💖','✨'][Math.floor(Math.random()*5)];
    h.style.cssText=`position:absolute;font-size:${14+Math.random()*20}px;left:${Math.random()*100}%;bottom:-20px;opacity:0.7;animation:floatUp ${4+Math.random()*4}s ease-out forwards;pointer-events:none;`;
    container.appendChild(h);
    setTimeout(()=>h.remove(),8000);
  },300);
}
</script>
</body>
</html>
