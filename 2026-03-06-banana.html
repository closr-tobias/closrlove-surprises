<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🍌</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a0a14;
    color: #fff;
    font-family: 'Inter', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }

  .hint {
    position: fixed;
    top: 12%;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.85rem;
    color: rgba(255,255,255,0.4);
    font-style: italic;
    transition: opacity 0.5s;
    z-index: 5;
  }

  .quote {
    position: fixed;
    top: 6%;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.2rem, 4vw, 1.8rem);
    font-style: italic;
    color: #ff69b4;
    text-align: center;
    text-shadow: 0 0 20px rgba(255,105,180,0.5);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    max-width: 80%;
    z-index: 10;
  }
  .quote.show { opacity: 1; }

  .floating-quote {
    position: fixed;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    color: rgba(255,105,180,0.6);
    text-shadow: 0 0 10px rgba(255,105,180,0.3);
    pointer-events: none;
    z-index: 8;
    animation: floatQuote 2.5s ease-out forwards;
    white-space: nowrap;
    font-size: clamp(1.2rem, 4vw, 1.8rem);
    font-weight: 700;
  }

  @keyframes floatQuote {
    0% { opacity: 0; transform: scale(0.5); }
    20% { opacity: 0.7; transform: scale(1); }
    80% { opacity: 0.5; }
    100% { opacity: 0; transform: translateY(-30px) scale(0.8); }
  }

  .banana-wrapper {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 8vh;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  /* SVG banana flesh container */
  .banana-flesh {
    width: 70px;
    height: 0px;
    overflow: hidden;
    z-index: 1;
    margin-bottom: -22px;
    transition: height 0.12s ease, width 0.12s ease;
    filter: drop-shadow(0 0 12px rgba(247,213,53,0.3));
    position: relative;
  }

  .banana-flesh svg {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }

  .banana-flesh.throbbing {
    animation: throb 0.3s ease infinite;
  }

  .banana-peel {
    width: 180px;
    height: auto;
    z-index: 3;
    position: relative;
    filter: drop-shadow(0 0 12px rgba(255,200,0,0.25));
    pointer-events: none;
  }

  .sweat {
    position: fixed;
    font-size: 1rem;
    animation: sweatDrop 1s ease-in forwards;
    pointer-events: none;
    z-index: 15;
  }

  @keyframes throb {
    0%, 100% { transform: scaleX(1); }
    50% { transform: scaleX(1.06); }
  }

  @keyframes sweatDrop {
    0% { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(50px); }
  }

  .explosion-particle {
    position: fixed; pointer-events: none; z-index: 101;
    animation: explodeOut 2s ease-out forwards;
  }
  .explosion-text {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 8vw, 4rem); font-weight: 700;
    color: #ff69b4; text-shadow: 0 0 40px rgba(255,105,180,0.8);
    z-index: 102; text-align: center;
    animation: explosionPulse 0.5s ease infinite;
  }
  .love-rain {
    position: fixed; z-index: 100;
    animation: loveRain linear forwards; pointer-events: none;
  }
  .splurt {
    position: fixed; font-size: 1.5rem; pointer-events: none; z-index: 101;
    animation: splurtUp 1.5s ease-out forwards;
  }

  @keyframes explodeOut {
    0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    100% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(0.3); opacity: 0; }
  }
  @keyframes explosionPulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); }
    50% { transform: translate(-50%, -50%) scale(1.1); }
  }
  @keyframes loveRain {
    0% { transform: translateY(-20px); opacity: 1; }
    100% { transform: translateY(110vh); opacity: 0.5; }
  }
  @keyframes splurtUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    30% { opacity: 1; transform: translateY(-100px) scale(1.3); }
    100% { opacity: 0; transform: translateY(-250px) scale(0.5); }
  }
</style>
</head>

      h.style.animationDuration = (2+Math.random()*3)+'s';
      document.body.appendChild(h);
      setTimeout(() => h.remove(), 5000);
      if (++rc > 200) clearInterval(ri);
    }, 50);
  }

  bananaArea.addEventListener('touchstart', (e) => { e.preventDefault(); startHold(); });
  bananaArea.addEventListener('touchend', stopHold);
  bananaArea.addEventListener('touchcancel', stopHold);
  bananaArea.addEventListener('mousedown', startHold);
  document.addEventListener('mouseup', stopHold);
</script>
</body>
