<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Closr — Surprise Building Blocks</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }
  .header {
    text-align: center;
    padding: 60px 20px 40px;
    background: linear-gradient(180deg, #1a0a20, #0a0a0f);
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3rem);
    background: linear-gradient(135deg, #ff69b4, #7aafcc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 10px;
  }
  .header p { color: #888; font-size: 0.9rem; }
  .count { color: #ff69b4; font-weight: 600; }
  .blocks-grid {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 24px;
  }
  .block-card {
    background: #141420;
    border: 1px solid #2a2a3a;
    border-radius: 16px;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
  }
  .block-card:hover {
    transform: translateY(-4px);
    border-color: #ff69b4;
  }
  .block-preview {
    width: 100%;
    height: 300px;
    position: relative;
    overflow: hidden;
    background: #0a0a12;
  }
  .block-info {
    padding: 16px 20px;
    border-top: 1px solid #2a2a3a;
  }
  .block-info h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: #ff69b4;
    margin-bottom: 6px;
  }
  .block-info p { font-size: 0.8rem; color: #888; line-height: 1.5; }
  .block-info .date { font-size: 0.7rem; color: #555; margin-top: 8px; }
</style>
</head>
<body>

<div class="header">
  <h1>Surprise Building Blocks</h1>
  <p>Interactive components for Closr surprises — <span class="count" id="count">0</span> blocks and counting</p>
</div>

<div class="blocks-grid" id="blocks">
<!-- BLOCKS_START -->
<!-- BLOCK: Heartbeat Sync -->
<div class="block-card">
  <div class="block-preview" id="heartbeat-sync">
    <canvas id="hb-canvas" style="width:100%;height:100%;display:block;"></canvas>
    <style>
      #heartbeat-sync { cursor: pointer; user-select: none; }
      #heartbeat-sync .hb-label {
        position: absolute; bottom: 14px; left: 0; right: 0;
        text-align: center; font-size: 0.75rem; color: #ff69b488;
        pointer-events: none; font-family: Inter, sans-serif;
      }
    </style>
    <div class="hb-label">tap to sync your heartbeat</div>
  </div>
  <div class="block-info">
    <h3>💓 Heartbeat Sync</h3>
    <p>Tap rhythmically to set your heartbeat. A glowing heart pulses to your rhythm with a live EKG trace. Two lovers, one pulse.</p>
    <div class="date">March 7, 2026</div>
  </div>
</div>
<script>
(function(){
  var wrap = document.getElementById('heartbeat-sync');
  var c = document.getElementById('hb-canvas');
  var ctx = c.getContext('2d');
  var W, H, taps = [], bpm = 72, phase = 0, traceX = 0;
  function resize() { var r = wrap.getBoundingClientRect(); W = c.width = Math.round(r.width * 2); H = c.height = Math.round(r.height * 2); traceX = 0; }
  resize(); window.addEventListener('resize', resize);
  wrap.addEventListener('click', function() {
    var now = Date.now(); taps.push(now);
    if (taps.length > 8) taps.shift();
    if (taps.length >= 3) {
      var intervals = [];
      for (var i = 1; i < taps.length; i++) intervals.push(taps[i] - taps[i-1]);
      var avg = intervals.reduce(function(a,b){return a+b},0) / intervals.length;
      bpm = Math.min(180, Math.max(40, 60000 / avg));
    }
  });
  function ekgY(t) {
    t = t % 1;
    if (t < 0.1) return 0;
    if (t < 0.15) return Math.sin((t-0.1)*Math.PI/0.05) * 0.15;
    if (t < 0.2) return 0;
    if (t < 0.25) return -0.12;
    if (t < 0.3) return 0.85;
    if (t < 0.35) return -0.25;
    if (t < 0.4) return 0;
    if (t < 0.5) return Math.sin((t-0.4)*Math.PI/0.1) * 0.08;
    return 0;
  }
  function drawHeart(cx, cy, size, alpha) {
    ctx.save(); ctx.translate(cx, cy); ctx.scale(size, size);
    ctx.beginPath(); ctx.moveTo(0, -0.3);
    ctx.bezierCurveTo(-0.5, -0.8, -1, -0.2, 0, 0.6);
    ctx.moveTo(0, -0.3);
    ctx.bezierCurveTo(0.5, -0.8, 1, -0.2, 0, 0.6);
    ctx.fillStyle = 'rgba(255,105,180,' + alpha + ')';
    ctx.shadowColor = '#ff69b4'; ctx.shadowBlur = size * 0.6;
    ctx.fill(); ctx.restore();
  }
  var last = performance.now();
  function frame(ts) {
    var dt = (ts - last) / 1000; last = ts;
    phase += dt * (bpm / 60);
    ctx.fillStyle = 'rgba(10,10,18,0.15)'; ctx.fillRect(0, 0, W, H);
    var beat = phase % 1;
    var pulse = beat < 0.15 ? 1 + 0.3 * Math.sin(beat / 0.15 * Math.PI) : 1;
    var heartAlpha = beat < 0.15 ? 0.9 : 0.45;
    drawHeart(W/2, H*0.38, 50 * pulse, heartAlpha);
    ctx.font = '600 22px Inter, sans-serif'; ctx.fillStyle = '#ff69b466'; ctx.textAlign = 'center';
    ctx.shadowBlur = 0; ctx.fillText(Math.round(bpm) + ' BPM', W/2, H*0.12);
    var speed = W * 0.4;
    traceX += dt * speed;
    if (traceX > W) traceX = 0;
    var baseY = H * 0.75, amp = H * 0.12;
    var ekg = ekgY(phase % 1);
    var x = traceX, y = baseY - ekg * amp;
    ctx.beginPath(); ctx.arc(x, y, 2, 0, Math.PI*2);
    ctx.fillStyle = '#ff69b4'; ctx.shadowColor = '#ff69b4'; ctx.shadowBlur = 8; ctx.fill();
    ctx.fillStyle = '#0a0a12'; ctx.shadowBlur = 0;
    ctx.fillRect(x + 4, H*0.6, 40, H*0.3);
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
<\/script>

<!-- BLOCKS_END -->
</div>

<script>
  document.getElementById('count').textContent = document.querySelectorAll('.block-card').length;
</script>
</body>
</html>
