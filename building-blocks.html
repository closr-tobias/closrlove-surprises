<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Closr — Surprise Building Blocks</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }
  .header {
    text-align: center;
    padding: 60px 20px 40px;
    background: linear-gradient(180deg, #1a0a20, #0a0a0f);
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3rem);
    background: linear-gradient(135deg, #ff69b4, #7aafcc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 10px;
  }
  .header p { color: #888; font-size: 0.9rem; }
  .count { color: #ff69b4; font-weight: 600; }
  .blocks-grid {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 24px;
  }
  .block-card {
    background: #141420;
    border: 1px solid #2a2a3a;
    border-radius: 16px;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
  }
  .block-card:hover {
    transform: translateY(-4px);
    border-color: #ff69b4;
  }
  .block-preview {
    width: 100%;
    height: 300px;
    position: relative;
    overflow: hidden;
    background: #0a0a12;
  }
  .block-info {
    padding: 16px 20px;
    border-top: 1px solid #2a2a3a;
  }
  .block-info h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: #ff69b4;
    margin-bottom: 6px;
  }
  .block-info p { font-size: 0.8rem; color: #888; line-height: 1.5; }
  .block-info .date { font-size: 0.7rem; color: #555; margin-top: 8px; }
</style>
</head>
<body>

<div class="header">
  <h1>Surprise Building Blocks</h1>
  <p>Interactive components for Closr surprises — <span class="count" id="count">0</span> blocks and counting</p>
</div>

<div class="blocks-grid" id="blocks">
<!-- BLOCKS_START -->
<!-- BLOCKS_END -->
</div>

<script>
  document.getElementById('count').textContent = document.querySelectorAll('.block-card').length;
</script>
</body>
</html>
