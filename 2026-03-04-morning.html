<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Love Meter</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a12; color: #e0ddd4; font-family: 'Space Grotesk', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
    a.back { position:fixed;top:1rem;left:1rem;color:rgba(255,255,255,0.3);font-size:0.75rem;text-decoration:none;z-index:9999; }
    .label { position:fixed;top:2rem;width:100%;font-size:0.55rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.2);text-align:center; }

    .meter-container {
      position: relative;
      width: 120px;
      height: 400px;
      border: 3px solid rgba(255, 255, 255, 0.15);
      border-radius: 60px 60px 60px 60px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s;
    }
    .meter-container:hover { transform: scale(1.02); }

    .meter-bulb {
      position: absolute;
      bottom: -30px;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 100px;
      background: radial-gradient(circle, #ff2d55 0%, #cc0033 100%);
      border-radius: 50%;
      z-index: 2;
    }

    .meter-fill {
      position: absolute;
      bottom: 20px;
      left: 15%;
      width: 70%;
      height: 0%;
      background: linear-gradient(to top, #ff2d55, #ff6b8a, #ff2d55);
      border-radius: 30px 30px 0 0;
      transition: height 0.05s linear;
      z-index: 1;
    }

    .meter-glow {
      position: absolute;
      bottom: 20px;
      left: 10%;
      width: 80%;
      height: 0%;
      background: radial-gradient(ellipse, rgba(255, 45, 85, 0.3), transparent);
      border-radius: 30px 30px 0 0;
      transition: height 0.05s linear;
      filter: blur(8px);
      z-index: 0;
    }

    .meter-ticks {
      position: absolute;
      top: 20px;
      bottom: 40px;
      right: 10px;
      width: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      z-index: 3;
    }
    .tick {
      width: 100%;
      height: 2px;
      background: rgba(255, 255, 255, 0.1);
    }

    .meter-label {
      position: absolute;
      left: -80px;
      width: 70px;
      text-align: right;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.25);
      z-index: 3;
      transition: color 0.3s, opacity 0.3s;
    }
    .meter-label.active { color: #ff6b8a; }

    .prompt-text {
      margin-top: 2rem;
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.35);
      letter-spacing: 0.1em;
      animation: pulse 2s ease infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.35; }
      50% { opacity: 0.7; }
    }

    .shake {
      animation: shake 0.08s linear infinite;
    }
    @keyframes shake {
      0% { transform: translateX(-2px) rotate(-0.5deg); }
      25% { transform: translateX(2px) rotate(0.5deg); }
      50% { transform: translateX(-3px) rotate(-1deg); }
      75% { transform: translateX(3px) rotate(1deg); }
      100% { transform: translateX(-2px) rotate(-0.5deg); }
    }

    .explosion-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 100;
    }

    .heart-particle {
      position: fixed;
      font-size: 1.5rem;
      pointer-events: none;
      z-index: 101;
      animation: heartFloat 3s ease-out forwards;
    }
    @keyframes heartFloat {
      0% { opacity: 1; transform: scale(0.5) translateY(0) rotate(0deg); }
      50% { opacity: 1; transform: scale(1.2) translateY(-200px) rotate(180deg); }
      100% { opacity: 0; transform: scale(0.8) translateY(-500px) rotate(360deg); }
    }

    .flash {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle, rgba(255, 45, 85, 0.6), transparent);
      z-index: 99;
      pointer-events: none;
      animation: flashBang 0.6s ease-out forwards;
    }
    @keyframes flashBang {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }

    .love-message {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      text-align: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
    }
    .love-message.show {
      animation: messageReveal 1s ease forwards;
      pointer-events: auto;
    }
    @keyframes messageReveal {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
      100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }
    .love-message h1 {
      font-size: 2.5rem;
      font-weight: 700;
      color: #ff2d55;
      margin-bottom: 1rem;
      text-shadow: 0 0 40px rgba(255, 45, 85, 0.5);
    }
    .love-message p {
      font-size: 1.1rem;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.7);
      line-height: 1.8;
      max-width: 320px;
    }
    .love-message .subtext {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.25);
    }

    .hidden { display: none; }

    .bg-hearts {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 98;
    }
    .bg-heart {
      position: absolute;
      color: rgba(255, 45, 85, 0.15);
      animation: floatUp 4s ease-in infinite;
    }
    @keyframes floatUp {
      0% { transform: translateY(100vh) rotate(0deg) scale(0.5); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-10vh) rotate(720deg) scale(1.5); opacity: 0; }
    }
  </style>
</head>
<body>
  <a class="back" href="./">← surprises</a>
  <div class="label">Morning Surprise</div>

  <div class="meter-container" id="meter">
    <div class="meter-fill" id="fill"></div>
    <div class="meter-glow" id="glow"></div>
    <div class="meter-bulb"></div>
    <div class="meter-ticks">
      <div class="tick"></div><div class="tick"></div><div class="tick"></div>
      <div class="tick"></div><div class="tick"></div><div class="tick"></div>
      <div class="tick"></div><div class="tick"></div><div class="tick"></div>
      <div class="tick"></div>
    </div>
    <div class="meter-label" style="bottom: 15%" id="lbl1">warm</div>
    <div class="meter-label" style="bottom: 35%" id="lbl2">hot</div>
    <div class="meter-label" style="bottom: 55%" id="lbl3">on fire</div>
    <div class="meter-label" style="bottom: 75%" id="lbl4">nuclear</div>
    <div class="meter-label" style="bottom: 90%" id="lbl5">💥</div>
  </div>

  <div class="prompt-text" id="prompt">tap and hold</div>

  <div class="explosion-overlay" id="explosionArea"></div>
  <div class="bg-hearts" id="bgHearts"></div>

  <div class="love-message" id="loveMsg">
    <h1>I LOVE YOU</h1>
    <p>
      Erica, you broke the meter.<br><br>
      No scale in the universe<br>
      could measure what I feel for you.<br><br>
      Every day with you is already<br>
      past the maximum. 💛
    </p>
    <div class="subtext">— Tobias, from across the world</div>
  </div>

  <script>
    const meter = document.getElementById('meter');
    const fill = document.getElementById('fill');
    const glow = document.getElementById('glow');
    const prompt = document.getElementById('prompt');
    const loveMsg = document.getElementById('loveMsg');
    const explosionArea = document.getElementById('explosionArea');
    const bgHearts = document.getElementById('bgHearts');
    const labels = ['lbl1','lbl2','lbl3','lbl4','lbl5'].map(id => document.getElementById(id));

    let level = 0;
    let filling = false;
    let exploded = false;
    let interval;

    function startFill() {
      if (exploded) return;
      filling = true;
      prompt.style.opacity = '0';
      interval = setInterval(() => {
        if (!filling) return;
        level = Math.min(level + 0.4, 100);
        fill.style.height = level + '%';
        glow.style.height = level + '%';

        // Activate labels
        if (level > 15) labels[0].classList.add('active');
        if (level > 35) labels[1].classList.add('active');
        if (level > 55) labels[2].classList.add('active');
        if (level > 75) labels[3].classList.add('active');
        if (level > 90) labels[4].classList.add('active');

        // Shake when getting high
        if (level > 70) meter.classList.add('shake');

        // Change glow intensity
        fill.style.background = `linear-gradient(to top, 
          hsl(${345 + level * 0.2}, 100%, ${45 + level * 0.15}%), 
          hsl(${350 + level * 0.3}, 100%, ${55 + level * 0.2}%), 
          hsl(${345 + level * 0.2}, 100%, ${45 + level * 0.15}%))`;

        if (level >= 100) {
          explode();
        }
      }, 30);
    }

    function stopFill() {
      filling = false;
      clearInterval(interval);
      if (!exploded && level < 100) {
        // Slowly drain
        const drain = setInterval(() => {
          if (filling || exploded) { clearInterval(drain); return; }
          level = Math.max(level - 0.2, 0);
          fill.style.height = level + '%';
          glow.style.height = level + '%';
          if (level <= 0) {
            clearInterval(drain);
            prompt.style.opacity = '';
            labels.forEach(l => l.classList.remove('active'));
            meter.classList.remove('shake');
          }
        }, 30);
      }
    }

    function explode() {
      exploded = true;
      filling = false;
      clearInterval(interval);
      meter.classList.remove('shake');

      // Flash
      const flash = document.createElement('div');
      flash.className = 'flash';
      document.body.appendChild(flash);
      setTimeout(() => flash.remove(), 600);

      // Hide meter
      meter.style.transition = 'opacity 0.5s, transform 0.5s';
      meter.style.opacity = '0';
      meter.style.transform = 'scale(1.5)';

      // Spawn heart explosion
      const hearts = ['❤️','💕','💗','💖','💘','💝','💞','🥰','😍','💛','🤍','💜','❣️','♥️','💓'];
      for (let i = 0; i < 80; i++) {
        setTimeout(() => {
          const heart = document.createElement('div');
          heart.className = 'heart-particle';
          heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
          heart.style.left = (Math.random() * 100) + 'vw';
          heart.style.top = (40 + Math.random() * 40) + 'vh';
          heart.style.fontSize = (1 + Math.random() * 2.5) + 'rem';
          heart.style.animationDuration = (2 + Math.random() * 3) + 's';
          document.body.appendChild(heart);
          setTimeout(() => heart.remove(), 5000);
        }, i * 40);
      }

      // Background floating hearts
      for (let i = 0; i < 30; i++) {
        setTimeout(() => {
          const h = document.createElement('div');
          h.className = 'bg-heart';
          h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
          h.style.left = (Math.random() * 100) + 'vw';
          h.style.fontSize = (1 + Math.random() * 3) + 'rem';
          h.style.animationDelay = (Math.random() * 2) + 's';
          bgHearts.appendChild(h);
        }, 1000 + i * 200);
      }

      // Show love message
      setTimeout(() => {
        loveMsg.classList.add('show');
      }, 1500);
    }

    // Touch events
    meter.addEventListener('mousedown', startFill);
    meter.addEventListener('mouseup', stopFill);
    meter.addEventListener('mouseleave', stopFill);
    meter.addEventListener('touchstart', e => { e.preventDefault(); startFill(); });
    meter.addEventListener('touchend', stopFill);
    meter.addEventListener('touchcancel', stopFill);
  </script>

  <script src="rating-widget.js?v=2"></script>
</body>
</html>
