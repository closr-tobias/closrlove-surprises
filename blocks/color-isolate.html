<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Color Isolate — Closr Building Block</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden}
  body{
    background:#08080e;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-family:'Inter',sans-serif;
    min-height:100dvh;
    touch-action:none;user-select:none;-webkit-user-select:none;
    overflow:hidden;
  }
  .back-link{position:fixed;top:14px;left:14px;font-size:.65rem;color:#ffffff12;text-decoration:none;z-index:200}
  .block-label{position:fixed;top:14px;right:14px;font-size:.5rem;color:#ffffff0a;letter-spacing:1px;z-index:200}
  .ambient{
    position:fixed;width:100%;height:100%;
    background:radial-gradient(ellipse at 50% 40%,rgba(180,60,60,.03) 0%,transparent 60%);
    pointer-events:none;
  }
  .particle{
    position:fixed;width:2px;height:2px;
    background:rgba(255,255,255,.04);border-radius:50%;
    pointer-events:none;animation:floatUp linear infinite;
  }
  @keyframes floatUp{
    0%{transform:translateY(0) translateX(0);opacity:0}
    10%{opacity:1}90%{opacity:1}
    100%{transform:translateY(-100vh) translateX(20px);opacity:0}
  }
  .frame-wrap{
    position:relative;
    width:min(82vw,340px);
    aspect-ratio:3/4;
    border-radius:4px;
    overflow:hidden;
    box-shadow:
      0 4px 8px rgba(0,0,0,.3),
      0 16px 48px rgba(0,0,0,.4),
      0 32px 80px rgba(0,0,0,.25);
    z-index:10;
  }
  canvas{width:100%;height:100%;display:block}
  .color-glow{
    position:absolute;inset:0;
    border-radius:4px;
    box-shadow:inset 0 0 60px rgba(200,50,50,0);
    pointer-events:none;
    transition:box-shadow 1.5s ease;
  }
  .text-overlay{
    position:fixed;
    bottom:0;left:0;right:0;
    padding:40px 28px 70px;
    text-align:center;
    z-index:20;
    pointer-events:none;
    background:linear-gradient(transparent,rgba(8,8,14,.85) 40%);
  }
  .text-line{
    font-family:'Cormorant Garamond',serif;
    font-weight:300;font-style:italic;
    font-size:1.3rem;
    color:rgba(255,255,255,0);
    line-height:1.6;
    letter-spacing:.3px;
    transition:color 1.2s ease;
    margin-bottom:6px;
  }
  .text-line.visible{color:rgba(255,255,255,.65)}
  .text-line.bright{color:rgba(255,255,255,.9);font-style:normal;font-weight:400}
  .hint{
    position:fixed;bottom:18px;left:0;right:0;
    text-align:center;font-size:.5rem;
    color:#ffffff0d;letter-spacing:3px;text-transform:uppercase;
    pointer-events:none;transition:opacity .8s;
  }
  .phase-dots{
    position:fixed;bottom:42px;
    display:flex;gap:8px;pointer-events:none;
  }
  .phase-dot{
    width:5px;height:5px;border-radius:50%;
    background:rgba(255,255,255,.06);
    transition:background .6s,transform .6s;
  }
  .phase-dot.active{background:rgba(200,80,80,.45);transform:scale(1.4)}
  .phase-dot.done{background:rgba(255,255,255,.15)}
  .color-burst{
    position:fixed;pointer-events:none;
    width:6px;height:6px;border-radius:50%;
    opacity:0;z-index:30;
  }
  @keyframes burst{
    0%{transform:translate(0,0) scale(1);opacity:.9}
    100%{transform:translate(var(--bx),var(--by)) scale(0);opacity:0}
  }
</style>
</head>
<body>
<div class="ambient"></div>
<a href="../building-blocks.html" class="back-link">← blocks</a>
<div class="block-label">closr · color isolate</div>
<div class="frame-wrap" id="frame">
  <canvas id="canvas"></canvas>
  <div class="color-glow" id="glow"></div>
</div>
<div class="text-overlay">
  <!-- SLOT: drain_message -->
  <div class="text-line" id="text1">The world fades to grey without you...</div>
  <!-- /SLOT -->
  <!-- SLOT: color_detail -->
  <div class="text-line" id="text2">except the warmth in your eyes</div>
  <!-- /SLOT -->
  <!-- SLOT: restore_message -->
  <div class="text-line" id="text3">but you bring it all back</div>
  <!-- /SLOT -->
</div>
<div class="phase-dots" id="phaseDots">
  <div class="phase-dot active"></div>
  <div class="phase-dot"></div>
  <div class="phase-dot"></div>
</div>
<div class="hint" id="hint">tap to continue</div>
<script>
(function(){
  for(var i=0;i<12;i++){
    var p=document.createElement('div');p.className='particle';
    p.style.left=Math.random()*100+'vw';p.style.top=Math.random()*100+'vh';
    var s=Math.random()*2+1;p.style.width=s+'px';p.style.height=s+'px';
    p.style.animationDuration=(Math.random()*18+12)+'s';
    p.style.animationDelay=(Math.random()*10)+'s';
    document.body.appendChild(p);
  }

  var canvas=document.getElementById('canvas');
  var ctx=canvas.getContext('2d',{willReadFrequently:true});
  var glow=document.getElementById('glow');
  var hint=document.getElementById('hint');
  var text1=document.getElementById('text1');
  var text2=document.getElementById('text2');
  var text3=document.getElementById('text3');
  var dots=document.getElementById('phaseDots').children;
  var phase=0,W,H;
  var originalData,isolatedData;
  var currentBlend=null;

  function hsl(r,g,b){
    r/=255;g/=255;b/=255;
    var max=Math.max(r,g,b),min=Math.min(r,g,b);
    var h=0,s=0,l=(max+min)/2;
    if(max!==min){
      var d=max-min;
      s=l>.5?d/(2-max-min):d/(max+min);
      if(max===r)h=((g-b)/d+(g<b?6:0))/6;
      else if(max===g)h=((b-r)/d+2)/6;
      else h=((r-g)/d+4)/6;
    }
    return[h*360,s*100,l*100];
  }

  function resize(){
    var rect=canvas.parentElement.getBoundingClientRect();
    var dpr=Math.min(window.devicePixelRatio||1,2);
    W=Math.round(rect.width*dpr);H=Math.round(rect.height*dpr);
    canvas.width=W;canvas.height=H;
  }

  function drawScene(){
    var skyGrad=ctx.createLinearGradient(0,0,0,H*.55);
    skyGrad.addColorStop(0,'#1a1028');
    skyGrad.addColorStop(.4,'#2d1832');
    skyGrad.addColorStop(.7,'#6b2d4a');
    skyGrad.addColorStop(1,'#c45c3e');
    ctx.fillStyle=skyGrad;ctx.fillRect(0,0,W,H);

    var cx=W*.55,cy=H*.48;
    var sunGrad=ctx.createRadialGradient(cx,cy,0,cx,cy,W*.35);
    sunGrad.addColorStop(0,'rgba(230,120,60,0.8)');
    sunGrad.addColorStop(.3,'rgba(200,80,50,0.4)');
    sunGrad.addColorStop(.7,'rgba(150,40,60,0.15)');
    sunGrad.addColorStop(1,'transparent');
    ctx.fillStyle=sunGrad;ctx.fillRect(0,0,W,H);

    var waterGrad=ctx.createLinearGradient(0,H*.52,0,H);
    waterGrad.addColorStop(0,'#8b3a2a');
    waterGrad.addColorStop(.3,'#4a2030');
    waterGrad.addColorStop(1,'#12101a');
    ctx.fillStyle=waterGrad;ctx.fillRect(0,H*.52,W,H*.48);

    for(var i=0;i<40;i++){
      var wy=H*.55+Math.random()*H*.42;
      ctx.fillStyle='rgba(200,100,60,'+(Math.random()*.12+.02)+')';
      ctx.fillRect(Math.random()*W,wy,Math.random()*W*.15+10,1.5);
    }

    var figS=H*.0028;
    drawFig(W*.42,H*.51,figS,1);
    drawFig(W*.52,H*.50,figS*.92,-1);

    for(var i=0;i<60;i++){
      ctx.beginPath();ctx.arc(Math.random()*W,Math.random()*H*.4,Math.random()*1.5+.3,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,'+(Math.random()*.4+.1)+')';ctx.fill();
    }

    var flareGrad=ctx.createRadialGradient(cx,cy,0,cx,cy,W*.12);
    flareGrad.addColorStop(0,'rgba(255,180,100,0.15)');
    flareGrad.addColorStop(1,'transparent');
    ctx.fillStyle=flareGrad;ctx.fillRect(0,0,W,H);
  }

  function drawFig(x,y,s,dir){
    ctx.save();ctx.fillStyle='#0a0810';
    ctx.beginPath();ctx.arc(x,y-s*38,s*5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x-s*6,y-s*28);ctx.quadraticCurveTo(x,y-s*32,x+s*6,y-s*28);
    ctx.lineTo(x+s*5,y);ctx.lineTo(x-s*5,y);ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x+dir*s*5,y-s*25);
    ctx.quadraticCurveTo(x+dir*s*14,y-s*22,x+dir*s*16,y-s*26);
    ctx.lineWidth=s*2.5;ctx.strokeStyle='#0a0810';ctx.stroke();
    ctx.restore();
  }

  function processPixels(){
    originalData=ctx.getImageData(0,0,W,H);
    isolatedData=new ImageData(new Uint8ClampedArray(originalData.data),W,H);
    var id=isolatedData.data;
    for(var i=0;i<id.length;i+=4){
      var r=id[i],g=id[i+1],b=id[i+2];
      var lum=Math.round(.299*r+.587*g+.114*b);
      var h=hsl(r,g,b);
      var hue=h[0],sat=h[1],light=h[2];
      var inRange=false;
      if(sat>15&&light>10&&light<85){
        if(hue>=330||hue<=45)inRange=true;
      }
      if(!inRange){id[i]=lum;id[i+1]=lum;id[i+2]=lum;}
    }
  }

  function blendImages(from,to,progress){
    var out=ctx.createImageData(W,H);
    var od=out.data,fd=from.data,td=to.data;
    for(var i=0;i<od.length;i+=4){
      od[i]=fd[i]+(td[i]-fd[i])*progress;
      od[i+1]=fd[i+1]+(td[i+1]-fd[i+1])*progress;
      od[i+2]=fd[i+2]+(td[i+2]-fd[i+2])*progress;
      od[i+3]=255;
    }
    ctx.putImageData(out,0,0);
  }

  function easeInOut(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2}
  function easeOut(t){return 1-Math.pow(1-t,3)}

  function animateTransition(from,to,dur,ease,cb){
    if(currentBlend)cancelAnimationFrame(currentBlend);
    var start=null;
    function frame(ts){
      if(!start)start=ts;
      var t=Math.min((ts-start)/dur,1);
      blendImages(from,to,ease(t));
      if(t<1)currentBlend=requestAnimationFrame(frame);
      else{currentBlend=null;if(cb)cb();}
    }
    currentBlend=requestAnimationFrame(frame);
  }

  function spawnBurst(){
    var rect=document.getElementById('frame').getBoundingClientRect();
    var colors=['#e87040','#c45040','#e0a060','#d06050','#f0c070','#ff8866'];
    for(var i=0;i<24;i++){
      var dot=document.createElement('div');dot.className='color-burst';
      var angle=Math.random()*Math.PI*2,dist=60+Math.random()*120;
      dot.style.left=(rect.left+rect.width/2)+'px';
      dot.style.top=(rect.top+rect.height*.45)+'px';
      dot.style.background=colors[Math.floor(Math.random()*colors.length)];
      dot.style.setProperty('--bx',Math.cos(angle)*dist+'px');
      dot.style.setProperty('--by',Math.sin(angle)*dist+'px');
      dot.style.animation='burst '+(0.6+Math.random()*.5)+'s ease-out forwards';
      document.body.appendChild(dot);
      setTimeout(function(d){return function(){d.remove()}}(dot),1200);
    }
  }

  function updatePhase(p){
    for(var i=0;i<dots.length;i++)
      dots[i].className='phase-dot'+(i<p?' done':'')+(i===p?' active':'');
  }

  var glowInterval;
  function startDrain(){
    text1.classList.add('visible');
    animateTransition(originalData,isolatedData,3000,easeInOut,function(){
      phase=1;
      text2.classList.add('visible');
      updatePhase(1);
      var on=true;
      glowInterval=setInterval(function(){
        on=!on;
        glow.style.boxShadow=on
          ?'inset 0 0 80px rgba(200,60,50,.14)'
          :'inset 0 0 40px rgba(200,60,50,.06)';
      },2000);
    });
  }

  function restore(){
    if(glowInterval)clearInterval(glowInterval);
    glow.style.boxShadow='none';
    text1.classList.remove('visible');text2.classList.remove('visible');
    spawnBurst();
    animateTransition(isolatedData,originalData,2200,easeOut,function(){
      text3.classList.add('visible');text3.classList.add('bright');
      glow.style.transition='box-shadow 2s ease';
      glow.style.boxShadow='inset 0 0 50px rgba(230,140,60,.08)';
      hint.style.opacity='0';
    });
    updatePhase(2);
  }

  document.body.addEventListener('click',function(){
    if(phase===1){restore();phase=2;}
  });

  resize();drawScene();processPixels();
  ctx.putImageData(originalData,0,0);
  updatePhase(0);
  setTimeout(startDrain,1500);
})();
</script>
</body>
</html>
