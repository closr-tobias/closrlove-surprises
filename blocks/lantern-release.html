<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lantern Release — Closr Building Block</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Caveat:wght@400;500;600&family=Inter:wght@300;400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: #08080e;
    font-family: 'Inter', sans-serif;
    min-height: 100dvh;
    touch-action: none;
    user-select: none; -webkit-user-select: none;
    overflow: hidden;
    position: relative;
  }

  canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
  }

  .ui-layer {
    position: fixed;
    inset: 0;
    z-index: 10;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 54px;
  }

  .prompt {
    font-family: 'Caveat', cursive;
    font-size: 1.25rem;
    color: rgba(255,220,180,0.45);
    text-align: center;
    transition: opacity 1.5s ease;
    pointer-events: none;
    letter-spacing: 0.5px;
  }
  .prompt.hidden { opacity: 0; }

  .hold-ring {
    position: fixed;
    bottom: 84px;
    left: 50%;
    transform: translateX(-50%);
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,180,100,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: auto;
    z-index: 20;
    transition: border-color 0.3s, box-shadow 0.3s;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .hold-ring:active, .hold-ring.charging {
    border-color: rgba(255,180,100,0.35);
    box-shadow: 0 0 30px rgba(255,150,50,0.08);
  }
  .hold-ring .icon {
    width: 22px; height: 22px;
    opacity: 0.2;
    transition: opacity 0.3s;
  }
  .hold-ring.charging .icon { opacity: 0.6; }
  .hold-ring.done { opacity: 0; pointer-events: none; transition: opacity 1s; }

  .charge-ring {
    position: absolute;
    inset: -2px;
    border-radius: 50%;
    overflow: hidden;
  }
  .charge-ring svg {
    width: 100%; height: 100%;
    transform: rotate(-90deg);
  }
  .charge-ring circle {
    fill: none;
    stroke: rgba(255,180,100,0.5);
    stroke-width: 2;
    stroke-dasharray: 201;
    stroke-dashoffset: 201;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.05s linear;
  }

  .finale-text {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-style: italic;
    color: rgba(255,220,180,0);
    text-align: center;
    line-height: 1.8;
    max-width: 260px;
    transition: color 3s ease;
    pointer-events: none;
    z-index: 15;
  }
  .finale-text.visible {
    color: rgba(255,220,180,0.5);
  }

  .back-link { position: fixed; top: 14px; left: 14px; font-size: 0.65rem; color: #ffffff12; text-decoration: none; z-index: 200; pointer-events: auto; }
  .block-label { position: fixed; top: 14px; right: 14px; font-size: 0.5rem; color: #ffffff0a; letter-spacing: 1px; z-index: 200; }
</style>
</head>
<body>

<canvas id="c"></canvas>

<a href="../building-blocks.html" class="back-link">← blocks</a>
<div class="block-label">closr · lantern release</div>

<div class="hold-ring" id="holdBtn">
  <div class="charge-ring">
    <svg viewBox="0 0 68 68"><circle cx="34" cy="34" r="32" id="chargeCircle"/></svg>
  </div>
  <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="rgba(255,180,100,1)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 2C8 2 6 5 6 8c0 2 1 3 2 4l4 10 4-10c1-1 2-2 2-4 0-3-2-6-6-6z"/>
    <circle cx="12" cy="8" r="1.5" fill="rgba(255,180,100,0.6)" stroke="none"/>
  </svg>
</div>

<div class="ui-layer">
  <div class="prompt" id="prompt">hold to release a lantern</div>
</div>

<div class="finale-text" id="finale"></div>

<script>
(function(){
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  let W, H;

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  /* <!-- SLOT: lantern_messages --> Each lantern carries a memory */
  const messages = [
    "The first time you laughed\nat something I said",
    "That rainy Tuesday when\nwe talked until 4am",
    "When you sent me a song\nand said 'this is us'",
    "The way you say my name\nlike it's your favorite word",
    "Every airport goodbye\nthat made the hellos sweeter",
    "The inside joke that still\nmakes us both lose it",
    "When you believed in me\nbefore I believed in myself",
    "All the silences that felt\nmore like conversations"
  ];
  /* <!-- /SLOT --> */

  /* <!-- SLOT: finale_message --> Final message after all lanterns */
  const finaleMessage = "Every light in that sky\nis a moment I'd live again.\nAll of them lead back to you.";
  /* <!-- /SLOT --> */

  // Stars
  const stars = [];
  for (let i = 0; i < 80; i++) {
    stars.push({
      x: Math.random(), y: Math.random() * 0.7,
      r: Math.random() * 1.2 + 0.3,
      a: Math.random() * 0.25 + 0.05,
      speed: Math.random() * 0.3 + 0.1,
      phase: Math.random() * Math.PI * 2
    });
  }

  function drawStars(t) {
    stars.forEach(s => {
      const flicker = Math.sin(t * s.speed + s.phase) * 0.5 + 0.5;
      ctx.beginPath();
      ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${s.a * flicker})`;
      ctx.fill();
    });
  }

  // Lanterns
  const lanterns = [];
  let lanternIndex = 0;
  const totalLanterns = messages.length;

  class Lantern {
    constructor(msg) {
      this.startX = W / 2 + (Math.random() - 0.5) * 20;
      this.startY = H - 130;
      this.x = this.startX;
      this.y = this.startY;
      this.targetY = Math.random() * H * 0.22 + H * 0.06;
      this.targetX = W * 0.15 + Math.random() * W * 0.7;
      this.msg = msg;
      this.w = 36;
      this.h = 48;
      this.released = true;
      this.releaseTime = performance.now();
      this.opacity = 0;
      this.driftPhase = Math.random() * Math.PI * 2;
      this.driftSpeed = Math.random() * 0.4 + 0.25;
      this.flamePhase = Math.random() * Math.PI * 2;
    }

    update(t) {
      const rt = (t - this.releaseTime) / 1000;
      this.opacity = Math.min(1, rt * 1.5);

      const progress = Math.min(1, rt / 4.5);
      const ease = 1 - Math.pow(1 - progress, 3);

      this.y = this.startY + (this.targetY - this.startY) * ease;
      this.x = this.startX + (this.targetX - this.startX) * ease
        + Math.sin(t / 1000 * this.driftSpeed + this.driftPhase) * 6;
    }

    draw(t) {
      const { x, y, w, h, opacity: alpha } = this;
      ctx.save();
      ctx.globalAlpha = alpha;

      // Outer glow
      const gr = 70;
      const glowGrad = ctx.createRadialGradient(x, y, 0, x, y, gr);
      glowGrad.addColorStop(0, 'rgba(255,160,60,0.07)');
      glowGrad.addColorStop(0.5, 'rgba(255,120,40,0.025)');
      glowGrad.addColorStop(1, 'rgba(255,100,30,0)');
      ctx.fillStyle = glowGrad;
      ctx.fillRect(x - gr, y - gr, gr * 2, gr * 2);

      // Body
      const bodyGrad = ctx.createLinearGradient(x - w/2, y - h/2, x + w/2, y + h/2);
      bodyGrad.addColorStop(0, 'rgba(255,200,130,0.82)');
      bodyGrad.addColorStop(0.5, 'rgba(255,165,85,0.72)');
      bodyGrad.addColorStop(1, 'rgba(220,120,55,0.6)');

      const bulge = w * 0.13;
      ctx.beginPath();
      ctx.moveTo(x, y - h/2);
      ctx.bezierCurveTo(x + w/2 - 2, y - h/2, x + w/2 + bulge, y - h*0.15, x + w/2 + bulge, y);
      ctx.bezierCurveTo(x + w/2 + bulge, y + h*0.15, x + w/2 - 2, y + h/2, x + 4, y + h/2);
      ctx.lineTo(x - 4, y + h/2);
      ctx.bezierCurveTo(x - w/2 + 2, y + h/2, x - w/2 - bulge, y + h*0.15, x - w/2 - bulge, y);
      ctx.bezierCurveTo(x - w/2 - bulge, y - h*0.15, x - w/2 + 2, y - h/2, x, y - h/2);
      ctx.closePath();
      ctx.fillStyle = bodyGrad;
      ctx.fill();

      // Inner light
      const ff = Math.sin(t / 80 + this.flamePhase) * 0.12 + 0.88;
      const ig = ctx.createRadialGradient(x, y + 2, 0, x, y + 2, h * 0.38);
      ig.addColorStop(0, `rgba(255,235,160,${0.3 * ff})`);
      ig.addColorStop(0.6, `rgba(255,180,80,${0.08 * ff})`);
      ig.addColorStop(1, 'rgba(255,150,60,0)');
      ctx.fillStyle = ig;
      ctx.fill();

      // Rims
      ctx.strokeStyle = 'rgba(200,150,80,0.35)';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(x - w * 0.28, y - h/2 + 1);
      ctx.lineTo(x + w * 0.28, y - h/2 + 1);
      ctx.stroke();

      // Flame dot
      const fh = 7 * ff;
      const fg = ctx.createRadialGradient(x, y + 4, 0, x, y + 4, fh);
      fg.addColorStop(0, `rgba(255,255,210,${0.85 * ff})`);
      fg.addColorStop(0.5, `rgba(255,200,100,${0.4 * ff})`);
      fg.addColorStop(1, 'rgba(255,150,50,0)');
      ctx.beginPath();
      ctx.ellipse(x, y + 4, 2.5, fh, 0, 0, Math.PI * 2);
      ctx.fillStyle = fg;
      ctx.fill();

      // Text
      const rt = (performance.now() - this.releaseTime) / 1000;
      const ta = Math.min(1, Math.max(0, (rt - 2) / 1.5));
      if (ta > 0) {
        ctx.globalAlpha = alpha * ta * 0.75;
        ctx.font = '500 8.5px "Caveat", cursive';
        ctx.fillStyle = 'rgba(70,35,10,0.8)';
        ctx.textAlign = 'center';
        this.msg.split('\n').forEach((line, i) => {
          ctx.fillText(line, x, y - 5 + i * 11);
        });
      }

      ctx.restore();
    }
  }

  // Sparks
  const sparks = [];
  class Spark {
    constructor(x, y) {
      this.x = x; this.y = y;
      this.vx = (Math.random() - 0.5) * 1;
      this.vy = -(Math.random() * 0.6 + 0.2);
      this.life = 1;
      this.decay = Math.random() * 0.008 + 0.005;
      this.r = Math.random() * 1.3 + 0.4;
    }
    update() {
      this.x += this.vx; this.y += this.vy;
      this.vy -= 0.003;
      this.life -= this.decay;
    }
    draw() {
      if (this.life <= 0) return;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,200,100,${this.life * 0.35})`;
      ctx.fill();
    }
  }

  // Interaction
  const holdBtn = document.getElementById('holdBtn');
  const chargeCircle = document.getElementById('chargeCircle');
  const prompt = document.getElementById('prompt');
  const finale = document.getElementById('finale');

  let charging = false, chargeStart = 0;
  const chargeTime = 1000;
  let allDone = false;

  function startCharge(e) {
    e.preventDefault();
    if (allDone || lanternIndex >= totalLanterns) return;
    charging = true;
    chargeStart = performance.now();
    holdBtn.classList.add('charging');
  }

  function endCharge(e) {
    e.preventDefault();
    if (!charging) return;
    charging = false;
    holdBtn.classList.remove('charging');
    const progress = Math.min(1, (performance.now() - chargeStart) / chargeTime);
    if (progress >= 0.85) releaseLantern();
    chargeCircle.style.strokeDashoffset = 201;
  }

  function releaseLantern() {
    if (lanternIndex >= totalLanterns) return;

    lanterns.push(new Lantern(messages[lanternIndex]));
    for (let i = 0; i < 15; i++) sparks.push(new Spark(W / 2, H - 130));
    if (navigator.vibrate) navigator.vibrate(25);

    lanternIndex++;

    if (lanternIndex < totalLanterns) {
      const r = totalLanterns - lanternIndex;
      prompt.textContent = r === 1 ? 'one more…' : r + ' lanterns left';
    } else {
      prompt.classList.add('hidden');
      holdBtn.classList.add('done');
      allDone = true;
      setTimeout(() => {
        finale.textContent = finaleMessage;
        finale.classList.add('visible');
      }, 3500);
    }
  }

  holdBtn.addEventListener('mousedown', startCharge);
  holdBtn.addEventListener('touchstart', startCharge, {passive: false});
  window.addEventListener('mouseup', endCharge);
  window.addEventListener('touchend', endCharge);
  window.addEventListener('touchcancel', endCharge);

  // Treeline
  function drawTreeline() {
    ctx.fillStyle = '#0a0a11';
    ctx.beginPath();
    ctx.moveTo(0, H);
    for (let i = 0; i <= 40; i++) {
      const x = (i / 40) * W;
      const y = H - 35 - Math.abs(Math.sin(i * 1.3) * 14 + Math.sin(i * 0.5) * 22 + Math.sin(i * 3.7) * 7);
      ctx.lineTo(x, y);
    }
    ctx.lineTo(W, H);
    ctx.closePath();
    ctx.fill();
  }

  // Main loop
  function frame(t) {
    // Background
    const bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, '#050510');
    bg.addColorStop(0.35, '#0a0a18');
    bg.addColorStop(0.65, '#0d0b1a');
    bg.addColorStop(1, '#110f1e');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    drawStars(t);
    drawTreeline();

    // Charge ring
    if (charging) {
      const p = Math.min(1, (t - chargeStart) / chargeTime);
      chargeCircle.style.strokeDashoffset = 201 - 201 * p;
    }

    // Lanterns
    lanterns.forEach(l => { l.update(t); l.draw(t); });

    // Ambient warmth
    if (lanterns.length > 0) {
      const intensity = Math.min(lanterns.length / totalLanterns, 1);
      const ag = ctx.createRadialGradient(W/2, H * 0.25, 0, W/2, H * 0.3, H * 0.6);
      ag.addColorStop(0, `rgba(255,150,60,${0.012 * intensity})`);
      ag.addColorStop(1, 'rgba(255,100,30,0)');
      ctx.fillStyle = ag;
      ctx.fillRect(0, 0, W, H);
    }

    // Sparks
    for (let i = sparks.length - 1; i >= 0; i--) {
      sparks[i].update();
      sparks[i].draw();
      if (sparks[i].life <= 0) sparks.splice(i, 1);
    }

    // Occasional ember from floating lanterns
    lanterns.forEach(l => {
      if (Math.random() < 0.015) sparks.push(new Spark(l.x, l.y + l.h / 2));
    });

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
