<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Double Exposure — Closr Building Block</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: #08080e;
    font-family: 'Inter', sans-serif;
    min-height: 100dvh;
    touch-action: none;
    user-select: none; -webkit-user-select: none;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .scene {
    position: relative;
    width: 100vw;
    height: 100dvh;
    overflow: hidden;
  }

  canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
  }

  .color-grade {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(20,12,28,0.3) 0%, rgba(40,20,40,0.15) 40%, rgba(15,8,20,0.25) 100%);
    mix-blend-mode: multiply;
    pointer-events: none;
    z-index: 2;
  }

  .warm-wash {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 40%, rgba(255,170,100,0.08), transparent 70%);
    pointer-events: none;
    z-index: 3;
  }

  .vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(8,8,14,0.7) 100%);
    pointer-events: none;
    z-index: 4;
  }

  .grain {
    position: absolute;
    inset: -50%;
    width: 200%;
    height: 200%;
    background-image: url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23g)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 5;
    animation: grainShift 0.5s steps(4) infinite;
    opacity: 0.6;
  }
  @keyframes grainShift {
    0% { transform: translate(0, 0); }
    25% { transform: translate(-5%, -5%); }
    50% { transform: translate(5%, 2%); }
    75% { transform: translate(-2%, 5%); }
    100% { transform: translate(0, 0); }
  }

  .text-layer {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    pointer-events: none;
    padding: 40px 32px;
  }

  .text-line {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    color: #fff;
    text-align: center;
    line-height: 1.35;
    opacity: 0;
    transform: translateY(14px);
    transition: opacity 1.4s ease, transform 1.4s ease;
    text-shadow: 0 0 40px rgba(0,0,0,0.6), 0 2px 20px rgba(0,0,0,0.4);
  }
  .text-line.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .text-line.line-1 {
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    margin-bottom: 12px;
  }
  .text-line.line-2 {
    font-size: clamp(1.1rem, 3.5vw, 1.5rem);
    font-style: normal;
    font-weight: 400;
    letter-spacing: 0.5px;
    color: rgba(255,255,255,0.7);
  }
  .text-line.line-3 {
    font-size: clamp(2rem, 6vw, 3rem);
    font-weight: 600;
    font-style: normal;
    letter-spacing: -0.5px;
    margin-top: 24px;
  }

  .phase-bar {
    position: fixed;
    bottom: 44px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    z-index: 20;
    pointer-events: none;
  }
  .phase-pip {
    width: 20px;
    height: 2px;
    border-radius: 1px;
    background: rgba(255,255,255,0.1);
    transition: background 0.8s ease, width 0.5s ease;
  }
  .phase-pip.active {
    background: rgba(255,255,255,0.35);
    width: 28px;
  }

  .hint {
    position: fixed;
    bottom: 22px;
    left: 0; right: 0;
    text-align: center;
    font-size: 0.5rem;
    color: #ffffff0d;
    letter-spacing: 3px;
    text-transform: uppercase;
    pointer-events: none;
    z-index: 20;
  }

  .back-link { position: fixed; top: 14px; left: 14px; font-size: 0.65rem; color: #ffffff12; text-decoration: none; z-index: 200; }
  .block-label { position: fixed; top: 14px; right: 14px; font-size: 0.5rem; color: #ffffff0a; letter-spacing: 1px; z-index: 200; }

  .particle {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 6;
    animation: drift linear infinite;
  }
  @keyframes drift {
    0% { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
    15% { opacity: 1; }
    85% { opacity: 1; }
    100% { transform: translateY(-100vh) translateX(40px) scale(0.5); opacity: 0; }
  }
</style>
</head>
<body>

<div class="scene">
  <canvas id="canvas"></canvas>
  <div class="color-grade"></div>
  <div class="warm-wash"></div>
  <div class="vignette"></div>
  <div class="grain"></div>

  <div class="text-layer" id="textLayer">
    <!-- SLOT: line_1 --> <div class="text-line line-1" data-phase="1">You are every city I've ever loved</div> <!-- /SLOT -->
    <!-- SLOT: line_2 --> <div class="text-line line-2" data-phase="2">every skyline, every quiet street at 2 AM</div> <!-- /SLOT -->
    <!-- SLOT: line_3 --> <div class="text-line line-3" data-phase="3">My whole world</div> <!-- /SLOT -->
  </div>
</div>

<a href="../building-blocks.html" class="back-link">← blocks</a>
<div class="block-label">closr · double exposure</div>

<div class="phase-bar" id="phaseBar"></div>
<div class="hint" id="hint">tap to continue</div>

<script>
(function(){
  var PHASES = 4;
  var phase = 0;
  var canvas = document.getElementById('canvas');
  var ctx = canvas.getContext('2d');
  var W, H;
  var blendProgress = 0;
  var targetBlend = 0;
  var breatheT = 0;

  // Particles
  for (var i = 0; i < 12; i++) {
    var p = document.createElement('div');
    p.className = 'particle';
    var size = Math.random() * 2.5 + 0.5;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.top = Math.random() * 100 + 'vh';
    p.style.background = Math.random() > 0.5
      ? 'rgba(255,200,150,' + (Math.random() * 0.06 + 0.02) + ')'
      : 'rgba(180,200,255,' + (Math.random() * 0.05 + 0.02) + ')';
    p.style.animationDuration = (Math.random() * 18 + 12) + 's';
    p.style.animationDelay = (Math.random() * 10) + 's';
    document.body.appendChild(p);
  }

  // Phase bar
  var phaseBar = document.getElementById('phaseBar');
  for (var i = 0; i < PHASES; i++) {
    var pip = document.createElement('div');
    pip.className = 'phase-pip';
    phaseBar.appendChild(pip);
  }

  function updatePhaseBar() {
    var pips = phaseBar.children;
    for (var i = 0; i < pips.length; i++) {
      pips[i].className = i === phase ? 'phase-pip active' : 'phase-pip';
    }
  }

  // Generate portrait silhouette
  function generatePortrait(w, h) {
    var c = document.createElement('canvas');
    c.width = w; c.height = h;
    var g = c.getContext('2d');
    var bg = g.createLinearGradient(0, 0, 0, h);
    bg.addColorStop(0, '#1a1420');
    bg.addColorStop(0.5, '#2a1e30');
    bg.addColorStop(1, '#181218');
    g.fillStyle = bg;
    g.fillRect(0, 0, w, h);

    var cx = w * 0.5;
    var headR = w * 0.14;
    var headY = h * 0.32;

    // Head
    g.beginPath();
    g.ellipse(cx, headY, headR, headR * 1.15, 0, 0, Math.PI * 2);
    g.fillStyle = '#3a2840';
    g.fill();

    // Hair suggestion
    g.beginPath();
    g.ellipse(cx, headY - headR * 0.3, headR * 1.1, headR * 0.9, 0, Math.PI, Math.PI * 2);
    g.fillStyle = '#2d1e35';
    g.fill();

    // Neck + shoulders
    g.beginPath();
    g.moveTo(cx - headR * 0.45, headY + headR * 1.05);
    g.quadraticCurveTo(cx - headR * 0.5, headY + headR * 2, cx - w * 0.28, h * 0.65);
    g.lineTo(cx - w * 0.38, h);
    g.lineTo(cx + w * 0.38, h);
    g.lineTo(cx + w * 0.28, h * 0.65);
    g.quadraticCurveTo(cx + headR * 0.5, headY + headR * 2, cx + headR * 0.45, headY + headR * 1.05);
    g.closePath();
    g.fillStyle = '#3a2840';
    g.fill();

    // Rim light on one side
    var rim = g.createLinearGradient(cx + headR, headY - headR, cx + headR * 1.5, headY + headR);
    rim.addColorStop(0, 'rgba(200, 160, 200, 0.12)');
    rim.addColorStop(1, 'transparent');
    g.fillStyle = rim;
    g.beginPath();
    g.ellipse(cx + headR * 0.6, headY, headR * 0.7, headR * 1.4, 0.2, 0, Math.PI * 2);
    g.fill();

    // Subtle face light
    var faceGlow = g.createRadialGradient(cx - headR * 0.2, headY - headR * 0.1, 0, cx, headY, headR * 1.5);
    faceGlow.addColorStop(0, 'rgba(180, 140, 170, 0.1)');
    faceGlow.addColorStop(1, 'transparent');
    g.fillStyle = faceGlow;
    g.beginPath();
    g.ellipse(cx, headY, headR * 1.2, headR * 1.3, 0, 0, Math.PI * 2);
    g.fill();

    return c;
  }

  // Generate city skyline landscape
  function generateLandscape(w, h) {
    var c = document.createElement('canvas');
    c.width = w; c.height = h;
    var g = c.getContext('2d');

    var sky = g.createLinearGradient(0, 0, 0, h);
    sky.addColorStop(0, '#0a0a1a');
    sky.addColorStop(0.3, '#12102a');
    sky.addColorStop(0.6, '#1a1535');
    sky.addColorStop(1, '#201840');
    g.fillStyle = sky;
    g.fillRect(0, 0, w, h);

    // Stars
    for (var i = 0; i < 100; i++) {
      var sx = Math.random() * w;
      var sy = Math.random() * h * 0.55;
      var sr = Math.random() * 1.3 + 0.2;
      g.beginPath();
      g.arc(sx, sy, sr, 0, Math.PI * 2);
      g.fillStyle = 'rgba(255,255,255,' + (Math.random() * 0.5 + 0.1) + ')';
      g.fill();
    }

    // Skyline
    var baseY = h * 0.52;
    var bx = 0;
    while (bx < w) {
      var bw = Math.random() * (w * 0.08) + w * 0.025;
      var bh = Math.random() * (h * 0.28) + h * 0.06;
      var by = baseY - bh;

      var bGrad = g.createLinearGradient(bx, by, bx + bw, by + bh);
      bGrad.addColorStop(0, '#1a1830');
      bGrad.addColorStop(1, '#100e1c');
      g.fillStyle = bGrad;
      g.fillRect(bx, by, bw, bh + h - baseY);

      // Windows
      for (var wy = by + 5; wy < baseY - 3; wy += 7) {
        for (var wx = bx + 3; wx < bx + bw - 3; wx += 6) {
          if (Math.random() > 0.35) {
            g.fillStyle = Math.random() > 0.6
              ? 'rgba(255,220,140,' + (Math.random() * 0.6 + 0.2) + ')'
              : 'rgba(200,210,255,' + (Math.random() * 0.3 + 0.1) + ')';
            g.fillRect(wx, wy, 2, 3);
          }
        }
      }
      bx += bw + Math.random() * 3;
    }

    // Horizon glow
    var hg = g.createRadialGradient(w * 0.5, baseY, 0, w * 0.5, baseY, w * 0.5);
    hg.addColorStop(0, 'rgba(180, 140, 220, 0.1)');
    hg.addColorStop(0.5, 'rgba(120, 100, 180, 0.04)');
    hg.addColorStop(1, 'transparent');
    g.fillStyle = hg;
    g.fillRect(0, baseY - h * 0.15, w, h * 0.3);

    // Water
    for (var ry = baseY; ry < h; ry += 2) {
      g.fillStyle = 'rgba(10, 8, 20, ' + (0.3 + (ry - baseY) / (h - baseY) * 0.5) + ')';
      g.fillRect(0, ry, w, 2);
    }
    for (var i = 0; i < 50; i++) {
      var rx = Math.random() * w;
      var ry2 = baseY + Math.random() * (h - baseY);
      g.fillStyle = 'rgba(200, 180, 240, ' + (Math.random() * 0.04 + 0.01) + ')';
      g.fillRect(rx, ry2, Math.random() * 15 + 3, 1);
    }

    return c;
  }

  function resize() {
    W = window.innerWidth * (window.devicePixelRatio || 1);
    H = window.innerHeight * (window.devicePixelRatio || 1);
    canvas.width = W;
    canvas.height = H;
  }
  resize();

  var portraitCanvas = generatePortrait(W, H);
  var landscapeCanvas = generateLandscape(W, H);

  // Render loop
  function render() {
    breatheT += 0.008;
    blendProgress += (targetBlend - blendProgress) * 0.02;

    var ox = Math.sin(breatheT * 0.7) * 8;
    var oy = Math.cos(breatheT * 0.5) * 5;
    var bs = 1.05 + Math.sin(breatheT * 0.3) * 0.008;

    ctx.clearRect(0, 0, W, H);

    // Portrait base
    ctx.globalAlpha = 1 - blendProgress * 0.35;
    ctx.globalCompositeOperation = 'source-over';
    ctx.drawImage(portraitCanvas, 0, 0, W, H);

    // Landscape screen blend
    ctx.globalAlpha = 0.12 + blendProgress * 0.72;
    ctx.globalCompositeOperation = 'screen';
    var lw = W * bs;
    var lh = H * bs;
    ctx.drawImage(landscapeCanvas, (W - lw) / 2 + ox, (H - lh) / 2 + oy, lw, lh);

    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = 'source-over';

    // Warm overlay
    var wa = blendProgress * 0.05;
    if (wa > 0.003) {
      ctx.fillStyle = 'rgba(255, 180, 120, ' + wa + ')';
      ctx.fillRect(0, 0, W, H);
    }

    requestAnimationFrame(render);
  }
  render();

  // Text management
  var textLines = document.querySelectorAll('.text-line');
  function showText(i) { if (i < textLines.length) textLines[i].classList.add('visible'); }
  function hideAllText() { textLines.forEach(function(t) { t.classList.remove('visible'); }); }

  function advancePhase() {
    if (phase >= PHASES - 1) {
      phase = 0;
      targetBlend = 0;
      hideAllText();
      document.getElementById('hint').textContent = 'tap to continue';
      updatePhaseBar();
      return;
    }
    phase++;
    updatePhaseBar();
    if (phase === 1) { targetBlend = 0.4; showText(0); }
    else if (phase === 2) { targetBlend = 0.7; showText(1); }
    else if (phase === 3) { targetBlend = 1.0; showText(2); document.getElementById('hint').textContent = 'tap to restart'; }
  }

  var lastTap = 0;
  document.addEventListener('click', function(e) {
    if (e.target.closest('.back-link')) return;
    var now = Date.now();
    if (now - lastTap < 400) return;
    lastTap = now;
    advancePhase();
  });

  updatePhaseBar();

  var rt;
  window.addEventListener('resize', function() {
    clearTimeout(rt);
    rt = setTimeout(function() {
      resize();
      portraitCanvas = generatePortrait(W, H);
      landscapeCanvas = generateLandscape(W, H);
    }, 300);
  });
})();
</script>
</body>
</html>
