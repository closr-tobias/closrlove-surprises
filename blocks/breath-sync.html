<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Breath Sync — Closr Building Block</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@200;300;400&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden}
  body{
    background:#08080e;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-family:'Inter',sans-serif;
    min-height:100dvh;
    touch-action:none;user-select:none;-webkit-user-select:none;
    overflow:hidden;
  }
  .back-link{position:fixed;top:14px;left:14px;font-size:.65rem;color:#ffffff12;text-decoration:none;z-index:200}
  .block-label{position:fixed;top:14px;right:14px;font-size:.5rem;color:#ffffff0a;letter-spacing:1px;z-index:200}

  .blob-container{position:fixed;inset:0;pointer-events:none;overflow:hidden}
  .blob{
    position:absolute;border-radius:50%;filter:blur(80px);opacity:0;transition:opacity 2s;will-change:transform;
  }
  .blob-1{
    width:60vw;height:60vw;max-width:350px;max-height:350px;top:15%;left:10%;
    background:radial-gradient(circle,rgba(100,140,200,0.18),rgba(80,100,180,0.06),transparent);
    animation:morph1 12s ease-in-out infinite;
  }
  .blob-2{
    width:50vw;height:50vw;max-width:300px;max-height:300px;bottom:20%;right:5%;
    background:radial-gradient(circle,rgba(180,120,200,0.15),rgba(140,80,160,0.05),transparent);
    animation:morph2 15s ease-in-out infinite;
  }
  .blob-3{
    width:45vw;height:45vw;max-width:280px;max-height:280px;top:40%;left:30%;
    background:radial-gradient(circle,rgba(100,180,160,0.12),rgba(60,140,120,0.04),transparent);
    animation:morph3 18s ease-in-out infinite;
  }
  @keyframes morph1{
    0%,100%{transform:translate(0,0) scale(1);border-radius:50% 40% 60% 50%}
    25%{transform:translate(10%,5%) scale(1.1);border-radius:40% 60% 50% 55%}
    50%{transform:translate(-5%,10%) scale(0.95);border-radius:55% 45% 50% 60%}
    75%{transform:translate(5%,-5%) scale(1.05);border-radius:45% 55% 45% 50%}
  }
  @keyframes morph2{
    0%,100%{transform:translate(0,0) scale(1);border-radius:45% 55% 50% 50%}
    33%{transform:translate(-10%,-8%) scale(1.08);border-radius:55% 45% 55% 45%}
    66%{transform:translate(8%,5%) scale(0.92);border-radius:50% 50% 45% 55%}
  }
  @keyframes morph3{
    0%,100%{transform:translate(0,0) scale(1)}
    50%{transform:translate(-8%,12%) scale(1.12);border-radius:60% 40% 55% 45%}
  }

  .breath-ring{
    position:relative;z-index:10;width:180px;height:180px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;flex-direction:column;
  }
  .ring-outer{
    position:absolute;inset:0;border-radius:50%;border:1px solid rgba(255,255,255,0.04);
    transition:transform 4s cubic-bezier(0.37,0,0.63,1),border-color 4s;
  }
  .ring-outer.inhale{transform:scale(1.35);border-color:rgba(140,170,220,0.15)}
  .ring-outer.exhale{transform:scale(1);border-color:rgba(180,140,200,0.08)}
  .ring-glow{
    position:absolute;inset:-20px;border-radius:50%;
    background:radial-gradient(circle,rgba(120,150,200,0.06),transparent 70%);
    transition:opacity 4s,transform 4s cubic-bezier(0.37,0,0.63,1);opacity:0.3;
  }
  .ring-glow.inhale{transform:scale(1.4);opacity:0.7}
  .ring-glow.exhale{transform:scale(1);opacity:0.3}

  .breath-label{
    font-family:'Cormorant Garamond',serif;font-size:0.85rem;font-weight:300;
    letter-spacing:4px;text-transform:lowercase;color:rgba(255,255,255,0.2);
    transition:color 3s,opacity 1s;z-index:2;
  }
  .breath-count{
    font-family:'Cormorant Garamond',serif;font-size:2.8rem;font-weight:300;
    color:rgba(255,255,255,0.08);margin-top:2px;z-index:2;transition:color 3s;
  }

  .affirmation{
    position:fixed;bottom:18%;left:0;right:0;text-align:center;padding:0 32px;z-index:10;pointer-events:none;
  }
  .affirmation-text{
    font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:300;font-style:italic;
    color:rgba(255,255,255,0);line-height:1.7;letter-spacing:0.3px;transition:color 3s ease-in-out;
  }
  .affirmation-text.visible{color:rgba(255,255,255,0.25)}

  .start-prompt{
    position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    z-index:100;cursor:pointer;-webkit-tap-highlight-color:transparent;
  }
  .start-prompt.hidden{pointer-events:none;opacity:0;transition:opacity 1.5s}
  .start-icon{
    width:80px;height:80px;border-radius:50%;border:1px solid rgba(255,255,255,0.06);
    display:flex;align-items:center;justify-content:center;margin-bottom:20px;
    animation:pulse-start 3s ease-in-out infinite;
  }
  .start-icon span{font-size:1.6rem;opacity:0.3}
  @keyframes pulse-start{
    0%,100%{transform:scale(1);border-color:rgba(255,255,255,0.06)}
    50%{transform:scale(1.08);border-color:rgba(255,255,255,0.1)}
  }
  .start-text{
    font-family:'Cormorant Garamond',serif;font-size:0.8rem;font-weight:300;
    letter-spacing:3px;color:rgba(255,255,255,0.15);text-transform:lowercase;
  }
  .start-sub{font-size:0.55rem;color:rgba(255,255,255,0.07);letter-spacing:2px;margin-top:8px}

  .particle{
    position:fixed;background:rgba(255,255,255,0.03);border-radius:50%;pointer-events:none;
    animation:drift linear infinite;
  }
  @keyframes drift{
    0%{transform:translateY(0) translateX(0);opacity:0}
    10%{opacity:1}90%{opacity:1}
    100%{transform:translateY(-100vh) translateX(20px);opacity:0}
  }

  .sound-hint{
    position:fixed;top:14px;left:50%;transform:translateX(-50%);font-size:0.45rem;
    color:rgba(255,255,255,0.06);letter-spacing:2px;z-index:200;opacity:0;transition:opacity 2s;
  }
  .sound-hint.show{opacity:1}
</style>
</head>
<body>

<a href="../building-blocks.html" class="back-link">← blocks</a>
<div class="block-label">closr · breath sync</div>
<div class="sound-hint" id="soundHint">🔊 best with headphones</div>

<div class="blob-container" id="blobs">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<div class="breath-ring" id="breathRing">
  <div class="ring-glow" id="ringGlow"></div>
  <div class="ring-outer" id="ringOuter"></div>
  <div class="breath-label" id="breathLabel"></div>
  <div class="breath-count" id="breathCount"></div>
</div>

<div class="affirmation">
  <div class="affirmation-text" id="affirmation"></div>
</div>

<div class="start-prompt" id="startPrompt">
  <div class="start-icon"><span>🫁</span></div>
  <div class="start-text">tap to breathe together</div>
  <div class="start-sub">a quiet moment, just for you two</div>
</div>

<script>
(function(){
  for(var i=0;i<20;i++){
    var p=document.createElement('div');p.className='particle';
    var s=Math.random()*2+1;p.style.width=s+'px';p.style.height=s+'px';
    p.style.left=Math.random()*100+'vw';p.style.top=Math.random()*100+'vh';
    p.style.animationDuration=(Math.random()*20+12)+'s';
    p.style.animationDelay=(Math.random()*12)+'s';
    document.body.appendChild(p);
  }

  /* <!-- SLOT: affirmations --> */
  var affirmations=[
    "Right now, somewhere in this world, someone is thinking of you",
    "Your breath and theirs — separated by miles, connected by everything",
    "This moment is yours. No distance can touch it",
    "Close your eyes. Imagine their hand in yours",
    "You chose each other. Every single day, you keep choosing",
    "The space between you is filled with love, not emptiness",
    "Breathe in what you share. Breathe out what doesn't matter",
    "They're breathing too, right now, somewhere under the same sky"
  ];
  /* <!-- /SLOT --> */

  /* <!-- SLOT: partner_name --> */
  var partnerName="Erica";
  /* <!-- /SLOT --> */

  var audioCtx=null,started=false;
  var breathLabel=document.getElementById('breathLabel');
  var breathCount=document.getElementById('breathCount');
  var ringOuter=document.getElementById('ringOuter');
  var ringGlow=document.getElementById('ringGlow');
  var affEl=document.getElementById('affirmation');
  var blobs=document.querySelectorAll('.blob');
  var soundHint=document.getElementById('soundHint');

  function initAudio(){
    try{
      audioCtx=new(window.AudioContext||window.webkitAudioContext)();
      var merger=audioCtx.createChannelMerger(2);
      var gainL=audioCtx.createGain();gainL.gain.value=0;
      var gainR=audioCtx.createGain();gainR.gain.value=0;
      var oscL=audioCtx.createOscillator();oscL.type='sine';oscL.frequency.value=200;
      var oscR=audioCtx.createOscillator();oscR.type='sine';oscR.frequency.value=210;
      oscL.connect(gainL);gainL.connect(merger,0,0);
      oscR.connect(gainR);gainR.connect(merger,0,1);
      var bufSize=audioCtx.sampleRate*2;
      var buf=audioCtx.createBuffer(1,bufSize,audioCtx.sampleRate);
      var data=buf.getChannelData(0);
      for(var i=0;i<bufSize;i++)data[i]=(Math.random()*2-1)*0.3;
      var noise=audioCtx.createBufferSource();noise.buffer=buf;noise.loop=true;
      var lpf=audioCtx.createBiquadFilter();lpf.type='lowpass';lpf.frequency.value=300;lpf.Q.value=0.5;
      var padGain=audioCtx.createGain();padGain.gain.value=0;
      noise.connect(lpf);lpf.connect(padGain);padGain.connect(audioCtx.destination);
      merger.connect(audioCtx.destination);
      oscL.start();oscR.start();noise.start();
      var now=audioCtx.currentTime;
      gainL.gain.linearRampToValueAtTime(0.06,now+3);
      gainR.gain.linearRampToValueAtTime(0.06,now+3);
      padGain.gain.linearRampToValueAtTime(0.04,now+3);
      window._breathAudio={gainL:gainL,gainR:gainR,padGain:padGain,lpf:lpf,ctx:audioCtx};
    }catch(e){}
  }

  function modulateAudio(phase){
    var a=window._breathAudio;if(!a)return;var t=a.ctx.currentTime;
    if(phase==='inhale'){
      a.gainL.gain.linearRampToValueAtTime(0.08,t+2);
      a.gainR.gain.linearRampToValueAtTime(0.08,t+2);
      a.padGain.gain.linearRampToValueAtTime(0.06,t+2);
      a.lpf.frequency.linearRampToValueAtTime(450,t+3);
    }else{
      a.gainL.gain.linearRampToValueAtTime(0.04,t+2);
      a.gainR.gain.linearRampToValueAtTime(0.04,t+2);
      a.padGain.gain.linearRampToValueAtTime(0.025,t+2);
      a.lpf.frequency.linearRampToValueAtTime(250,t+3);
    }
  }

  function chime(freq){
    var a=window._breathAudio;if(!a)return;
    var osc=a.ctx.createOscillator();osc.type='sine';osc.frequency.value=freq;
    var g=a.ctx.createGain();g.gain.value=0;
    osc.connect(g);g.connect(a.ctx.destination);
    var t=a.ctx.currentTime;
    g.gain.linearRampToValueAtTime(0.04,t+0.1);
    g.gain.linearRampToValueAtTime(0,t+2.5);
    osc.start(t);osc.stop(t+3);
  }

  var cycle=0,affIdx=0,breathDuration=4000;

  function breathCycle(){
    if(!started)return;
    ringOuter.className='ring-outer inhale';
    ringGlow.className='ring-glow inhale';
    breathLabel.textContent='breathe in';
    breathLabel.style.color='rgba(140,170,220,0.3)';
    modulateAudio('inhale');chime(528);
    try{navigator.vibrate(100)}catch(e){}

    var count=4;breathCount.textContent=count;
    breathCount.style.color='rgba(140,170,220,0.1)';
    var ci=setInterval(function(){count--;if(count>0)breathCount.textContent=count;else{clearInterval(ci);breathCount.textContent='';}},1000);

    if(cycle%2===0&&cycle>0){
      affEl.textContent=affirmations[affIdx%affirmations.length];
      affEl.className='affirmation-text visible';affIdx++;
    }else if(cycle%2===1){affEl.className='affirmation-text';}

    setTimeout(function(){
      if(!started)return;
      ringOuter.className='ring-outer exhale';
      ringGlow.className='ring-glow exhale';
      breathLabel.textContent='breathe out';
      breathLabel.style.color='rgba(180,140,200,0.25)';
      breathCount.style.color='rgba(180,140,200,0.08)';
      modulateAudio('exhale');chime(396);
      try{navigator.vibrate(60)}catch(e){}

      var count2=4;breathCount.textContent=count2;
      var ci2=setInterval(function(){count2--;if(count2>0)breathCount.textContent=count2;else{clearInterval(ci2);breathCount.textContent='';}},1000);

      setTimeout(function(){
        cycle++;
        if(cycle>=8){
          breathLabel.textContent='';
          affEl.textContent='Take a deep breath together, '+partnerName+' \u{1F499}';
          affEl.className='affirmation-text visible';
          var a=window._breathAudio;
          if(a){var t=a.ctx.currentTime;
            a.gainL.gain.linearRampToValueAtTime(0,t+4);
            a.gainR.gain.linearRampToValueAtTime(0,t+4);
            a.padGain.gain.linearRampToValueAtTime(0,t+4);
          }
          return;
        }
        breathCycle();
      },breathDuration);
    },breathDuration);
  }

  document.getElementById('startPrompt').addEventListener('click',function(){
    if(started)return;started=true;
    this.classList.add('hidden');
    soundHint.classList.add('show');
    setTimeout(function(){soundHint.classList.remove('show')},5000);
    blobs.forEach(function(b){b.style.opacity='1'});
    initAudio();
    try{navigator.vibrate(50)}catch(e){}
    setTimeout(function(){breathCycle()},1500);
  });

  document.body.addEventListener('click',function(e){
    if(!started||e.target.closest('.start-prompt')||e.target.closest('a'))return;
    try{navigator.vibrate(30)}catch(e){}
  });
})();
</script>
</body>
</html>
