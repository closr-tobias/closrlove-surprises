<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Foggy Window — Closr Building Block</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: #08080e;
    font-family: 'Inter', sans-serif;
    min-height: 100dvh;
    touch-action: none;
    user-select: none; -webkit-user-select: none;
    overflow: hidden;
  }

  .back-link {
    position: fixed; top: 16px; left: 16px; z-index: 100;
    color: rgba(255,255,255,0.15); text-decoration: none;
    font-size: 0.7rem;
  }

  /* Dark rainy scene */
  .scene {
    position: fixed; inset: 0;
    background: linear-gradient(180deg, #0a0d18 0%, #0e1222 30%, #121830 50%, #0c1020 70%, #080c16 100%);
  }

  /* Rain — lots of it */
  .rain {
    position: fixed; width: 1px; pointer-events: none;
    background: linear-gradient(180deg, rgba(140,170,210,0.0), rgba(140,170,210,0.15), rgba(140,170,210,0.0));
    animation: fall linear infinite; z-index: 2;
  }
  .rain.heavy {
    width: 2px;
    background: linear-gradient(180deg, rgba(140,170,210,0.0), rgba(140,170,210,0.22), rgba(140,170,210,0.0));
  }
  @keyframes fall {
    0% { transform: translateY(-30px) translateX(0); opacity: 0; }
    5% { opacity: 1; }
    95% { opacity: 1; }
    100% { transform: translateY(105vh) translateX(-8px); opacity: 0; }
  }

  /* Water beads on glass */
  .bead {
    position: fixed; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(180,200,230,0.22), rgba(120,150,190,0.06));
    box-shadow: inset 0 0 2px rgba(255,255,255,0.08);
    pointer-events: none; z-index: 3;
  }

  /* Bokeh city lights behind the glass */
  .bokeh {
    position: fixed; border-radius: 50%; pointer-events: none; z-index: 1;
    animation: drift ease-in-out infinite alternate;
  }
  @keyframes drift {
    0% { transform: translate(0,0) scale(1); }
    100% { transform: translate(6px,-4px) scale(0.92); }
  }

  /* Message — centered, behind fog */
  .msg-layer {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 5; pointer-events: none;
  }
  .msg-box {
    text-align: center; padding: 40px 30px;
    max-width: 340px;
    transform: scale(0.94);
    opacity: 0.8;
    transition: transform 1.4s cubic-bezier(0.25,1,0.5,1), opacity 1s ease;
  }
  .msg-box.revealed {
    transform: scale(1.06);
    opacity: 1;
  }
  .msg-label {
    font-size: 0.55rem; font-weight: 500;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(255,200,180,0.45);
    margin-bottom: 20px;
  }
  .msg-text {
    font-family: 'Caveat', cursive;
    font-size: 1.9rem; font-weight: 500;
    line-height: 1.35;
    color: rgba(255,245,235,0.88);
    text-shadow: 0 0 30px rgba(255,180,130,0.12);
  }
  .msg-sign {
    font-family: 'Caveat', cursive;
    font-size: 1.15rem;
    color: rgba(255,200,170,0.45);
    margin-top: 28px;
  }

  /* Fog canvas — full screen */
  #fogCanvas {
    position: fixed; inset: 0;
    z-index: 10; cursor: pointer;
  }

  /* Glow when revealed */
  .glow {
    position: fixed; inset: 0; z-index: 4;
    background: radial-gradient(ellipse at center, rgba(255,150,100,0.07) 0%, transparent 65%);
    opacity: 0; transition: opacity 2s ease;
    pointer-events: none;
  }
  .glow.active { opacity: 1; }

  .prompt {
    position: fixed; bottom: 60px;
    left: 50%; transform: translateX(-50%);
    z-index: 20; text-align: center;
    transition: opacity 0.8s ease;
    pointer-events: none;
  }
  .prompt.hidden { opacity: 0; }
  .prompt-text {
    font-family: 'Caveat', cursive;
    font-size: 1.15rem;
    color: rgba(255,255,255,0.4);
    animation: pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 0.8; } }
</style>
</head>
<body>
<a class="back-link" href="../building-blocks.html">← blocks</a>
<div class="scene" id="scene"></div>
<div class="glow" id="glow"></div>

<div class="msg-layer">
  <div class="msg-box" id="msgBox">
    <div class="msg-label">a message written on the glass</div>
    <div class="msg-text" id="msgText">I think about you every time it rains. The way the world gets quiet and soft — that's what you feel like to me.</div>
    <div class="msg-sign">— always yours</div>
  </div>
</div>

<canvas id="fogCanvas"></canvas>

<div class="prompt" id="prompt">
  <div class="prompt-text">wipe the glass...</div>
</div>

<script>
(() => {
  const canvas = document.getElementById('fogCanvas');
  const ctx = canvas.getContext('2d');
  const prompt = document.getElementById('prompt');
  const glow = document.getElementById('glow');
  const msgBox = document.getElementById('msgBox');
  const msgText = document.getElementById('msgText');
  const scene = document.getElementById('scene');

  let W, H, dpr;
  let revealed = false, started = false, lastPos = null, wipeCount = 0;
  const RADIUS = 50;

  // Text area bounding box (where 80% matters)
  let textRect = null;

  function getTextRect() {
    const r = msgText.getBoundingClientRect();
    // Expand slightly around the text
    return {
      x: Math.max(0, r.left - 30),
      y: Math.max(0, r.top - 50),
      w: r.width + 60,
      h: r.height + 100
    };
  }

  function setup() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    textRect = getTextRect();
    drawFog();
  }

  function drawFog() {
    // Milky condensation
    ctx.fillStyle = 'rgba(190,200,212,0.92)';
    ctx.fillRect(0, 0, W, H);
    // Density patches
    for (let i = 0; i < 15; i++) {
      const x = Math.random() * W, y = Math.random() * H;
      const r = 60 + Math.random() * 120;
      const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
      grad.addColorStop(0, 'rgba(200,210,220,' + (0.04 + Math.random() * 0.04) + ')');
      grad.addColorStop(1, 'rgba(200,210,220,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(x - r, y - r, r * 2, r * 2);
    }
  }

  function wipe(x, y) {
    if (!started) { started = true; prompt.classList.add('hidden'); }

    ctx.save();
    ctx.globalCompositeOperation = 'destination-out';
    if (lastPos) {
      ctx.strokeStyle = 'rgba(0,0,0,1)';
      ctx.lineWidth = RADIUS * 2;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(lastPos.x, lastPos.y);
      ctx.lineTo(x, y);
      ctx.stroke();
    } else {
      ctx.fillStyle = 'rgba(0,0,0,1)';
      ctx.beginPath();
      ctx.arc(x, y, RADIUS, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();

    lastPos = { x, y };
    wipeCount++;

    // Check cleared percentage ONLY in the text area
    if (wipeCount % 8 === 0 && !revealed && textRect) {
      const sx = Math.floor(textRect.x * dpr);
      const sy = Math.floor(textRect.y * dpr);
      const sw = Math.floor(textRect.w * dpr);
      const sh = Math.floor(textRect.h * dpr);
      // Clamp to canvas bounds
      const cx = Math.max(0, Math.min(sx, canvas.width - 1));
      const cy = Math.max(0, Math.min(sy, canvas.height - 1));
      const cw = Math.min(sw, canvas.width - cx);
      const ch = Math.min(sh, canvas.height - cy);
      if (cw > 0 && ch > 0) {
        const sample = ctx.getImageData(cx, cy, cw, ch);
        const d = sample.data;
        let cleared = 0, total = 0;
        for (let i = 3; i < d.length; i += 32) {
          total++;
          if (d[i] < 40) cleared++;
        }
        if (total > 0 && cleared / total > 0.80) {
          revealed = true;
          glow.classList.add('active');
          canvas.style.transition = 'opacity 2s ease';
          canvas.style.opacity = '0';
          msgBox.classList.add('revealed');
          try { navigator.vibrate(15); } catch(e) {}
        }
      }
    }
  }

  // Touch
  canvas.addEventListener('touchstart', e => { e.preventDefault(); lastPos = null; wipe(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
  canvas.addEventListener('touchmove', e => { e.preventDefault(); wipe(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
  canvas.addEventListener('touchend', () => { lastPos = null; });

  // Mouse
  let md = false;
  canvas.addEventListener('mousedown', e => { md = true; lastPos = null; wipe(e.clientX, e.clientY); });
  canvas.addEventListener('mousemove', e => { if (md) wipe(e.clientX, e.clientY); });
  canvas.addEventListener('mouseup', () => { md = false; lastPos = null; });
  canvas.addEventListener('mouseleave', () => { md = false; lastPos = null; });

  // Create rain
  function makeRain() {
    for (let i = 0; i < 70; i++) {
      const drop = document.createElement('div');
      const heavy = Math.random() < 0.2;
      drop.className = 'rain' + (heavy ? ' heavy' : '');
      const h = heavy ? (25 + Math.random() * 40) : (10 + Math.random() * 25);
      const dur = heavy ? (0.4 + Math.random() * 0.5) : (0.5 + Math.random() * 0.8);
      drop.style.cssText = 'left:' + (Math.random() * 100) + '%;height:' + h + 'px;animation-duration:' + dur + 's;animation-delay:' + (-Math.random() * 3) + 's;';
      scene.appendChild(drop);
    }
  }

  // Water beads on glass
  function makeBeads() {
    for (let i = 0; i < 35; i++) {
      const b = document.createElement('div');
      b.className = 'bead';
      const s = 2 + Math.random() * 7;
      b.style.cssText = 'width:' + s + 'px;height:' + (s * (1 + Math.random() * 0.4)) + 'px;left:' + (Math.random() * 100) + '%;top:' + (Math.random() * 100) + '%;';
      scene.appendChild(b);
    }
  }

  // Bokeh lights
  function makeBokeh() {
    const colors = ['rgba(255,180,100,0.1)', 'rgba(100,170,255,0.06)', 'rgba(255,120,150,0.08)', 'rgba(255,220,100,0.07)', 'rgba(180,140,255,0.06)'];
    for (let i = 0; i < 20; i++) {
      const el = document.createElement('div');
      el.className = 'bokeh';
      const s = 4 + Math.random() * 22;
      el.style.cssText = 'width:' + s + 'px;height:' + s + 'px;left:' + (Math.random() * 100) + '%;top:' + (5 + Math.random() * 90) + '%;background:' + colors[Math.floor(Math.random() * colors.length)] + ';animation-duration:' + (6 + Math.random() * 10) + 's;animation-delay:' + (-Math.random() * 8) + 's;';
      scene.appendChild(el);
    }
  }

  window.addEventListener('resize', () => { if (!revealed) { setup(); } });
  // Water drops that drip down the foggy glass, leaving clear trails
  function startDrips() {
    const drips = [];
    const maxDrips = 6;

    function spawnDrip() {
      if (revealed) return;
      drips.push({
        x: 30 + Math.random() * (W - 60),
        y: -5,
        speed: 0.3 + Math.random() * 0.8,
        size: 3 + Math.random() * 4,
        wobble: (Math.random() - 0.5) * 0.3,
        trail: []
      });
      // Keep drip count limited
      if (drips.length > maxDrips) drips.shift();
    }

    function updateDrips() {
      if (revealed) return;
      ctx.save();
      ctx.globalCompositeOperation = 'destination-out';

      for (let i = drips.length - 1; i >= 0; i--) {
        const d = drips[i];
        d.y += d.speed;
        d.x += d.wobble + (Math.random() - 0.5) * 0.4;

        // Occasionally slow down or speed up (water tension)
        if (Math.random() < 0.02) d.speed = 0.2 + Math.random() * 0.6;
        if (Math.random() < 0.01) d.speed = 1 + Math.random() * 1.5;

        // Draw clear trail behind the drop
        const grad = ctx.createRadialGradient(d.x, d.y, 0, d.x, d.y, d.size * 1.5);
        grad.addColorStop(0, 'rgba(0,0,0,0.5)');
        grad.addColorStop(0.5, 'rgba(0,0,0,0.2)');
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(d.x, d.y, d.size * 1.5, 0, Math.PI * 2);
        ctx.fill();

        // Thin trail line
        if (d.trail.length > 0) {
          const last = d.trail[d.trail.length - 1];
          ctx.strokeStyle = 'rgba(0,0,0,0.12)';
          ctx.lineWidth = d.size * 0.5;
          ctx.lineCap = 'round';
          ctx.beginPath();
          ctx.moveTo(last.x, last.y);
          ctx.lineTo(d.x, d.y);
          ctx.stroke();
        }

        d.trail.push({ x: d.x, y: d.y });
        if (d.trail.length > 80) d.trail.shift();

        // Remove if off screen
        if (d.y > H + 10) {
          drips.splice(i, 1);
        }
      }
      ctx.restore();

      // Draw the drop itself (on top of the fog, as a visible bead)
      for (const d of drips) {
        // Tiny clear circle with a bright highlight — looks like a water drop
        ctx.save();
        ctx.globalCompositeOperation = 'destination-out';
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.beginPath();
        ctx.arc(d.x, d.y, d.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      requestAnimationFrame(updateDrips);
    }

    // Spawn drips periodically
    function spawnLoop() {
      if (revealed) return;
      spawnDrip();
      setTimeout(spawnLoop, 1500 + Math.random() * 3000);
    }

    spawnLoop();
    updateDrips();
  }

  setup();
  makeRain();
  makeBeads();
  makeBokeh();
  startDrips();
})();
</script>
</body>
</html>
