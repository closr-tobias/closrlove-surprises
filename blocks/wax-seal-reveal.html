<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Wax Seal Reveal — Closr Building Block</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Caveat:wght@400;500&family=Inter:wght@300;400&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden}
  body{
    background:#08080e;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-family:'Inter',sans-serif;
    min-height:100dvh;
    touch-action:none;user-select:none;-webkit-user-select:none;
    overflow:hidden;
  }

  .parchment{
    position:fixed;inset:0;
    background:
      radial-gradient(ellipse at 30% 40%, rgba(62,48,32,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 70% 60%, rgba(62,48,32,0.06) 0%, transparent 50%),
      linear-gradient(175deg, #1a1610 0%, #141110 40%, #0f0d0a 100%);
    z-index:0;
  }
  .parchment::before{
    content:'';position:absolute;inset:0;
    background:url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events:none;
  }
  .parchment::after{
    content:'';position:absolute;inset:0;
    background:
      radial-gradient(circle at 15% 20%, rgba(139,109,71,0.04) 0%, transparent 8%),
      radial-gradient(circle at 82% 35%, rgba(139,109,71,0.03) 0%, transparent 6%),
      radial-gradient(circle at 45% 80%, rgba(139,109,71,0.03) 0%, transparent 10%),
      radial-gradient(circle at 68% 75%, rgba(139,109,71,0.02) 0%, transparent 5%);
    pointer-events:none;
  }

  .dust{
    position:fixed;width:1px;height:1px;
    background:rgba(200,180,140,0.08);border-radius:50%;
    pointer-events:none;animation:dustFloat linear infinite;
  }
  @keyframes dustFloat{
    0%{transform:translateY(0) translateX(0);opacity:0}
    10%{opacity:1}90%{opacity:1}
    100%{transform:translateY(-100vh) translateX(20px);opacity:0}
  }

  .scene{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center}

  .message-container{
    position:relative;width:min(82vw, 320px);text-align:center;
    padding:40px 24px;opacity:0;transform:translateY(12px);
    transition:opacity 1.2s ease 0.3s, transform 1.2s ease 0.3s;
  }
  .message-container.revealed{opacity:1;transform:translateY(0)}

  .message-pre{
    font-family:'Cormorant Garamond',serif;font-size:0.7rem;font-weight:300;
    letter-spacing:4px;text-transform:uppercase;color:rgba(200,180,140,0.3);margin-bottom:20px;
  }
  .message-body{
    font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:300;font-style:italic;
    color:rgba(230,215,185,0.85);line-height:1.75;letter-spacing:0.3px;
  }
  .message-sig{
    font-family:'Caveat',cursive;font-size:1.1rem;color:rgba(200,180,140,0.4);margin-top:28px;
  }

  .seal-area{
    position:relative;width:140px;height:140px;margin-bottom:12px;cursor:pointer;
  }
  .seal-glow{
    position:absolute;inset:-30px;border-radius:50%;
    background:radial-gradient(circle, rgba(180,60,50,0.12) 0%, rgba(140,30,30,0.04) 40%, transparent 70%);
    filter:blur(10px);pointer-events:none;animation:sealPulse 3s ease-in-out infinite;
  }
  @keyframes sealPulse{0%,100%{opacity:0.6;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}

  .seal-canvas{width:140px;height:140px;position:relative;z-index:2}

  .fragment{position:absolute;pointer-events:none;will-change:transform,opacity}

  .seal-hint{
    position:absolute;bottom:-28px;left:0;right:0;text-align:center;
    font-size:0.55rem;letter-spacing:3px;text-transform:uppercase;
    color:rgba(200,180,140,0.15);pointer-events:none;animation:hintPulse 2s ease-in-out infinite;
  }
  @keyframes hintPulse{0%,100%{opacity:0.5}50%{opacity:1}}
  .seal-hint.hidden{opacity:0;transition:opacity 0.3s}

  .crack-flash{position:fixed;inset:0;background:rgba(255,200,150,0.04);pointer-events:none;opacity:0;z-index:100}

  .back-link{position:fixed;top:14px;left:14px;font-size:0.65rem;color:#ffffff12;text-decoration:none;z-index:200}
  .block-label{position:fixed;top:14px;right:14px;font-size:0.5rem;color:#ffffff0a;letter-spacing:1px;z-index:200}
</style>
</head>
<body>

<div class="parchment"></div>
<div class="crack-flash" id="flash"></div>

<a href="../building-blocks.html" class="back-link">← blocks</a>
<div class="block-label">closr · wax seal reveal</div>

<div class="scene">
  <div class="seal-area" id="sealArea">
    <div class="seal-glow" id="sealGlow"></div>
    <canvas class="seal-canvas" id="sealCanvas" width="280" height="280"></canvas>
    <div class="seal-hint" id="sealHint">press &amp; hold to break</div>
  </div>

  <div class="message-container" id="message">
    <!-- SLOT: message_pre -->
    <div class="message-pre">sealed with love</div>
    <!-- /SLOT -->
    <!-- SLOT: message_body -->
    <div class="message-body">
      Every night when we hang up the call, I hold my phone for a second longer —
      like maybe you can feel me holding on. Seven thousand miles is nothing when my
      heart crosses the distance every time you laugh.
    </div>
    <!-- /SLOT -->
    <!-- SLOT: message_sig -->
    <div class="message-sig">— forever yours, T ♡</div>
    <!-- /SLOT -->
  </div>
</div>

<script>
(function(){
  for(var i=0;i<12;i++){
    var d=document.createElement('div');d.className='dust';
    d.style.left=Math.random()*100+'vw';d.style.top=Math.random()*100+'vh';
    d.style.width=(Math.random()*1.5+0.5)+'px';d.style.height=d.style.width;
    d.style.animationDuration=(Math.random()*20+12)+'s';
    d.style.animationDelay=(Math.random()*12)+'s';
    document.body.appendChild(d);
  }

  var canvas=document.getElementById('sealCanvas');
  var ctx=canvas.getContext('2d');
  var W=280,H=280,cx=W/2,cy=H/2,R=56;

  function sealPath(c){
    c.beginPath();
    for(var a=0;a<Math.PI*2;a+=0.04){
      var noise=Math.sin(a*5)*2.5+Math.cos(a*7)*1.8+Math.sin(a*13)*1.2;
      var r=R+noise;
      var x=cx+Math.cos(a)*r*2;var y=cy+Math.sin(a)*r*2;
      if(a===0)c.moveTo(x,y);else c.lineTo(x,y);
    }
    c.closePath();
  }

  function drawHeart(c,ox,oy,s){
    c.moveTo(ox,oy-s*0.4);
    c.bezierCurveTo(ox,oy-s*0.8,ox-s,oy-s*0.8,ox-s,oy-s*0.3);
    c.bezierCurveTo(ox-s,oy+s*0.2,ox,oy+s*0.5,ox,oy+s*0.8);
    c.bezierCurveTo(ox,oy+s*0.5,ox+s,oy+s*0.2,ox+s,oy-s*0.3);
    c.bezierCurveTo(ox+s,oy-s*0.8,ox,oy-s*0.8,ox,oy-s*0.4);
  }

  function drawSealOn(c){
    c.save();
    sealPath(c);
    var g=c.createRadialGradient(cx-10,cy-12,0,cx,cy,R*2.2);
    g.addColorStop(0,'#c44038');g.addColorStop(0.3,'#a83028');
    g.addColorStop(0.6,'#8b2018');g.addColorStop(1,'#5e1410');
    c.fillStyle=g;c.fill();
    // Sheen
    c.save();c.clip();
    var sg=c.createRadialGradient(cx-18,cy-22,0,cx,cy,R*2);
    sg.addColorStop(0,'rgba(255,200,180,0.22)');
    sg.addColorStop(0.3,'rgba(255,150,130,0.06)');
    sg.addColorStop(1,'transparent');
    c.fillStyle=sg;c.fillRect(0,0,W,H);c.restore();
    // Embossed heart
    c.save();c.translate(cx,cy+2);c.scale(1.1,1.1);
    c.beginPath();drawHeart(c,0,0,18);
    c.strokeStyle='rgba(40,10,8,0.5)';c.lineWidth=2.5;c.stroke();
    c.beginPath();drawHeart(c,-0.8,-0.8,18);
    c.strokeStyle='rgba(255,180,160,0.15)';c.lineWidth=1.5;c.stroke();
    c.restore();
    // Initials
    c.font='600 18px "Cormorant Garamond", serif';
    c.textAlign='center';c.textBaseline='middle';
    c.fillStyle='rgba(40,10,8,0.4)';c.fillText('T & E',cx+0.5,cy+24.5);
    c.fillStyle='rgba(255,190,170,0.18)';c.fillText('T & E',cx-0.5,cy+23.5);
    // Edge
    sealPath(c);c.strokeStyle='rgba(30,5,5,0.3)';c.lineWidth=3;c.stroke();
    c.restore();
  }

  drawSealOn(ctx);

  // Generate angular fracture slices
  var fragData=[];
  var n=9;var angles=[];
  for(var i=0;i<n;i++)angles.push(Math.random()*Math.PI*2);
  angles.sort(function(a,b){return a-b});
  for(var i=0;i<angles.length;i++){
    var a1=angles[i],a2=angles[(i+1)%angles.length];
    if(a2<=a1)a2+=Math.PI*2;
    var mid=(a1+a2)/2;
    fragData.push({a1:a1,a2:a2,
      vx:Math.cos(mid)*3+(Math.random()-0.5)*2,
      vy:Math.sin(mid)*3+(Math.random()-0.5)*2-1.5,
      vr:(Math.random()-0.5)*10,gravity:0.1+Math.random()*0.05
    });
  }

  var broken=false,holdRaf=null,holdStartTime=0,HOLD_DURATION=800;
  var sealArea=document.getElementById('sealArea');
  var sealGlow=document.getElementById('sealGlow');
  var sealHint=document.getElementById('sealHint');
  var messageEl=document.getElementById('message');
  var flashEl=document.getElementById('flash');

  function wobble(t){
    var p=Math.min((t-holdStartTime)/HOLD_DURATION,1);
    var intensity=p*3.5;
    var shake=Math.sin(t*0.03)*intensity;
    canvas.style.transform='translateX('+shake+'px) scale('+(1+p*0.04)+')';
    sealGlow.style.opacity=0.6+p*0.8;
    sealGlow.style.transform='scale('+(1+p*0.25)+')';

    if(p>0.35){
      drawSealOn(ctx);
      ctx.save();ctx.globalAlpha=(p-0.35)/0.65*0.6;
      ctx.strokeStyle='rgba(20,5,5,0.8)';ctx.lineWidth=1.2;
      fragData.forEach(function(f){
        ctx.beginPath();ctx.moveTo(cx,cy);
        ctx.lineTo(cx+Math.cos(f.a1)*R*2.5,cy+Math.sin(f.a1)*R*2.5);
        ctx.stroke();
      });
      ctx.restore();
    }

    if(p>=1){breakSeal();return}
    holdRaf=requestAnimationFrame(wobble);
  }

  function startHold(){
    if(broken)return;
    holdStartTime=performance.now();
    holdRaf=requestAnimationFrame(wobble);
    if(navigator.vibrate)navigator.vibrate(30);
  }

  function endHold(){
    if(holdRaf){cancelAnimationFrame(holdRaf);holdRaf=null}
    if(!broken){
      canvas.style.transform='';canvas.style.transition='transform 0.3s';
      setTimeout(function(){canvas.style.transition=''},300);
      sealGlow.style.opacity='';sealGlow.style.transform='';
      drawSealOn(ctx);
    }
  }

  function breakSeal(){
    if(broken)return;broken=true;
    if(navigator.vibrate)navigator.vibrate([30,20,50,20,30]);
    flashEl.style.transition='opacity 0.05s';flashEl.style.opacity='1';
    setTimeout(function(){flashEl.style.transition='opacity 0.8s';flashEl.style.opacity='0'},60);
    canvas.style.opacity='0';canvas.style.transition='opacity 0.15s';
    sealGlow.style.transition='opacity 1s';sealGlow.style.opacity='0';
    sealHint.classList.add('hidden');

    var sealRect=canvas.getBoundingClientRect();

    fragData.forEach(function(f){
      var fc=document.createElement('canvas');
      fc.width=W;fc.height=H;fc.className='fragment';
      fc.style.width=sealRect.width+'px';fc.style.height=sealRect.height+'px';
      fc.style.left='0';fc.style.top='0';
      var fCtx=fc.getContext('2d');
      fCtx.beginPath();fCtx.moveTo(cx,cy);
      var steps=20;
      for(var s=0;s<=steps;s++){
        var a=f.a1+(f.a2-f.a1)*(s/steps);
        var noise=Math.sin(a*5)*2.5+Math.cos(a*7)*1.8+Math.sin(a*13)*1.2;
        var r=R+noise;
        fCtx.lineTo(cx+Math.cos(a)*r*2.3,cy+Math.sin(a)*r*2.3);
      }
      fCtx.closePath();fCtx.clip();
      drawSealOn(fCtx);
      // Crack edge darkening
      fCtx.beginPath();fCtx.moveTo(cx,cy);
      fCtx.lineTo(cx+Math.cos(f.a1)*R*2.5,cy+Math.sin(f.a1)*R*2.5);
      fCtx.strokeStyle='rgba(20,5,5,0.6)';fCtx.lineWidth=2;fCtx.stroke();

      sealArea.appendChild(fc);
      animFrag(fc,f);
    });

    setTimeout(function(){messageEl.classList.add('revealed')},500);
  }

  function animFrag(el,f){
    var x=0,y=0,rot=0,vx=f.vx*1.8,vy=f.vy*1.8,vr=f.vr,g=f.gravity*1.3,op=1,fr=0;
    function tick(){
      fr++;vx*=0.984;vy+=g;vy*=0.984;x+=vx;y+=vy;rot+=vr;vr*=0.98;
      if(fr>25)op=Math.max(0,op-0.018);
      el.style.transform='translateX('+x+'px) translateY('+y+'px) rotate('+rot+'deg)';
      el.style.opacity=op;
      if(op>0)requestAnimationFrame(tick);else el.remove();
    }
    requestAnimationFrame(tick);
  }

  sealArea.addEventListener('mousedown',function(e){e.preventDefault();startHold()});
  window.addEventListener('mouseup',endHold);
  sealArea.addEventListener('touchstart',function(e){e.preventDefault();startHold()},{passive:false});
  window.addEventListener('touchend',endHold);
  window.addEventListener('touchcancel',endHold);
})();
</script>
</body>
</html>
