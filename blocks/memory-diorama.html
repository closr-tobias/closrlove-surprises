<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Memory Diorama — Closr Building Block</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Caveat:wght@400;500;600&family=Inter:wght@300;400;500&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden}
  body{
    background:#08080e;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    font-family:'Inter',sans-serif;
    min-height:100dvh;
    touch-action:none;
    user-select:none;-webkit-user-select:none;
    overflow:hidden;
  }
  .back-link{
    position:fixed;top:16px;left:16px;z-index:100;
    color:rgba(255,255,255,0.4);text-decoration:none;
    font-size:0.85rem;font-weight:300;letter-spacing:0.5px;
    transition:color 0.3s;
  }
  .back-link:hover{color:rgba(255,255,255,0.8)}
  .diorama-wrapper{
    perspective:1000px;
    width:min(88vw,360px);
    height:min(110vw,460px);
    position:relative;z-index:10;
    animation:fadeIn 1.5s ease-out;
  }
  .diorama-box{
    width:100%;height:100%;
    position:relative;
    transform-style:preserve-3d;
    border-radius:8px;overflow:hidden;
  }
  .frame{
    position:absolute;inset:0;
    border:12px solid;
    border-image:linear-gradient(145deg,#2a2018,#4a3828,#3a2a1c,#2a2018) 1;
    border-radius:8px;z-index:50;pointer-events:none;
    box-shadow:inset 0 0 30px rgba(0,0,0,0.6),0 4px 20px rgba(0,0,0,0.5),0 12px 40px rgba(0,0,0,0.3);
  }
  .frame::after{content:'';position:absolute;inset:0;box-shadow:inset 0 0 60px rgba(0,0,0,0.5);pointer-events:none}
  .layer{position:absolute;inset:12px;will-change:transform}
  .layer-bg{
    background:linear-gradient(180deg,#0d1b2a 0%,#1b2838 30%,#2a1a2e 60%,#1a1028 100%);
    transform:translateZ(-120px) scale(1.3);
  }
  .star{
    position:absolute;width:2px;height:2px;
    background:white;border-radius:50%;
    animation:twinkle var(--dur) ease-in-out infinite alternate;
  }
  @keyframes twinkle{0%{opacity:0.2;transform:scale(0.8)}100%{opacity:var(--max-o,0.8);transform:scale(1.2)}}
  .aurora{
    position:absolute;top:20%;left:0;right:0;height:30%;
    background:linear-gradient(90deg,transparent 0%,rgba(100,200,255,0.03) 20%,rgba(180,120,255,0.05) 40%,rgba(255,100,180,0.04) 60%,rgba(100,200,255,0.03) 80%,transparent 100%);
    filter:blur(20px);animation:auroraShift 8s ease-in-out infinite alternate;
  }
  @keyframes auroraShift{0%{transform:translateX(-10px);opacity:0.6}100%{transform:translateX(10px);opacity:1}}
  .layer-mid-bg{transform:translateZ(-60px) scale(1.15)}
  .mountains{position:absolute;bottom:0;left:-10%;right:-10%;height:55%}
  .mountain{position:absolute;bottom:0;width:0;height:0;border-left:solid transparent;border-right:solid transparent;border-bottom:solid;opacity:0.7}
  .mountain-1{left:5%;border-left-width:100px;border-right-width:80px;border-bottom-width:160px;border-bottom-color:#1a1428}
  .mountain-2{left:25%;border-left-width:120px;border-right-width:90px;border-bottom-width:200px;border-bottom-color:#16102a}
  .mountain-3{left:50%;border-left-width:80px;border-right-width:110px;border-bottom-width:170px;border-bottom-color:#1e1430}
  .mountain-4{left:70%;border-left-width:90px;border-right-width:70px;border-bottom-width:140px;border-bottom-color:#18122a}
  .layer-mid{transform:translateZ(-20px) scale(1.05)}
  .tree{position:absolute;bottom:15%}
  .tree-trunk{width:6px;margin:0 auto;background:linear-gradient(180deg,#2a1e16,#1a1410);border-radius:2px}
  .tree-canopy{border-radius:50%;background:radial-gradient(circle at 40% 40%,#1a2a18,#0e1a0c);box-shadow:0 2px 8px rgba(0,0,0,0.3)}
  .tree-1{left:8%}.tree-1 .tree-trunk{height:30px}.tree-1 .tree-canopy{width:40px;height:40px;margin-left:-17px}
  .tree-2{left:85%}.tree-2 .tree-trunk{height:24px}.tree-2 .tree-canopy{width:32px;height:32px;margin-left:-13px}
  .tree-3{left:70%}.tree-3 .tree-trunk{height:36px}.tree-3 .tree-canopy{width:45px;height:42px;margin-left:-19px}
  .firefly{
    position:absolute;width:4px;height:4px;border-radius:50%;
    background:rgba(255,240,150,0.9);
    box-shadow:0 0 8px rgba(255,240,150,0.6),0 0 20px rgba(255,240,150,0.3);
    animation:fireflyDrift var(--dur) ease-in-out infinite alternate;
  }
  @keyframes fireflyDrift{0%{transform:translate(0,0);opacity:0.3}25%{opacity:0.9}50%{transform:translate(var(--dx),var(--dy));opacity:0.4}75%{opacity:0.8}100%{transform:translate(var(--dx2),var(--dy2));opacity:0.2}}
  .layer-content{transform:translateZ(20px) scale(0.98);display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:15%}
  .photo-frame{
    width:55%;aspect-ratio:3/4;
    background:linear-gradient(175deg,#f8f4ec,#ebe5d8);
    padding:6px 6px 22px 6px;border-radius:2px;
    box-shadow:0 4px 16px rgba(0,0,0,0.4),0 8px 30px rgba(0,0,0,0.2);
    transform:rotate(-3deg);position:relative;
  }
  .photo-inner{width:100%;height:100%;border-radius:1px;overflow:hidden;position:relative}
  .photo-placeholder{
    width:100%;height:100%;
    background:linear-gradient(145deg,#d4c5a9 0%,#c2b393 30%,#b8a888 50%,#c8b898 70%,#d0c4a8 100%);
    display:flex;align-items:center;justify-content:center;font-size:2.5rem;
  }
  .photo-caption{
    position:absolute;bottom:3px;left:0;right:0;text-align:center;
    font-family:'Caveat',cursive;font-size:0.7rem;color:#5a5045;font-weight:500;
  }
  .ground{
    position:absolute;bottom:0;left:-10%;right:-10%;height:22%;
    background:linear-gradient(180deg,#0e1a0c,#0a120a,#08100a);
    border-radius:50% 50% 0 0 / 20% 20% 0 0;
  }
  .grass-blade{
    position:absolute;bottom:0;width:2px;
    background:linear-gradient(180deg,#1a3018,#0e1a0c);
    border-radius:2px 2px 0 0;transform-origin:bottom center;
  }
  .layer-fg{transform:translateZ(80px) scale(0.92);pointer-events:none}
  .fg-flower{position:absolute}
  .petal{
    position:absolute;border-radius:50%;
    background:radial-gradient(circle at 40% 30%,var(--petal-light),var(--petal-dark));
    box-shadow:0 1px 4px rgba(0,0,0,0.2);
  }
  .petal-center{width:8px;height:8px;border-radius:50%;background:radial-gradient(circle,#ffe066,#ffcc00);position:relative;z-index:2}
  .flower-1{bottom:8%;left:5%}
  .flower-1 .petal{width:14px;height:20px;--petal-light:#ff9eb5;--petal-dark:#d4607a}
  .flower-1 .p1{transform:translate(-8px,-16px) rotate(-30deg)}
  .flower-1 .p2{transform:translate(4px,-18px) rotate(15deg)}
  .flower-1 .p3{transform:translate(10px,-8px) rotate(50deg)}
  .flower-1 .p4{transform:translate(-12px,-6px) rotate(-60deg)}
  .flower-1 .p5{transform:translate(-2px,-20px) rotate(0deg)}
  .flower-stem{width:2px;height:30px;background:linear-gradient(180deg,#2a5a28,#1a3a18);margin:0 auto;border-radius:1px}
  .flower-2{bottom:6%;right:8%}
  .flower-2 .petal{width:12px;height:16px;--petal-light:#c5a0ff;--petal-dark:#8a5cc0}
  .flower-2 .p1{transform:translate(-6px,-12px) rotate(-25deg)}
  .flower-2 .p2{transform:translate(4px,-14px) rotate(20deg)}
  .flower-2 .p3{transform:translate(8px,-4px) rotate(55deg)}
  .flower-2 .p4{transform:translate(-10px,-4px) rotate(-55deg)}
  .fg-heart{
    position:absolute;font-size:0.8rem;opacity:0.25;
    animation:heartFloat var(--dur) ease-in-out infinite alternate;
  }
  @keyframes heartFloat{0%{transform:translateY(0) rotate(var(--rot1));opacity:0.15}100%{transform:translateY(var(--dy)) rotate(var(--rot2));opacity:0.35}}
  .caption-area{margin-top:28px;text-align:center;z-index:10;animation:fadeIn 2s ease-out 0.5s both}
  .caption-title{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;color:rgba(255,255,255,0.9);letter-spacing:0.5px;margin-bottom:6px}
  .caption-sub{font-family:'Caveat',cursive;font-size:1rem;color:rgba(255,200,160,0.6);font-weight:400}
  .hint{
    position:fixed;bottom:24px;font-size:0.7rem;color:rgba(255,255,255,0.25);
    letter-spacing:1px;text-transform:uppercase;animation:hintPulse 3s ease-in-out infinite;
    transition:opacity 1s;
  }
  @keyframes hintPulse{0%,100%{opacity:0.25}50%{opacity:0.5}}
  .ambient-glow{
    position:fixed;width:300px;height:300px;border-radius:50%;
    background:radial-gradient(ellipse,rgba(120,80,200,0.04) 0%,transparent 70%);
    pointer-events:none;filter:blur(40px);z-index:1;
  }
  @keyframes fadeIn{0%{opacity:0;transform:translateY(20px)}100%{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<a href="../building-blocks.html" class="back-link">← blocks</a>
<div class="ambient-glow"></div>
<div class="diorama-wrapper" id="wrapper">
  <div class="diorama-box" id="box">
    <div class="frame"></div>
    <div class="layer layer-bg" data-depth="-120">
      <div class="aurora"></div>
      <div class="stars" id="stars"></div>
    </div>
    <div class="layer layer-mid-bg" data-depth="-60">
      <div class="mountains">
        <div class="mountain mountain-1"></div>
        <div class="mountain mountain-2"></div>
        <div class="mountain mountain-3"></div>
        <div class="mountain mountain-4"></div>
      </div>
    </div>
    <div class="layer layer-mid" data-depth="-20">
      <div class="tree tree-1"><div class="tree-canopy"></div><div class="tree-trunk"></div></div>
      <div class="tree tree-2"><div class="tree-canopy"></div><div class="tree-trunk"></div></div>
      <div class="tree tree-3"><div class="tree-canopy"></div><div class="tree-trunk"></div></div>
      <div id="fireflies"></div>
    </div>
    <div class="layer layer-content" data-depth="20">
      <div class="ground" id="ground"></div>
      <div class="photo-frame">
        <div class="photo-inner">
          <!-- SLOT: photo -->
          <div class="photo-placeholder">👫</div>
          <!-- /SLOT -->
        </div>
        <!-- SLOT: photo_caption -->
        <div class="photo-caption">that night in the park — July '25</div>
        <!-- /SLOT -->
      </div>
    </div>
    <div class="layer layer-fg" data-depth="80">
      <div class="fg-flower flower-1">
        <div class="petal p1"></div><div class="petal p2"></div>
        <div class="petal p3"></div><div class="petal p4"></div>
        <div class="petal p5"></div><div class="petal-center"></div>
        <div class="flower-stem"></div>
      </div>
      <div class="fg-flower flower-2">
        <div class="petal p1"></div><div class="petal p2"></div>
        <div class="petal p3"></div><div class="petal p4"></div>
        <div class="petal-center"></div>
      </div>
      <div id="fg-hearts"></div>
    </div>
  </div>
</div>
<div class="caption-area">
  <!-- SLOT: memory_title -->
  <div class="caption-title">The Night We Got Lost</div>
  <!-- /SLOT -->
  <!-- SLOT: memory_subtitle -->
  <div class="caption-sub">and found something better</div>
  <!-- /SLOT -->
</div>
<div class="hint" id="hint">tilt to explore</div>
<script>
(function(){
  const box=document.getElementById('box'),wrapper=document.getElementById('wrapper'),layers=box.querySelectorAll('.layer'),hint=document.getElementById('hint');
  const starsEl=document.getElementById('stars');
  for(let i=0;i<40;i++){const s=document.createElement('div');s.className='star';s.style.cssText='left:'+Math.random()*100+'%;top:'+Math.random()*70+'%;width:'+(1+Math.random()*2)+'px;height:'+(1+Math.random()*2)+'px;--dur:'+(2+Math.random()*4)+'s;--max-o:'+(0.4+Math.random()*0.5)+';animation-delay:'+Math.random()*3+'s';starsEl.appendChild(s)}
  const firefliesEl=document.getElementById('fireflies');
  for(let i=0;i<6;i++){const f=document.createElement('div');f.className='firefly';f.style.cssText='left:'+(10+Math.random()*80)+'%;top:'+(30+Math.random()*50)+'%;--dur:'+(3+Math.random()*5)+'s;--dx:'+(-20+Math.random()*40)+'px;--dy:'+(-15+Math.random()*30)+'px;--dx2:'+(-15+Math.random()*30)+'px;--dy2:'+(-20+Math.random()*40)+'px;animation-delay:'+Math.random()*4+'s';firefliesEl.appendChild(f)}
  const ground=document.getElementById('ground');
  for(let i=0;i<30;i++){const g=document.createElement('div');g.className='grass-blade';g.style.cssText='left:'+Math.random()*100+'%;height:'+(8+Math.random()*16)+'px;transform:rotate('+(-10+Math.random()*20)+'deg)';ground.appendChild(g)}
  const heartsEl=document.getElementById('fg-hearts');
  [{l:15,t:20},{l:80,t:35},{l:50,t:10},{l:30,t:60},{l:75,t:15}].forEach(function(p,i){const h=document.createElement('div');h.className='fg-heart';h.textContent='\u2665';h.style.cssText='left:'+p.l+'%;top:'+p.t+'%;--dur:'+(3+Math.random()*4)+'s;--dy:'+(-8-Math.random()*12)+'px;--rot1:'+(-15+Math.random()*30)+'deg;--rot2:'+(-15+Math.random()*30)+'deg;animation-delay:'+i*0.8+'s;font-size:'+(0.5+Math.random()*0.6)+'rem;color:rgba(255,'+(150+Math.random()*100|0)+','+(150+Math.random()*100|0)+',1)';heartsEl.appendChild(h)});
  let rx=0,ry=0,targetRx=0,targetRy=0,hasGyro=false;
  const scaleMap={'-120':1.3,'-60':1.15,'-20':1.05,'20':0.98,'80':0.92};
  function applyParallax(){
    box.style.transform='rotateX('+rx+'deg) rotateY('+ry+'deg)';
    layers.forEach(function(l){
      const d=parseFloat(l.dataset.depth)||0,f=d/200,tx=ry*f*2,ty=-rx*f*2,sc=scaleMap[String(d)]||1;
      l.style.transform='translateZ('+d+'px) scale('+sc+') translate('+tx+'px,'+ty+'px)';
    });
  }
  function animate(){rx+=(targetRx-rx)*0.08;ry+=(targetRy-ry)*0.08;applyParallax();requestAnimationFrame(animate)}
  animate();
  function handleOrientation(e){
    if(!hasGyro){hasGyro=true;hint.textContent='tilt your phone';setTimeout(function(){hint.style.opacity='0'},3000)}
    var beta=Math.max(-15,Math.min(15,(e.beta||0)-45)),gamma=Math.max(-15,Math.min(15,e.gamma||0));
    targetRx=beta*0.6;targetRy=gamma*0.6;
  }
  if(window.DeviceOrientationEvent){
    if(typeof DeviceOrientationEvent.requestPermission==='function'){
      wrapper.addEventListener('click',function once(){DeviceOrientationEvent.requestPermission().then(function(s){if(s==='granted')window.addEventListener('deviceorientation',handleOrientation)});wrapper.removeEventListener('click',once)});
      hint.textContent='tap, then tilt';
    }else{window.addEventListener('deviceorientation',handleOrientation)}
  }
  var dragging=false,startX,startY;
  wrapper.addEventListener('pointerdown',function(e){if(hasGyro)return;dragging=true;startX=e.clientX;startY=e.clientY});
  window.addEventListener('pointermove',function(e){if(!dragging)return;targetRy=Math.max(-12,Math.min(12,(e.clientX-startX)*0.08));targetRx=Math.max(-12,Math.min(12,-(e.clientY-startY)*0.08))});
  window.addEventListener('pointerup',function(){dragging=false;if(!hasGyro){targetRx=0;targetRy=0}});
  if(!hasGyro)setTimeout(function(){if(!hasGyro)hint.textContent='drag to explore'},2000);
})();
</script>
</body>
</html>
