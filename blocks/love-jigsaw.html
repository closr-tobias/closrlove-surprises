<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Love Jigsaw тАФ Closr Building Block</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Caveat:wght@400;500;700&family=Inter:wght@300;400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: #08080e;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: 'Inter', sans-serif;
    min-height: 100dvh;
    touch-action: none;
    user-select: none; -webkit-user-select: none;
    overflow: hidden;
  }
  .particle {
    position: fixed; width: 2px; height: 2px;
    background: rgba(255,255,255,0.05); border-radius: 50%;
    pointer-events: none; animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0% { transform: translateY(0) translateX(0); opacity: 0; }
    10% { opacity: 1; } 90% { opacity: 1; }
    100% { transform: translateY(-100vh) translateX(20px); opacity: 0; }
  }
  .back-link { position: fixed; top: 14px; left: 14px; font-size: 0.65rem; color: #ffffff12; text-decoration: none; z-index: 200; }
  .block-label { position: fixed; top: 14px; right: 14px; font-size: 0.5rem; color: #ffffff0a; letter-spacing: 1px; z-index: 200; }

  .title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem; color: rgba(255,255,255,0.12);
    letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 18px; text-align: center;
    pointer-events: none; transition: opacity 0.8s;
  }
  .progress-bar {
    width: min(74vw, 280px); height: 2px;
    background: rgba(255,255,255,0.04); border-radius: 1px;
    margin-bottom: 14px; overflow: hidden; transition: opacity 0.8s;
  }
  .progress-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, rgba(255,105,180,0.5), rgba(200,140,255,0.5));
    border-radius: 1px; transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .board {
    position: relative;
    width: min(78vw, 300px); height: min(78vw, 300px);
    border-radius: 4px;
  }
  .grid-bg {
    position: absolute; inset: 0; border-radius: 4px;
    background: rgba(255,255,255,0.015);
    border: 1px solid rgba(255,255,255,0.03);
    display: grid; grid-template-columns: repeat(4,1fr); grid-template-rows: repeat(4,1fr);
    gap: 1px; overflow: hidden;
  }
  .grid-cell {
    background: rgba(255,255,255,0.008);
    border: 1px dashed rgba(255,255,255,0.04);
    transition: border-color 0.3s, background 0.3s;
  }
  .grid-cell.highlight { border-color: rgba(255,105,180,0.25); background: rgba(255,105,180,0.04); }
  .grid-cell.placed { border-color: transparent; background: transparent; }

  .piece {
    position: absolute; border-radius: 2px; cursor: grab;
    transition: box-shadow 0.3s; will-change: transform; z-index: 10;
    box-shadow: 0 2px 12px rgba(0,0,0,0.4);
  }
  .piece:active { cursor: grabbing; }
  .piece.dragging { z-index: 100; box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 20px rgba(255,105,180,0.15); }
  .piece.placed { cursor: default; z-index: 5; box-shadow: none; border-radius: 0; }
  .piece.snap-anim {
    transition: left 0.35s cubic-bezier(0.34,1.56,0.64,1), top 0.35s cubic-bezier(0.34,1.56,0.64,1),
      transform 0.35s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.35s;
  }
  .piece-img {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem;
  }

  .sparkle {
    position: absolute; width: 4px; height: 4px;
    background: rgba(255,105,180,0.8); border-radius: 50%;
    pointer-events: none; animation: sparkleOut 0.6s ease-out forwards;
  }
  @keyframes sparkleOut {
    0% { transform: scale(1) translate(0,0); opacity: 1; }
    100% { transform: scale(0) translate(var(--sx), var(--sy)); opacity: 0; }
  }

  .board.complete .grid-bg { border-color: transparent; background: transparent; gap: 0; }
  .board.complete .grid-cell { border: none; background: transparent; }
  .board.complete::after {
    content: ''; position: absolute; inset: -20px; border-radius: 12px;
    background: radial-gradient(ellipse, rgba(255,105,180,0.06) 0%, transparent 70%);
    pointer-events: none; animation: glowPulse 3s ease-in-out infinite;
  }
  @keyframes glowPulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
  .board.complete .piece.placed .piece-img { animation: kenBurns 20s ease-in-out infinite alternate; }
  @keyframes kenBurns { 0% { transform: scale(1); } 100% { transform: scale(1.05) translate(-2px,-2px); } }

  .reveal-message {
    margin-top: 24px; text-align: center; opacity: 0;
    transform: translateY(15px); transition: opacity 1s 0.5s, transform 1s 0.5s; pointer-events: none;
  }
  .reveal-message.show { opacity: 1; transform: translateY(0); }
  .reveal-message .msg-text {
    font-family: 'Caveat', cursive; font-size: 1.35rem; font-weight: 500;
    color: rgba(255,255,255,0.7); line-height: 1.5; max-width: 280px;
  }
  .reveal-message .msg-sub {
    font-family: 'Inter', sans-serif; font-size: 0.6rem;
    color: rgba(255,255,255,0.1); margin-top: 12px; letter-spacing: 2px; text-transform: uppercase;
  }

  .counter {
    position: fixed; bottom: 44px; font-size: 0.55rem;
    color: rgba(255,255,255,0.08); letter-spacing: 3px;
    text-transform: uppercase; pointer-events: none; transition: opacity 0.8s;
  }
  .hint {
    position: fixed; bottom: 24px; font-size: 0.5rem;
    color: rgba(255,255,255,0.06); letter-spacing: 3px;
    text-transform: uppercase; pointer-events: none; transition: opacity 1s;
  }
  .confetti {
    position: fixed; pointer-events: none; z-index: 500;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    80% { opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* Photo-like gradient segments */
  .seg-0  { background: linear-gradient(135deg, #2a1f3d, #3d2952); }
  .seg-1  { background: linear-gradient(135deg, #3d2952, #5c3d6e); }
  .seg-2  { background: linear-gradient(135deg, #5c3d6e, #6e4a7a); }
  .seg-3  { background: linear-gradient(135deg, #6e4a7a, #4a3560); }
  .seg-4  { background: linear-gradient(135deg, #1e1832, #2a1f3d); }
  .seg-5  { background: linear-gradient(135deg, #e8a87c, #d4956a); }
  .seg-6  { background: linear-gradient(135deg, #d4956a, #c2825a); }
  .seg-7  { background: linear-gradient(135deg, #5c3d6e, #7a5290); }
  .seg-8  { background: linear-gradient(135deg, #1a1428, #1e1832); }
  .seg-9  { background: linear-gradient(135deg, #c2825a, #e8a87c); }
  .seg-10 { background: linear-gradient(135deg, #e8a87c, #f0b88c); }
  .seg-11 { background: linear-gradient(135deg, #7a5290, #5c3d6e); }
  .seg-12 { background: linear-gradient(135deg, #16101f, #1a1428); }
  .seg-13 { background: linear-gradient(135deg, #c2825a, #a07048); }
  .seg-14 { background: linear-gradient(135deg, #a07048, #8a6040); }
  .seg-15 { background: linear-gradient(135deg, #3d2952, #2a1f3d); }
</style>
</head>
<body>

<a href="../building-blocks.html" class="back-link">тЖР blocks</a>
<div class="block-label">closr ┬╖ love jigsaw</div>

<!-- SLOT: title -->
<div class="title" id="title">Piece us together</div>
<!-- /SLOT -->

<div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>

<div class="board" id="board">
  <div class="grid-bg" id="gridBg"></div>
</div>

<!-- SLOT: message -->
<div class="reveal-message" id="revealMessage">
  <div class="msg-text">Every piece of my life makes more sense with you in it. You're the part I didn't know was missing.</div>
  <div class="msg-sub">you complete the picture</div>
</div>
<!-- /SLOT -->

<div class="counter" id="counter">0 / 16</div>
<div class="hint" id="hint">drag pieces into place</div>

<script>
(function(){
  for(var i=0;i<12;i++){var p=document.createElement('div');p.className='particle';p.style.left=Math.random()*100+'vw';p.style.top=Math.random()*100+'vh';p.style.width=(Math.random()*2+1)+'px';p.style.height=p.style.width;p.style.animationDuration=(Math.random()*15+10)+'s';p.style.animationDelay=(Math.random()*10)+'s';document.body.appendChild(p);}

  var GRID=4,TOTAL=GRID*GRID;
  var board=document.getElementById('board'),gridBg=document.getElementById('gridBg');
  var progressFill=document.getElementById('progressFill'),counterEl=document.getElementById('counter');
  var hintEl=document.getElementById('hint'),titleEl=document.getElementById('title');
  var revealMsg=document.getElementById('revealMessage');
  var boardRect,cellSize,placedCount=0,pieces=[],cells=[],dragging=null,dragOffX=0,dragOffY=0,completed=false;
  var emojis=['ЁЯТЬ','тЬи','ЁЯМЩ','ЁЯТл','ЁЯдН','ЁЯТХ','ЁЯМ╕','тнР','ЁЯжЛ','ЁЯТЧ','ЁЯФо','ЁЯМЯ','ЁЯТЦ','ЁЯк╗','ЁЯдЮ','ЁЯТЮ'];

  function init(){
    boardRect=board.getBoundingClientRect();cellSize=boardRect.width/GRID;
    for(var i=0;i<TOTAL;i++){var c=document.createElement('div');c.className='grid-cell';c.dataset.index=i;gridBg.appendChild(c);cells.push(c);}
    var indices=[];for(var i=0;i<TOTAL;i++)indices.push(i);shuffle(indices);
    indices.forEach(function(origIdx,i){
      var piece=document.createElement('div');piece.className='piece seg-'+origIdx;piece.dataset.index=origIdx;
      piece.style.width=cellSize+'px';piece.style.height=cellSize+'px';
      var img=document.createElement('div');img.className='piece-img';img.textContent=emojis[origIdx];piece.appendChild(img);
      var rot=(Math.random()-0.5)*24;piece.dataset.rot=rot;
      var x=Math.random()*(boardRect.width-cellSize),y=Math.random()*(boardRect.height-cellSize);
      piece.style.left=x+'px';piece.style.top=y+'px';piece.style.transform='rotate('+rot+'deg)';
      board.appendChild(piece);pieces.push({el:piece,origIndex:origIdx,placed:false});
    });
    bindEvents();
  }

  function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}}
  function getTargetPos(idx){return{x:(idx%GRID)*cellSize,y:Math.floor(idx/GRID)*cellSize};}

  function bindEvents(){
    board.addEventListener('mousedown',function(e){e.preventDefault();startDrag(e.clientX,e.clientY);});
    window.addEventListener('mousemove',function(e){if(dragging){moveDrag(e.clientX,e.clientY);}});
    window.addEventListener('mouseup',endDrag);
    board.addEventListener('touchstart',function(e){e.preventDefault();startDrag(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
    window.addEventListener('touchmove',function(e){if(dragging){e.preventDefault();moveDrag(e.touches[0].clientX,e.touches[0].clientY);}},{passive:false});
    window.addEventListener('touchend',endDrag);
  }

  function findPieceAt(x,y){
    var hit=null;pieces.forEach(function(p){if(p.placed)return;var r=p.el.getBoundingClientRect();if(x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom)hit=p;});return hit;
  }

  function startDrag(cx,cy){
    if(completed)return;var p=findPieceAt(cx,cy);if(!p)return;
    dragging=p;var r=p.el.getBoundingClientRect();dragOffX=cx-r.left;dragOffY=cy-r.top;
    p.el.classList.add('dragging');p.el.style.zIndex=100;p.el.style.transition='box-shadow 0.2s';
    hintEl.style.opacity='0';
  }

  function moveDrag(cx,cy){
    var bRect=board.getBoundingClientRect();
    var x=cx-bRect.left-dragOffX,y=cy-bRect.top-dragOffY;
    dragging.el.style.left=x+'px';dragging.el.style.top=y+'px';
    dragging.el.style.transform='rotate('+(dragging.el.dataset.rot*0.3)+'deg) scale(1.08)';
    cells.forEach(function(c){c.classList.remove('highlight');});
    var target=getTargetPos(dragging.origIndex);
    if(Math.sqrt(Math.pow(x-target.x,2)+Math.pow(y-target.y,2))<cellSize*0.6){cells[dragging.origIndex].classList.add('highlight');}
  }

  function endDrag(){
    if(!dragging)return;var p=dragging;dragging=null;
    p.el.classList.remove('dragging');cells.forEach(function(c){c.classList.remove('highlight');});
    var curX=parseFloat(p.el.style.left),curY=parseFloat(p.el.style.top);
    var target=getTargetPos(p.origIndex);
    var dist=Math.sqrt(Math.pow(curX-target.x,2)+Math.pow(curY-target.y,2));
    if(dist<cellSize*0.55){snapPiece(p,target);}
    else{p.el.style.transition='transform 0.3s cubic-bezier(0.34,1.56,0.64,1)';p.el.style.transform='rotate('+p.el.dataset.rot+'deg)';p.el.style.zIndex=10;}
  }

  function snapPiece(p,target){
    p.placed=true;p.el.classList.add('snap-anim');
    p.el.style.left=target.x+'px';p.el.style.top=target.y+'px';
    p.el.style.transform='rotate(0deg) scale(1)';p.el.style.zIndex=5;
    cells[p.origIndex].classList.add('placed');
    if(navigator.vibrate)navigator.vibrate(15);
    spawnSparkles(target.x+cellSize/2,target.y+cellSize/2);
    placedCount++;progressFill.style.width=(placedCount/TOTAL*100)+'%';
    counterEl.textContent=placedCount+' / '+TOTAL;
    setTimeout(function(){p.el.classList.remove('snap-anim');p.el.classList.add('placed');},400);
    if(placedCount===TOTAL)setTimeout(onComplete,500);
  }

  function spawnSparkles(cx,cy){
    for(var i=0;i<6;i++){var s=document.createElement('div');s.className='sparkle';
      var angle=(Math.PI*2/6)*i,dist=15+Math.random()*20;
      s.style.setProperty('--sx',Math.cos(angle)*dist+'px');s.style.setProperty('--sy',Math.sin(angle)*dist+'px');
      s.style.left=cx+'px';s.style.top=cy+'px';
      s.style.background=['rgba(255,105,180,0.8)','rgba(200,140,255,0.8)','rgba(255,255,255,0.6)'][Math.floor(Math.random()*3)];
      board.appendChild(s);setTimeout(function(el){el.remove();},700,s);}
  }

  function onComplete(){
    completed=true;board.classList.add('complete');
    titleEl.style.opacity='0';document.getElementById('progressBar').style.opacity='0';
    counterEl.style.opacity='0';revealMsg.classList.add('show');
    if(navigator.vibrate)navigator.vibrate([30,50,30,50,60]);
    var colors=['#ff69b4','#c88cff','#ffb88c','#88d4ff','#fff','#ff9ec4','#b088ff'];
    for(var i=0;i<40;i++){var c=document.createElement('div');c.className='confetti';
      c.style.left=(Math.random()*100)+'vw';c.style.top='-10px';
      c.style.width=(Math.random()*6+3)+'px';c.style.height=(Math.random()*6+3)+'px';
      c.style.background=colors[Math.floor(Math.random()*colors.length)];
      c.style.borderRadius=Math.random()>0.5?'50%':'1px';
      c.style.animationDuration=(Math.random()*2+1.5)+'s';c.style.animationDelay=(Math.random()*0.8)+'s';
      document.body.appendChild(c);setTimeout(function(el){el.remove();},4000,c);}
  }

  init();
  window.addEventListener('resize',function(){boardRect=board.getBoundingClientRect();cellSize=boardRect.width/GRID;});
})();
</script>
</body>
</html>
