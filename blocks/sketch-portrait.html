<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sketch Portrait — Closr Building Block</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Caveat:wght@400;500;600&family=Inter:wght@300;400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: #08080e;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: 'Inter', sans-serif;
    min-height: 100dvh;
    touch-action: none;
    user-select: none; -webkit-user-select: none;
    overflow: hidden;
  }

  .back-link { position: fixed; top: 14px; left: 14px; font-size: 0.65rem; color: #ffffff12; text-decoration: none; z-index: 200; }
  .block-label { position: fixed; top: 14px; right: 14px; font-size: 0.5rem; color: #ffffff0a; letter-spacing: 1px; z-index: 200; }

  .paper-bg {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 50% 40%, rgba(245,240,230,0.03) 0%, transparent 60%), #08080e;
    pointer-events: none;
  }

  .shaving {
    position: fixed;
    width: 3px; height: 1px;
    background: rgba(180,160,130,0.08);
    border-radius: 50%;
    pointer-events: none;
    animation: drift linear infinite;
  }
  @keyframes drift {
    0% { transform: translateY(0) rotate(0deg); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 0.5; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  .sketchbook {
    position: relative;
    width: min(82vw, 320px);
    aspect-ratio: 3/4;
    background: linear-gradient(175deg, #f5f0e6, #ece5d8, #e8e0d0);
    border-radius: 3px;
    box-shadow:
      0 2px 6px rgba(0,0,0,0.2),
      0 12px 40px rgba(0,0,0,0.4),
      0 30px 80px rgba(0,0,0,0.3),
      inset 0 0 0 1px rgba(255,255,255,0.06);
    z-index: 10;
    overflow: hidden;
  }

  .sketchbook::before {
    content: '';
    position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='5' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 5;
  }

  .binding {
    position: absolute;
    left: -6px;
    top: 0; bottom: 0;
    width: 12px;
    display: flex;
    flex-direction: column;
    justify-content: space-evenly;
    padding: 20px 0;
    z-index: 6;
  }
  .binding-hole {
    width: 10px; height: 10px;
    border-radius: 50%;
    border: 1.5px solid rgba(180,170,150,0.3);
    background: rgba(8,8,14,0.4);
  }

  .sketch-canvas {
    position: absolute;
    inset: 12px;
    z-index: 2;
  }

  .photo-layer {
    position: absolute;
    inset: 12px;
    z-index: 1;
    border-radius: 1px;
    background:
      radial-gradient(ellipse at 50% 35%, #c4956a 0%, #a07850 25%, #8a6540 40%, transparent 65%),
      radial-gradient(ellipse at 50% 80%, #6b4f3a 0%, transparent 50%),
      linear-gradient(180deg, #d4b896 0%, #b8956e 30%, #9a7a58 60%, #7a5e42 100%);
    opacity: 0;
    transition: opacity 1.5s ease;
  }

  .watercolor {
    position: absolute;
    inset: 12px;
    z-index: 3;
    opacity: 0;
    pointer-events: none;
    mix-blend-mode: multiply;
  }

  .sketch-text {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    text-align: center;
    z-index: 20;
    padding: 20px 30px 70px;
    pointer-events: none;
  }

  .sketch-text .line {
    font-family: 'Caveat', cursive;
    font-size: 1.15rem;
    font-weight: 500;
    color: rgba(255,255,255,0);
    line-height: 1.5;
    transition: color 1.2s ease, transform 1.2s ease;
    transform: translateY(8px);
  }
  .sketch-text .line.visible {
    color: rgba(255,255,255,0.35);
    transform: translateY(0);
  }
  .sketch-text .line.final {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    font-weight: 300;
    font-style: italic;
    letter-spacing: 0.5px;
  }
  .sketch-text .line.final.visible {
    color: rgba(255,255,255,0.5);
  }

  .phase-hint {
    position: fixed;
    bottom: 24px;
    left: 0; right: 0;
    text-align: center;
    font-size: 0.5rem;
    color: #ffffff0d;
    letter-spacing: 3px;
    text-transform: uppercase;
    pointer-events: none;
    transition: opacity 0.8s;
  }

  .ambient-glow {
    position: fixed;
    width: 400px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(245,220,180,0.02) 0%, transparent 60%);
    pointer-events: none;
    filter: blur(50px);
    z-index: 1;
  }
</style>
</head>
<body>

<div class="paper-bg"></div>
<div class="ambient-glow"></div>

<a href="../building-blocks.html" class="back-link">← blocks</a>
<div class="block-label">closr · sketch portrait</div>

<div class="sketchbook" id="sketchbook">
  <div class="binding">
    <div class="binding-hole"></div>
    <div class="binding-hole"></div>
    <div class="binding-hole"></div>
    <div class="binding-hole"></div>
    <div class="binding-hole"></div>
  </div>
  <div class="photo-layer" id="photoLayer"></div>
  <canvas class="sketch-canvas" id="sketchCanvas"></canvas>
  <canvas class="watercolor" id="watercolorCanvas"></canvas>
</div>

<div class="sketch-text" id="sketchText">
  <!-- SLOT: sketch_lines -->
  <div class="line" data-phase="1">I drew you from memory today...</div>
  <div class="line" data-phase="2">Every line, every curve — I know them by heart</div>
  <div class="line" data-phase="3">The way your eyes crinkle when you laugh</div>
  <div class="line final" data-phase="4">But nothing I draw could ever capture the real you</div>
  <!-- /SLOT -->
</div>

<div class="phase-hint" id="hint">tap to begin</div>

<script>
(function(){
  for (var i = 0; i < 12; i++) {
    var s = document.createElement('div');
    s.className = 'shaving';
    s.style.left = Math.random() * 100 + 'vw';
    s.style.width = (Math.random() * 4 + 2) + 'px';
    s.style.height = (Math.random() * 1.5 + 0.5) + 'px';
    s.style.animationDuration = (Math.random() * 20 + 15) + 's';
    s.style.animationDelay = (Math.random() * 12) + 's';
    document.body.appendChild(s);
  }

  var canvas = document.getElementById('sketchCanvas');
  var ctx = canvas.getContext('2d');
  var wcCanvas = document.getElementById('watercolorCanvas');
  var wcCtx = wcCanvas.getContext('2d');
  var book = document.getElementById('sketchbook');
  var photoLayer = document.getElementById('photoLayer');
  var hint = document.getElementById('hint');
  var lines = document.querySelectorAll('.sketch-text .line');
  var phase = 0;

  function sizeCanvas() {
    var rect = canvas.getBoundingClientRect();
    var dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    wcCanvas.width = rect.width * dpr;
    wcCanvas.height = rect.height * dpr;
    wcCtx.scale(dpr, dpr);
  }
  sizeCanvas();

  var W, H;
  function dims() {
    var r = canvas.getBoundingClientRect();
    W = r.width; H = r.height;
  }
  dims();

  function generateStrokes() {
    dims();
    var strokes = [];
    var cx = W * 0.5, cy = H * 0.38;
    var faceW = W * 0.32, faceH = H * 0.28;

    // Face outline
    for (var a = 0; a < Math.PI * 2; a += 0.12) {
      var wobble = (Math.random() - 0.5) * 2.5;
      strokes.push({
        x1: cx + Math.cos(a) * (faceW + wobble),
        y1: cy + Math.sin(a) * (faceH + wobble),
        x2: cx + Math.cos(a + 0.12) * (faceW + (Math.random() - 0.5) * 2.5),
        y2: cy + Math.sin(a + 0.12) * (faceH + (Math.random() - 0.5) * 2.5),
        weight: 0.7 + Math.random() * 0.5, group: 1
      });
    }

    // Eyes
    var eyeY = cy - faceH * 0.12;
    [-1, 1].forEach(function(side) {
      var ex = cx + side * faceW * 0.35;
      for (var a = 0; a < Math.PI * 2; a += 0.25) {
        var ew = W * 0.055, eh = H * 0.018;
        strokes.push({
          x1: ex + Math.cos(a) * ew, y1: eyeY + Math.sin(a) * eh,
          x2: ex + Math.cos(a + 0.25) * ew, y2: eyeY + Math.sin(a + 0.25) * eh,
          weight: 0.5 + Math.random() * 0.4, group: 2
        });
      }
      // Pupil
      strokes.push({ x1: ex - 1.5, y1: eyeY, x2: ex + 1.5, y2: eyeY, weight: 2.2, group: 2 });
      // Eyelash hints
      for (var l = 0; l < 3; l++) {
        var la = -0.5 + l * 0.5;
        strokes.push({
          x1: ex + Math.cos(la) * ew, y1: eyeY + Math.sin(la) * eh - 1,
          x2: ex + Math.cos(la) * (ew + 3), y2: eyeY + Math.sin(la) * eh - 4,
          weight: 0.4, group: 2
        });
      }
    });

    // Eyebrows
    [-1, 1].forEach(function(side) {
      var bx = cx + side * faceW * 0.35;
      var by = eyeY - H * 0.04;
      for (var i = 0; i < 4; i++) {
        strokes.push({
          x1: bx - W * 0.04 + i * W * 0.02, y1: by + Math.sin(i * 0.8) * 2,
          x2: bx - W * 0.04 + (i + 1) * W * 0.02, y2: by + Math.sin((i + 1) * 0.8) * 2,
          weight: 0.6 + Math.random() * 0.3, group: 2
        });
      }
    });

    // Nose
    var noseY = cy + faceH * 0.1;
    strokes.push({ x1: cx - 2, y1: noseY - H * 0.05, x2: cx, y2: noseY + H * 0.02, weight: 0.6, group: 3 });
    strokes.push({ x1: cx, y1: noseY + H * 0.02, x2: cx + 5, y2: noseY - H * 0.01, weight: 0.5, group: 3 });

    // Mouth
    for (var a = 0.15; a < Math.PI - 0.15; a += 0.18) {
      var mw = W * 0.11, mh = H * 0.02;
      var my = cy + faceH * 0.38;
      strokes.push({
        x1: cx + Math.cos(a) * mw, y1: my + Math.sin(a) * mh,
        x2: cx + Math.cos(a + 0.18) * mw, y2: my + Math.sin(a + 0.18) * mh,
        weight: 0.6 + Math.random() * 0.3, group: 3
      });
    }
    // Upper lip
    strokes.push({ x1: cx - W * 0.08, y1: cy + faceH * 0.36, x2: cx, y2: cy + faceH * 0.34, weight: 0.5, group: 3 });
    strokes.push({ x1: cx, y1: cy + faceH * 0.34, x2: cx + W * 0.08, y2: cy + faceH * 0.36, weight: 0.5, group: 3 });

    // Hair
    for (var i = 0; i < 22; i++) {
      var hx = cx + (Math.random() - 0.5) * faceW * 2.4;
      var hy = cy - faceH - Math.random() * H * 0.06;
      var len = H * 0.05 + Math.random() * H * 0.12;
      var angle = Math.random() * 0.7 - 0.35 + Math.PI * 0.5;
      strokes.push({
        x1: hx, y1: hy,
        x2: hx + Math.cos(angle) * len * 0.4, y2: hy + Math.sin(angle) * len,
        weight: 0.3 + Math.random() * 0.7, group: 1
      });
    }

    // Neck + shoulders
    var shoulderY = cy + faceH + H * 0.06;
    strokes.push({ x1: cx - 5, y1: cy + faceH, x2: cx - 5, y2: shoulderY, weight: 0.7, group: 4 });
    strokes.push({ x1: cx + 5, y1: cy + faceH, x2: cx + 5, y2: shoulderY, weight: 0.7, group: 4 });
    strokes.push({ x1: cx - 5, y1: shoulderY, x2: cx - W * 0.38, y2: shoulderY + H * 0.1, weight: 0.8, group: 4 });
    strokes.push({ x1: cx + 5, y1: shoulderY, x2: cx + W * 0.38, y2: shoulderY + H * 0.1, weight: 0.8, group: 4 });

    // Shading cross-hatching
    for (var i = 0; i < 30; i++) {
      var sx = cx + (Math.random() - 0.5) * faceW * 1.6;
      var sy = cy + (Math.random() - 0.3) * faceH * 1.6;
      var sl = W * 0.015 + Math.random() * W * 0.035;
      var sa = Math.PI * 0.25 + Math.random() * 0.4;
      strokes.push({
        x1: sx, y1: sy,
        x2: sx + Math.cos(sa) * sl, y2: sy + Math.sin(sa) * sl,
        weight: 0.2 + Math.random() * 0.3, group: 5
      });
    }

    strokes.sort(function(a, b) { return a.group - b.group + (Math.random() - 0.5) * 0.3; });
    return strokes;
  }

  var strokes = generateStrokes();
  var strokeIdx = 0;

  function drawStroke(s) {
    ctx.beginPath();
    ctx.moveTo(s.x1, s.y1);
    var midX = (s.x1 + s.x2) / 2 + (Math.random() - 0.5) * 1.5;
    var midY = (s.y1 + s.y2) / 2 + (Math.random() - 0.5) * 1.5;
    ctx.quadraticCurveTo(midX, midY, s.x2, s.y2);
    ctx.strokeStyle = 'rgba(55,45,30,' + (0.45 + Math.random() * 0.35) + ')';
    ctx.lineWidth = s.weight;
    ctx.lineCap = 'round';
    ctx.stroke();
  }

  function animateSketch() {
    if (strokeIdx >= strokes.length) {
      setTimeout(function() { showLine(1); }, 400);
      setTimeout(function() { advanceToWatercolor(); }, 2200);
      return;
    }
    var batch = 2 + Math.floor(Math.random() * 2);
    for (var b = 0; b < batch && strokeIdx < strokes.length; b++) {
      drawStroke(strokes[strokeIdx]);
      strokeIdx++;
    }
    requestAnimationFrame(animateSketch);
  }

  function showLine(idx) {
    if (idx < lines.length) lines[idx].classList.add('visible');
  }

  function advanceToWatercolor() {
    phase = 2;
    showLine(2);
    var colors = [
      'rgba(200,140,100,0.06)', 'rgba(180,120,90,0.05)',
      'rgba(160,130,110,0.04)', 'rgba(220,180,150,0.05)',
      'rgba(190,150,120,0.04)', 'rgba(170,110,85,0.05)'
    ];
    var washIdx = 0;
    function addWash() {
      if (washIdx >= 10) {
        setTimeout(advanceToPhoto, 1500);
        return;
      }
      var x = Math.random() * W;
      var y = Math.random() * H;
      var r = W * 0.12 + Math.random() * W * 0.28;
      var color = colors[washIdx % colors.length];
      wcCtx.beginPath();
      var grad = wcCtx.createRadialGradient(x, y, 0, x, y, r);
      grad.addColorStop(0, color);
      grad.addColorStop(0.6, color.replace(/[\d.]+\)$/, '0.02)'));
      grad.addColorStop(1, 'transparent');
      wcCtx.fillStyle = grad;
      wcCtx.arc(x, y, r, 0, Math.PI * 2);
      wcCtx.fill();
      washIdx++;
      setTimeout(addWash, 220);
    }
    wcCanvas.style.opacity = '1';
    wcCanvas.style.transition = 'opacity 1s ease';
    addWash();
  }

  function advanceToPhoto() {
    phase = 3;
    showLine(3);
    canvas.style.transition = 'opacity 2.5s ease';
    canvas.style.opacity = '0.1';
    wcCanvas.style.transition = 'opacity 2.5s ease';
    wcCanvas.style.opacity = '0';
    photoLayer.style.opacity = '1';
    setTimeout(function() {
      photoLayer.style.transition = 'filter 1.5s ease';
      photoLayer.style.filter = 'brightness(1.1) saturate(1.15)';
      setTimeout(function() {
        photoLayer.style.filter = 'brightness(1) saturate(1)';
      }, 1500);
    }, 2500);
    hint.textContent = 'hold to redraw';
    hint.style.opacity = '1';
    setTimeout(function() { hint.style.opacity = ''; }, 3000);
    phase = 4;
  }

  var holdTimer = null;
  var isHolding = false;

  function onTap() {
    if (phase === 0) {
      phase = 1;
      hint.style.opacity = '0';
      showLine(0);
      setTimeout(animateSketch, 500);
    }
  }

  function onHoldStart() {
    if (phase < 4) return;
    holdTimer = setTimeout(function() {
      isHolding = true;
      var dpr = window.devicePixelRatio || 1;
      ctx.clearRect(0, 0, W * dpr, H * dpr);
      wcCtx.clearRect(0, 0, W * dpr, H * dpr);
      canvas.style.transition = 'opacity 0.3s';
      canvas.style.opacity = '1';
      wcCanvas.style.opacity = '0';
      photoLayer.style.opacity = '0';
      photoLayer.style.filter = '';
      lines.forEach(function(l) { l.classList.remove('visible'); });
      strokes = generateStrokes();
      strokeIdx = 0;
      phase = 1;
      showLine(0);
      setTimeout(animateSketch, 300);
    }, 600);
  }

  function onHoldEnd() {
    clearTimeout(holdTimer);
    if (!isHolding && phase === 0) onTap();
    isHolding = false;
  }

  book.addEventListener('touchstart', function(e) { e.preventDefault(); onHoldStart(); }, { passive: false });
  book.addEventListener('touchend', function(e) { e.preventDefault(); onHoldEnd(); }, { passive: false });
  book.addEventListener('mousedown', function(e) { e.preventDefault(); onHoldStart(); });
  book.addEventListener('mouseup', function() { onHoldEnd(); });
  book.addEventListener('click', function() { if (phase === 0) onTap(); });

  var breathT = 0;
  function breathe() {
    breathT += 0.008;
    var s = 1 + Math.sin(breathT) * 0.003;
    var r = Math.sin(breathT * 0.7) * 0.3;
    book.style.transform = 'scale(' + s + ') rotate(' + r + 'deg)';
    requestAnimationFrame(breathe);
  }
  breathe();
})();
</script>
</body>
</html>
