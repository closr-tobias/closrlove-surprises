<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sound Wave Portrait — Closr Building Block</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: #08080e;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: 'Inter', sans-serif;
    min-height: 100dvh;
    touch-action: none;
    user-select: none; -webkit-user-select: none;
    overflow: hidden;
    color: #fff;
  }

  .back-link {
    position: fixed; top: 16px; left: 16px;
    color: rgba(255,255,255,0.3); text-decoration: none;
    font-size: 0.8rem; z-index: 100;
    transition: color 0.3s;
  }
  .back-link:hover { color: rgba(255,255,255,0.6); }

  canvas#waveCanvas {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    z-index: 1;
  }

  .stars {
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none;
  }
  .star {
    position: absolute;
    width: 1.5px; height: 1.5px;
    background: #fff;
    border-radius: 50%;
    animation: twinkle ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    0% { opacity: 0.1; }
    100% { opacity: 0.7; }
  }

  .overlay {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start;
    padding-top: max(80px, 12vh);
    pointer-events: none;
  }

  .title-text {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300; font-style: italic;
    font-size: clamp(0.7rem, 2.5vw, 0.9rem);
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 16px;
    opacity: 0;
    animation: fadeInSlow 2s 0.5s forwards;
  }

  .phrase-display {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(1.6rem, 6.5vw, 2.8rem);
    text-align: center;
    padding: 0 32px;
    line-height: 1.35;
    opacity: 0;
    transition: opacity 1s ease;
    text-shadow: 0 0 40px rgba(167,139,250,0.25), 0 0 80px rgba(167,139,250,0.1);
    max-width: 90vw;
  }
  .phrase-display.visible { opacity: 1; }

  .tap-prompt {
    position: fixed;
    bottom: max(80px, 14vh);
    left: 50%; transform: translateX(-50%);
    z-index: 20;
    font-size: 0.7rem;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    pointer-events: all;
    cursor: pointer;
    animation: fadeInSlow 2s 1.5s forwards, gentlePulse 3s 3.5s ease-in-out infinite;
    opacity: 0;
    transition: opacity 0.6s;
  }
  .tap-prompt.hidden { opacity: 0 !important; pointer-events: none; }

  .sound-icon {
    position: fixed;
    top: 16px; right: 16px;
    z-index: 20;
    font-size: 1rem;
    color: rgba(255,255,255,0.2);
    opacity: 0;
    transition: opacity 0.6s;
  }
  .sound-icon.visible { opacity: 1; }

  .playhead-time {
    position: fixed;
    bottom: max(50px, 9vh);
    left: 50%; transform: translateX(-50%);
    z-index: 20;
    font-size: 0.6rem;
    color: rgba(255,255,255,0.18);
    letter-spacing: 0.08em;
    font-variant-numeric: tabular-nums;
    opacity: 0;
    transition: opacity 0.6s;
  }
  .playhead-time.visible { opacity: 1; }

  .keepsake-label {
    position: fixed;
    bottom: max(20px, 3vh);
    left: 50%; transform: translateX(-50%);
    z-index: 20;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.65rem;
    color: rgba(255,255,255,0.12);
    letter-spacing: 0.08em;
    opacity: 0;
    animation: fadeInSlow 3s 2s forwards;
    white-space: nowrap;
  }

  .ambient-glow {
    position: fixed;
    bottom: 15%; left: 50%;
    transform: translateX(-50%);
    width: 80vw; height: 35vh;
    background: radial-gradient(ellipse, rgba(167,139,250,0.05) 0%, rgba(236,72,153,0.02) 50%, transparent 70%);
    filter: blur(60px);
    pointer-events: none;
    z-index: 0;
  }

  /* Floating particles */
  .particle {
    position: fixed;
    width: 1.5px; height: 1.5px;
    background: rgba(167,139,250,0.15);
    border-radius: 50%;
    pointer-events: none;
    z-index: 2;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0% { transform: translateY(0) translateX(0); opacity: 0; }
    10% { opacity: 1; }
    85% { opacity: 0.6; }
    100% { transform: translateY(-40vh) translateX(20px); opacity: 0; }
  }

  @keyframes fadeInSlow { to { opacity: 1; } }
  @keyframes gentlePulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }
</style>
</head>
<body>

<a href="../building-blocks.html" class="back-link">← back</a>

<div class="stars" id="stars"></div>
<div class="ambient-glow"></div>

<canvas id="waveCanvas"></canvas>

<div class="overlay">
  <!-- SLOT: label -->
  <div class="title-text">the sound of us</div>
  <!-- /SLOT -->
  <!-- SLOT: phrase -->
  <div class="phrase-display" id="phrase"></div>
  <!-- /SLOT -->
</div>

<div class="tap-prompt" id="tapPrompt">tap the mountains to listen</div>
<div class="sound-icon" id="soundIcon">🔊</div>
<div class="playhead-time" id="playheadTime"></div>
<!-- SLOT: keepsake_label -->
<div class="keepsake-label">a portrait of three words that changed everything</div>
<!-- /SLOT -->

<script>
(() => {
  // ── Config ──
  const PHRASES = [
    /* SLOT: phrases_array */
    "I love you",
    "more than all the miles between us",
    "more than every sunrise\nI've watched wishing you were here",
    "you are my favorite sound",
    "and this is what it looks like"
    /* /SLOT */
  ];

  const PHRASE_DURATION = 4200;
  const MOUNTAIN_COLORS = {
    front: { r: 167, g: 139, b: 250 },
    mid: { r: 120, g: 80, b: 220 },
    back: { r: 75, g: 50, b: 160 },
    sky: { r: 236, g: 72, b: 153 }
  };

  // ── Stars ──
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 90; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 50 + '%';
    s.style.animationDuration = (2 + Math.random() * 5) + 's';
    s.style.animationDelay = Math.random() * 3 + 's';
    const size = Math.random() * 1.5 + 0.5;
    s.style.width = size + 'px';
    s.style.height = size + 'px';
    starsEl.appendChild(s);
  }

  // ── Floating particles from mountains ──
  function spawnParticle() {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = (10 + Math.random() * 80) + '%';
    p.style.bottom = (15 + Math.random() * 20) + '%';
    p.style.animationDuration = (4 + Math.random() * 6) + 's';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 10000);
  }
  setInterval(spawnParticle, 800);

  // ── Canvas Setup ──
  const canvas = document.getElementById('waveCanvas');
  const ctx = canvas.getContext('2d');
  let W, H;

  function resize() {
    const dpr = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    generateWaveform();
  }
  window.addEventListener('resize', resize);

  // ── Generate waveform data ──
  const POINTS = 220;
  let waveform = [];

  function generateWaveform() {
    waveform = [];
    for (let i = 0; i < POINTS; i++) {
      const t = i / POINTS;
      let amp = 0;
      // "I" - small peak
      amp += 0.35 * Math.exp(-Math.pow((t - 0.10) / 0.035, 2));
      // silence gap
      // "love" - big double peak
      amp += 0.95 * Math.exp(-Math.pow((t - 0.33) / 0.055, 2));
      amp += 0.7 * Math.exp(-Math.pow((t - 0.42) / 0.04, 2));
      // silence gap
      // "you" - medium peak
      amp += 0.75 * Math.exp(-Math.pow((t - 0.65) / 0.05, 2));
      amp += 0.4 * Math.exp(-Math.pow((t - 0.73) / 0.035, 2));
      // trailing breath
      amp += 0.12 * Math.exp(-Math.pow((t - 0.85) / 0.06, 2));
      // Organic texture
      amp += 0.06 * Math.sin(t * 53) + 0.04 * Math.sin(t * 97) + 0.03 * Math.cos(t * 31);
      amp = Math.max(0.025, Math.min(1, amp));
      amp *= (0.92 + Math.random() * 0.16);
      waveform.push(amp);
    }
  }

  // ── Audio ──
  let audioCtx = null;
  let isPlaying = false;
  let playbackProgress = 0;
  let playStartTime = 0;
  const PLAY_DURATION = PHRASES.length * PHRASE_DURATION / 1000 + 3;

  function playSound() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    audioCtx.resume();

    const now = audioCtx.currentTime;
    const dur = PLAY_DURATION;

    // Warm evolving pad
    [196, 262, 330].forEach((freq, fi) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();
      osc.type = 'sine';
      osc.frequency.value = freq;
      osc.frequency.linearRampToValueAtTime(freq * 0.94, now + dur / 2);
      osc.frequency.linearRampToValueAtTime(freq, now + dur);
      filter.type = 'lowpass';
      filter.frequency.value = 400 + fi * 100;
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(0.025 - fi * 0.005, now + 2);
      gain.gain.setValueAtTime(0.025 - fi * 0.005, now + dur - 3);
      gain.gain.linearRampToValueAtTime(0, now + dur);
      osc.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + dur);
    });

    // Heartbeat pulses
    for (let i = 0.5; i < dur - 1; i += 0.82) {
      const beatOsc = audioCtx.createOscillator();
      const beatGain = audioCtx.createGain();
      beatOsc.type = 'sine';
      beatOsc.frequency.value = 50;
      beatGain.gain.setValueAtTime(0, now + i);
      beatGain.gain.linearRampToValueAtTime(0.08, now + i + 0.04);
      beatGain.gain.exponentialRampToValueAtTime(0.001, now + i + 0.35);
      beatOsc.connect(beatGain);
      beatGain.connect(audioCtx.destination);
      beatOsc.start(now + i);
      beatOsc.stop(now + i + 0.4);

      if (navigator.vibrate) {
        setTimeout(() => navigator.vibrate(25), (i) * 1000);
      }
    }

    isPlaying = true;
    playStartTime = performance.now();
    setTimeout(() => { isPlaying = false; }, dur * 1000);
  }

  // ── Phrases ──
  const phraseEl = document.getElementById('phrase');
  const tapPrompt = document.getElementById('tapPrompt');
  const soundIcon = document.getElementById('soundIcon');
  const playheadTimeEl = document.getElementById('playheadTime');

  function showPhrases() {
    PHRASES.forEach((text, i) => {
      setTimeout(() => {
        phraseEl.classList.remove('visible');
        setTimeout(() => {
          phraseEl.innerHTML = text.replace(/\n/g, '<br>');
          phraseEl.classList.add('visible');
        }, 350);
      }, 800 + i * PHRASE_DURATION);
    });
  }

  let started = false;
  function startExperience() {
    if (started) return;
    started = true;
    tapPrompt.classList.add('hidden');
    soundIcon.classList.add('visible');
    playheadTimeEl.classList.add('visible');
    playSound();
    showPhrases();
  }

  tapPrompt.addEventListener('click', startExperience);
  tapPrompt.addEventListener('touchend', (e) => { e.preventDefault(); startExperience(); });
  canvas.addEventListener('click', (e) => {
    if (e.clientY / H > 0.35 && !started) startExperience();
  });

  // ── Render ──
  function drawMountainLayer(yBase, amplitude, color, alpha, phaseOffset, breathSpeed) {
    ctx.beginPath();
    for (let i = 0; i <= POINTS; i++) {
      const t = i / POINTS;
      const x = t * W;
      const wave = waveform[Math.min(i, waveform.length - 1)] || 0;
      const time = performance.now() / 1000;

      let mH = wave * amplitude * H * 0.32;
      mH *= 1 + 0.025 * Math.sin(time * breathSpeed + phaseOffset + t * 4);

      // Playback swell
      if (isPlaying) {
        const dist = Math.abs(t - playbackProgress);
        const glow = Math.max(0, 1 - dist * 6);
        mH *= 1 + glow * 0.2;
      }

      const y = yBase * H - mH;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.lineTo(W, H);
    ctx.lineTo(0, H);
    ctx.closePath();

    const grad = ctx.createLinearGradient(0, yBase * H - amplitude * H * 0.32, 0, H);
    grad.addColorStop(0, `rgba(${color.r},${color.g},${color.b},${alpha})`);
    grad.addColorStop(0.5, `rgba(${color.r * 0.4 | 0},${color.g * 0.3 | 0},${color.b * 0.6 | 0},${alpha * 0.6})`);
    grad.addColorStop(1, `rgba(8,8,14,${alpha * 0.9})`);
    ctx.fillStyle = grad;
    ctx.fill();
  }

  function drawPlayhead() {
    if (!isPlaying) return;
    const x = playbackProgress * W;

    // Soft vertical line
    const lineGrad = ctx.createLinearGradient(0, 0, 0, H);
    lineGrad.addColorStop(0, 'rgba(255,255,255,0)');
    lineGrad.addColorStop(0.3, 'rgba(255,255,255,0.04)');
    lineGrad.addColorStop(0.7, 'rgba(255,255,255,0.06)');
    lineGrad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, H);
    ctx.strokeStyle = lineGrad;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Glowing dot on front ridge
    const idx = Math.floor(playbackProgress * POINTS);
    if (idx >= 0 && idx < waveform.length) {
      const wave = waveform[idx];
      const y = 0.72 * H - wave * 0.8 * H * 0.32;

      // Outer glow
      const glowGrad = ctx.createRadialGradient(x, y, 0, x, y, 16);
      glowGrad.addColorStop(0, 'rgba(167,139,250,0.5)');
      glowGrad.addColorStop(0.5, 'rgba(167,139,250,0.1)');
      glowGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = glowGrad;
      ctx.fillRect(x - 16, y - 16, 32, 32);

      // Core dot
      ctx.beginPath();
      ctx.arc(x, y, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.fill();
    }
  }

  function drawReflection() {
    // Subtle reflection/water below mountains
    const reflectY = H * 0.88;
    const grad = ctx.createLinearGradient(0, reflectY, 0, H);
    grad.addColorStop(0, 'rgba(167,139,250,0.02)');
    grad.addColorStop(0.5, 'rgba(120,80,220,0.01)');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fillRect(0, reflectY, W, H - reflectY);
  }

  function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return `${m}:${sec.toString().padStart(2, '0')}`;
  }

  function render() {
    ctx.clearRect(0, 0, W, H);

    if (isPlaying) {
      const elapsed = (performance.now() - playStartTime) / 1000;
      playbackProgress = Math.min(1, elapsed / PLAY_DURATION);
      playheadTimeEl.textContent = `${formatTime(elapsed)} / ${formatTime(PLAY_DURATION)}`;
      if (playbackProgress >= 1) {
        isPlaying = false;
        playbackProgress = 0;
        started = false; // allow replay
      }
    }

    // Mountain layers back → front
    drawMountainLayer(0.88, 0.45, MOUNTAIN_COLORS.back, 0.25, 0, 0.25);
    drawMountainLayer(0.84, 0.6, MOUNTAIN_COLORS.mid, 0.45, 2.5, 0.35);
    drawMountainLayer(0.72, 0.8, MOUNTAIN_COLORS.front, 0.65, 5, 0.45);

    drawReflection();

    // Aurora glow during playback
    if (isPlaying) {
      const t = performance.now() / 1000;
      const a = 0.025 + 0.015 * Math.sin(t * 1.5);
      const skyGrad = ctx.createLinearGradient(0, H * 0.15, 0, H * 0.65);
      skyGrad.addColorStop(0, 'transparent');
      skyGrad.addColorStop(0.5, `rgba(${MOUNTAIN_COLORS.sky.r},${MOUNTAIN_COLORS.sky.g},${MOUNTAIN_COLORS.sky.b},${a})`);
      skyGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = skyGrad;
      ctx.fillRect(0, 0, W, H);
    }

    drawPlayhead();

    requestAnimationFrame(render);
  }

  resize();
  requestAnimationFrame(render);
})();
</script>
</body>
</html>
