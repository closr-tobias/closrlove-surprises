<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Love Mixtape — Closr Building Block</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Inter:wght@300;400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: #1a1215; font-family: 'Inter', sans-serif;
    min-height: 100dvh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    user-select: none; -webkit-user-select: none; color: #e8e0d8;
  }

  .cassette {
    width: min(360px, 90vw); aspect-ratio: 1.6;
    background: linear-gradient(160deg, #2a2024, #1e1518);
    border-radius: 12px; border: 2px solid #3a2a30;
    position: relative; box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 20px;
  }

  .label {
    width: 85%; height: 55%; background: #f5e6c8;
    border-radius: 6px; position: relative; overflow: hidden;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 12px;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
  }
  .label::before {
    content: ''; position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.02) 2px, rgba(0,0,0,0.02) 4px);
  }
  .label-title {
    font-family: 'Permanent Marker', cursive; font-size: 1.1rem;
    color: #2a1a1e; text-align: center; z-index: 1; margin-bottom: 4px;
  }
  .label-subtitle {
    font-size: 0.6rem; color: #8a6a5a; letter-spacing: 0.15em;
    text-transform: uppercase; z-index: 1;
  }
  .label-side {
    position: absolute; top: 6px; right: 8px;
    font-size: 0.5rem; color: #aa8a7a; font-weight: 600;
  }

  .reels {
    display: flex; gap: 30px; margin-top: 14px; align-items: center;
  }
  .reel {
    width: 52px; height: 52px; border-radius: 50%;
    background: #0a0608; border: 3px solid #2a2024;
    position: relative; display: flex; align-items: center; justify-content: center;
  }
  .reel-inner {
    width: 20px; height: 20px; border-radius: 50%;
    background: #1a1215; border: 2px solid #3a2a30;
    animation: spin 3s linear infinite;
  }
  .reel-inner.paused { animation-play-state: paused; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .reel-tape {
    position: absolute; inset: 4px; border-radius: 50%;
    border: 8px solid #1a0e12; opacity: 0.5;
  }

  .tracks {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: linear-gradient(180deg, transparent, rgba(26,18,21,0.95) 20%, #1a1215);
    padding: 30px 24px 48px; max-height: 45vh;
    display: flex; flex-direction: column; gap: 0;
  }

  .track {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
    cursor: pointer; transition: background 0.2s;
    opacity: 0; animation: trackIn 0.4s forwards;
  }
  .track:hover { background: rgba(255,255,255,0.03); }
  .track.playing .track-title { color: #ff69b4; }

  .track-num {
    font-size: 0.7rem; color: #555; width: 20px; text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .track-title { font-size: 0.85rem; color: #b0a8a0; flex: 1; line-height: 1.4; }
  .track-eq {
    display: flex; gap: 2px; align-items: flex-end; height: 16px;
    opacity: 0; transition: opacity 0.3s;
  }
  .track.playing .track-eq { opacity: 1; }
  .eq-bar {
    width: 3px; background: #ff69b4; border-radius: 2px;
    animation: eq 0.5s ease infinite alternate;
  }
  .eq-bar:nth-child(1) { height: 60%; animation-delay: 0s; }
  .eq-bar:nth-child(2) { height: 100%; animation-delay: 0.1s; }
  .eq-bar:nth-child(3) { height: 40%; animation-delay: 0.2s; }
  .eq-bar:nth-child(4) { height: 80%; animation-delay: 0.15s; }

  @keyframes eq {
    from { transform: scaleY(0.4); }
    to { transform: scaleY(1); }
  }
  @keyframes trackIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .play-btn {
    position: absolute; bottom: -40px; left: 50%; transform: translateX(-50%);
    width: 32px; height: 32px; background: none; border: 2px solid #ff69b4;
    border-radius: 50%; cursor: pointer; display: flex;
    align-items: center; justify-content: center;
  }
  .play-btn::after {
    content: ''; width: 0; height: 0;
    border-left: 10px solid #ff69b4; border-top: 6px solid transparent;
    border-bottom: 6px solid transparent; margin-left: 2px;
  }
  .play-btn.playing::after {
    border: none; width: 8px; height: 12px;
    border-left: 3px solid #ff69b4; border-right: 3px solid #ff69b4;
    margin-left: 0;
  }
</style>
</head>
<body>
<div class="cassette">
  <div class="label">
    <div class="label-side">SIDE A</div>
    <div class="label-title">AI_SLOT_1</div>
    <div class="label-subtitle">a mixtape for us</div>
  </div>
  <div class="reels">
    <div class="reel"><div class="reel-tape"></div><div class="reel-inner paused"></div></div>
    <div class="reel"><div class="reel-tape"></div><div class="reel-inner paused"></div></div>
  </div>
  <div class="play-btn" id="playBtn"></div>
</div>

<div class="tracks">
  <!-- AI SLOTS: 5 track titles, each a short love message or "song title" that's actually a message -->
  <div class="track" data-i="0" style="animation-delay:0.1s">
    <span class="track-num">01</span>
    <span class="track-title">AI_SLOT_2</span>
    <div class="track-eq"><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div></div>
  </div>
  <div class="track" data-i="1" style="animation-delay:0.2s">
    <span class="track-num">02</span>
    <span class="track-title">AI_SLOT_3</span>
    <div class="track-eq"><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div></div>
  </div>
  <div class="track" data-i="2" style="animation-delay:0.3s">
    <span class="track-num">03</span>
    <span class="track-title">AI_SLOT_4</span>
    <div class="track-eq"><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div></div>
  </div>
  <div class="track" data-i="3" style="animation-delay:0.4s">
    <span class="track-num">04</span>
    <span class="track-title">AI_SLOT_5</span>
    <div class="track-eq"><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div></div>
  </div>
  <div class="track" data-i="4" style="animation-delay:0.5s">
    <span class="track-num">05</span>
    <span class="track-title">AI_SLOT_6</span>
    <div class="track-eq"><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div></div>
  </div>
</div>

<script>
const tracks=document.querySelectorAll('.track');
const reels=document.querySelectorAll('.reel-inner');
const btn=document.getElementById('playBtn');
let playing=-1;

function play(i){
  tracks.forEach(t=>t.classList.remove('playing'));
  if(i===playing){playing=-1;reels.forEach(r=>r.classList.add('paused'));btn.classList.remove('playing');return;}
  playing=i;
  tracks[i].classList.add('playing');
  reels.forEach(r=>r.classList.remove('paused'));
  btn.classList.add('playing');
}

tracks.forEach((t,i)=>t.addEventListener('click',()=>play(i)));
btn.addEventListener('click',()=>{if(playing===-1)play(0);else play(playing);});
</script>
</body>
</html>
