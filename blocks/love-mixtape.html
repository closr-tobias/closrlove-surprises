<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Love Mixtape — Closr Building Block</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Caveat:wght@400;600&family=Inter:wght@300;400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: #08080e;
    font-family: 'Inter', sans-serif;
    min-height: 100dvh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    touch-action: none;
    user-select: none; -webkit-user-select: none;
    overflow: hidden;
    color: #f0ece4;
  }

  .back-link { position: fixed; top: 14px; left: 14px; font-size: 0.65rem; color: #ffffff12; text-decoration: none; z-index: 200; }
  .block-label { position: fixed; top: 14px; right: 14px; font-size: 0.5rem; color: #ffffff0a; letter-spacing: 1px; z-index: 200; }

  .ambient {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 400px; height: 400px;
    background: radial-gradient(ellipse, rgba(255,140,50,0.04) 0%, rgba(180,100,200,0.02) 40%, transparent 70%);
    pointer-events: none; filter: blur(60px);
  }

  .dust {
    position: fixed; width: 1px; height: 1px;
    background: rgba(255,200,100,0.08);
    border-radius: 50%; pointer-events: none;
    animation: dustFloat linear infinite;
  }
  @keyframes dustFloat {
    0% { transform: translateY(0) translateX(0); opacity: 0; }
    15% { opacity: 1; }
    85% { opacity: 1; }
    100% { transform: translateY(-80vh) translateX(20px); opacity: 0; }
  }

  /* === CASSETTE === */
  .cassette-wrap {
    position: relative;
    width: min(82vw, 320px);
    z-index: 10;
  }

  .cassette {
    position: relative;
    width: 100%;
    aspect-ratio: 1.58 / 1;
    background: linear-gradient(180deg, #2a2520 0%, #1e1a16 40%, #15120f 100%);
    border-radius: 12px 12px 8px 8px;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.04),
      0 4px 12px rgba(0,0,0,0.4),
      0 12px 40px rgba(0,0,0,0.5),
      inset 0 1px 0 rgba(255,255,255,0.06),
      inset 0 -1px 0 rgba(0,0,0,0.3);
    overflow: hidden;
    padding: 10px 14px;
    display: flex; flex-direction: column;
    transition: transform 0.3s;
  }

  .cassette::before {
    content: '';
    position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='60' height='60' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; border-radius: 12px;
  }

  .label {
    position: relative;
    background: linear-gradient(180deg, #f5ede0 0%, #ebe3d3 50%, #e2d9c8 100%);
    border-radius: 4px;
    padding: 8px 10px 6px;
    margin-bottom: 6px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.5), 0 1px 2px rgba(0,0,0,0.15);
    flex-shrink: 0;
  }

  .label-title {
    font-family: 'Caveat', cursive;
    font-size: 1.15rem;
    font-weight: 600;
    color: #3a2f25;
    text-align: center;
    line-height: 1.1;
  }
  .label-subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 0.45rem;
    color: #8a7d6d;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-top: 2px;
  }
  .label-lines {
    margin-top: 5px;
    display: flex; flex-direction: column; gap: 3px;
  }
  .label-line {
    height: 1px;
    background: linear-gradient(90deg, transparent, #c8b89d 20%, #c8b89d 80%, transparent);
    opacity: 0.4;
  }

  .reels-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20%;
    position: relative;
  }

  .reels-area::before {
    content: '';
    position: absolute;
    width: 72%; height: 80%;
    border-radius: 6px;
    background: rgba(0,0,0,0.4);
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.03);
  }

  .reel {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: radial-gradient(circle, #1a1714 30%, #2a2520 60%, #1a1714 100%);
    box-shadow: inset 0 0 8px rgba(0,0,0,0.5), 0 0 0 2px #2a2520, 0 0 0 3px rgba(0,0,0,0.3);
    position: relative;
    z-index: 2;
  }
  .reel::after {
    content: '';
    position: absolute;
    inset: 35%; border-radius: 50%;
    background: #15120f;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.6);
  }
  .reel-spoke {
    position: absolute;
    width: 2px; height: 100%;
    left: calc(50% - 1px); top: 0;
    transform-origin: center center;
    background: linear-gradient(180deg, transparent 5%, #3a3530 20%, #3a3530 80%, transparent 95%);
  }
  .reel.spinning .reel-spoke {
    animation: spinReel 2s linear infinite;
  }
  @keyframes spinReel {
    to { transform: rotate(calc(var(--base) + 360deg)); }
  }

  .cassette-bottom {
    display: flex; justify-content: space-between;
    padding: 0 4px;
    flex-shrink: 0;
  }
  .screw {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #4a4540, #2a2520);
    box-shadow: inset 0 -1px 1px rgba(255,255,255,0.05);
  }

  /* === TRACKLIST === */
  .tracklist {
    margin-top: 20px;
    width: min(82vw, 320px);
    display: flex; flex-direction: column;
    gap: 1px;
  }

  .track {
    display: flex; align-items: center;
    padding: 10px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.3s;
    -webkit-tap-highlight-color: transparent;
  }
  .track:active { background: rgba(255,255,255,0.03); }

  .track-num {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: #ffffff18;
    width: 20px;
    flex-shrink: 0;
  }

  .track-name {
    flex: 1;
    font-size: 0.78rem;
    font-weight: 300;
    color: #f0ece488;
    letter-spacing: 0.3px;
    transition: color 0.4s;
  }
  .track.active .track-name { color: #f0ece4; }

  .track-dur {
    font-family: 'Space Mono', monospace;
    font-size: 0.55rem;
    color: #ffffff15;
    flex-shrink: 0;
    margin-left: 8px;
  }

  .track-eq {
    display: flex; gap: 2px; align-items: flex-end;
    height: 12px; margin-right: 8px;
    opacity: 0;
    transition: opacity 0.3s;
    flex-shrink: 0;
  }
  .track.active .track-eq { opacity: 1; }
  .eq-bar {
    width: 2px;
    background: #ff8c50;
    border-radius: 1px;
    animation: eqBounce 0.6s ease-in-out infinite alternate;
  }
  .eq-bar:nth-child(1) { height: 4px; animation-delay: 0s; }
  .eq-bar:nth-child(2) { height: 8px; animation-delay: 0.15s; }
  .eq-bar:nth-child(3) { height: 5px; animation-delay: 0.3s; }
  @keyframes eqBounce {
    0% { transform: scaleY(0.3); }
    100% { transform: scaleY(1); }
  }

  /* === LYRICS OVERLAY === */
  .lyrics-overlay {
    position: fixed; inset: 0;
    background: #08080e;
    z-index: 100;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .lyrics-overlay.visible { opacity: 1; pointer-events: auto; }

  .lyrics-close {
    position: absolute; top: 16px; right: 16px;
    width: 32px; height: 32px;
    border: none; background: rgba(255,255,255,0.05);
    border-radius: 50%;
    color: #fff4;
    font-size: 1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    z-index: 101;
  }

  .lyrics-track-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.5rem;
    color: #ff8c5060;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .lyrics-container {
    padding: 0 32px;
    max-width: 340px;
    text-align: center;
  }

  .lyric-line {
    font-family: 'Caveat', cursive;
    font-size: 1.6rem;
    font-weight: 400;
    line-height: 1.5;
    color: #f0ece4;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.8s, transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
    margin-bottom: 4px;
  }
  .lyric-line.visible { opacity: 1; transform: translateY(0); }
  .lyric-line.emphasis {
    color: #ff8c50;
    font-size: 1.85rem;
    text-shadow: 0 0 30px rgba(255,140,80,0.2);
  }

  .lyrics-eq {
    display: flex; gap: 3px; align-items: flex-end;
    height: 16px; margin-top: 24px; opacity: 0.3;
  }
  .lyrics-eq .eq-bar { width: 3px; background: #ff8c5060; }

  .lyrics-progress {
    position: absolute;
    bottom: 40px;
    left: 32px; right: 32px;
    height: 2px;
    background: rgba(255,255,255,0.05);
    border-radius: 1px;
    overflow: hidden;
  }
  .lyrics-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #ff8c50, #ff6b9d);
    border-radius: 1px;
    width: 0%;
    transition: width 0.3s linear;
  }

  .lyrics-hint {
    position: absolute;
    bottom: 20px;
    font-size: 0.45rem;
    color: #ffffff0d;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .hint-main {
    position: fixed;
    bottom: 20px;
    font-size: 0.45rem;
    color: #ffffff0d;
    letter-spacing: 2px;
    text-transform: uppercase;
    z-index: 10;
  }
</style>
</head>
<body>

<div class="ambient"></div>
<a href="../building-blocks.html" class="back-link">← blocks</a>
<div class="block-label">closr · love mixtape</div>

<div class="cassette-wrap">
  <div class="cassette" id="cassette">
    <div class="label">
      <!-- SLOT: mixtape_title -->
      <div class="label-title">Songs That Sound Like Us</div>
      <!-- /SLOT -->
      <!-- SLOT: mixtape_subtitle -->
      <div class="label-subtitle">Made for Erica · Side A</div>
      <!-- /SLOT -->
      <div class="label-lines">
        <div class="label-line"></div>
        <div class="label-line"></div>
        <div class="label-line"></div>
      </div>
    </div>
    <div class="reels-area">
      <div class="reel" id="reelL">
        <div class="reel-spoke" style="--base:0deg; transform:rotate(0deg)"></div>
        <div class="reel-spoke" style="--base:60deg; transform:rotate(60deg)"></div>
        <div class="reel-spoke" style="--base:120deg; transform:rotate(120deg)"></div>
      </div>
      <div class="reel" id="reelR">
        <div class="reel-spoke" style="--base:30deg; transform:rotate(30deg)"></div>
        <div class="reel-spoke" style="--base:90deg; transform:rotate(90deg)"></div>
        <div class="reel-spoke" style="--base:150deg; transform:rotate(150deg)"></div>
      </div>
    </div>
    <div class="cassette-bottom">
      <div class="screw"></div>
      <div class="screw"></div>
    </div>
  </div>
</div>

<div class="tracklist" id="tracklist">
  <!-- SLOT: tracks -->
  <div class="track" data-lyrics="The way you laugh at your own jokes before you finish telling them.|That little nose scrunch when you're pretending to be mad.|I fall in love with you in the smallest moments —|*the ones you don't even notice.*">
    <div class="track-eq"><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div></div>
    <div class="track-num">01</div>
    <div class="track-name">The Nose Scrunch</div>
    <div class="track-dur">0:42</div>
  </div>
  <div class="track" data-lyrics="3,847 miles is just a number.|But every mile has a memory attached to it —|the airport hugs, the countdown texts,|the way you whisper 'soon' like a promise.|*Distance doesn't scare us anymore.*">
    <div class="track-eq"><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div></div>
    <div class="track-num">02</div>
    <div class="track-name">Miles Between</div>
    <div class="track-dur">1:03</div>
  </div>
  <div class="track" data-lyrics="It was 2 AM your time, 11 PM mine.|You were half asleep, mumbling about Kiru.|I said something dumb. You laughed anyway.|That's when I thought —|*this is the person I want every 2 AM with.*">
    <div class="track-eq"><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div></div>
    <div class="track-num">03</div>
    <div class="track-name">2 AM, Your Time</div>
    <div class="track-dur">0:56</div>
  </div>
  <div class="track" data-lyrics="You make ordinary things feel cinematic.|Grocery lists become adventures.|Bad days become stories we'll tell later.|*With you, nothing is mundane.*|Not even silence.">
    <div class="track-eq"><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div></div>
    <div class="track-num">04</div>
    <div class="track-name">Nothing Mundane</div>
    <div class="track-dur">0:38</div>
  </div>
  <div class="track" data-lyrics="One day there won't be a goodbye at the airport.|One day 'goodnight' won't mean hanging up.|One day I'll turn over and you'll just… be there.|*That day is coming. I can feel it.*">
    <div class="track-eq"><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div></div>
    <div class="track-num">05</div>
    <div class="track-name">One Day</div>
    <div class="track-dur">0:51</div>
  </div>
  <!-- /SLOT -->
</div>

<div class="hint-main">tap a track to play</div>

<div class="lyrics-overlay" id="lyricsOverlay">
  <button class="lyrics-close" id="lyricsClose">✕</button>
  <div class="lyrics-track-label" id="lyricsTrackLabel">Track 01</div>
  <div class="lyrics-container" id="lyricsContainer"></div>
  <div class="lyrics-eq">
    <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
  </div>
  <div class="lyrics-progress"><div class="lyrics-progress-fill" id="lyricsFill"></div></div>
  <div class="lyrics-hint">tap anywhere to skip</div>
</div>

<script>
(function(){
  for (var i = 0; i < 12; i++) {
    var d = document.createElement('div');
    d.className = 'dust';
    d.style.left = Math.random() * 100 + 'vw';
    d.style.top = (50 + Math.random() * 50) + 'vh';
    d.style.animationDuration = (12 + Math.random() * 18) + 's';
    d.style.animationDelay = (Math.random() * 12) + 's';
    d.style.width = (1 + Math.random()) + 'px';
    d.style.height = d.style.width;
    document.body.appendChild(d);
  }

  var tracks = document.querySelectorAll('.track');
  var overlay = document.getElementById('lyricsOverlay');
  var container = document.getElementById('lyricsContainer');
  var trackLabel = document.getElementById('lyricsTrackLabel');
  var closeBtn = document.getElementById('lyricsClose');
  var fill = document.getElementById('lyricsFill');
  var reelL = document.getElementById('reelL');
  var reelR = document.getElementById('reelR');
  var cassette = document.getElementById('cassette');
  var activeTrack = null;
  var lineTimers = [];
  var progressTimer = null;

  function setSpinning(on) {
    reelL.classList.toggle('spinning', on);
    reelR.classList.toggle('spinning', on);
  }

  function clearTimers() {
    lineTimers.forEach(function(t){ clearTimeout(t); });
    lineTimers = [];
    if (progressTimer) clearInterval(progressTimer);
  }

  function playTrack(idx) {
    var track = tracks[idx];
    tracks.forEach(function(t){ t.classList.remove('active'); });
    track.classList.add('active');
    activeTrack = idx;
    setSpinning(true);

    var raw = track.dataset.lyrics.split('|');
    var lines = raw.map(function(l){
      var isEmphasis = l.trim().startsWith('*') && l.trim().endsWith('*');
      var text = l.replace(/^\*|\*$/g, '').trim();
      return { text: text, emphasis: isEmphasis };
    });

    container.innerHTML = '';
    trackLabel.textContent = 'Track ' + String(idx + 1).padStart(2, '0');
    fill.style.transition = 'none';
    fill.style.width = '0%';

    lines.forEach(function(l) {
      var div = document.createElement('div');
      div.className = 'lyric-line' + (l.emphasis ? ' emphasis' : '');
      div.textContent = l.text;
      container.appendChild(div);
    });

    overlay.classList.add('visible');

    var delay = 600;
    var perLine = 1200;
    var totalDuration = delay + lines.length * perLine + 800;
    var lineEls = container.querySelectorAll('.lyric-line');

    clearTimers();

    lineEls.forEach(function(el, i) {
      lineTimers.push(setTimeout(function(){ el.classList.add('visible'); }, delay + i * perLine));
    });

    var startTime = Date.now();
    fill.offsetHeight;
    fill.style.transition = 'width 0.3s linear';
    progressTimer = setInterval(function(){
      var pct = Math.min(((Date.now() - startTime) / totalDuration) * 100, 100);
      fill.style.width = pct + '%';
      if (pct >= 100) clearInterval(progressTimer);
    }, 100);

    lineTimers.push(setTimeout(function(){ closeLyrics(); }, totalDuration));
  }

  function closeLyrics() {
    clearTimers();
    overlay.classList.remove('visible');
    setSpinning(false);
    tracks.forEach(function(t){ t.classList.remove('active'); });
    activeTrack = null;
  }

  overlay.addEventListener('click', function(e) {
    if (e.target === closeBtn || closeBtn.contains(e.target)) return;
    var hidden = container.querySelectorAll('.lyric-line:not(.visible)');
    if (hidden.length > 0) hidden[0].classList.add('visible');
    else closeLyrics();
  });

  closeBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    closeLyrics();
  });

  tracks.forEach(function(track, idx) {
    track.addEventListener('click', function() {
      if (activeTrack === idx) closeLyrics();
      else playTrack(idx);
    });
  });

  var wrap = document.querySelector('.cassette-wrap');
  wrap.addEventListener('touchstart', function(){ cassette.style.transform = 'scale(0.98)'; });
  wrap.addEventListener('touchend', function(){ cassette.style.transform = 'scale(1)'; });
})();
</script>
</body>
</html>
