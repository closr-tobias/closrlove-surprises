<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bloom Garden — Closr Building Block</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Caveat:wght@400;600;700&family=Inter:wght@300;400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: #08080e;
    font-family: 'Inter', sans-serif;
    min-height: 100dvh;
    touch-action: none;
    user-select: none; -webkit-user-select: none;
    overflow: hidden;
    position: relative;
  }

  .ground {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 35%;
    background: linear-gradient(to top, rgba(22,38,20,0.5) 0%, rgba(15,28,14,0.2) 60%, transparent 100%);
    pointer-events: none;
    z-index: 1;
  }

  .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .star {
    position: absolute;
    width: 1.5px; height: 1.5px;
    background: rgba(255,255,255,0.15);
    border-radius: 50%;
    animation: twinkle 4s ease-in-out infinite alternate;
  }
  @keyframes twinkle { 0% { opacity: 0.1; } 100% { opacity: 0.5; } }

  .moon {
    position: fixed;
    top: 8%; right: 12%;
    width: 50px; height: 50px;
    background: radial-gradient(circle at 35% 35%, #f5f0d0, #e8dfa8);
    border-radius: 50%;
    box-shadow: 0 0 40px rgba(245,240,208,0.15), 0 0 80px rgba(245,240,208,0.06);
    pointer-events: none;
    z-index: 1;
  }

  #garden { position: fixed; inset: 0; z-index: 5; }

  .prompt {
    position: fixed;
    bottom: 38%;
    left: 0; right: 0;
    text-align: center;
    z-index: 10;
    pointer-events: none;
    transition: opacity 1.5s ease;
  }
  .prompt-line1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    font-style: italic;
    color: rgba(255,255,255,0.18);
    letter-spacing: 0.5px;
  }
  .prompt-line2 {
    font-size: 0.55rem;
    color: rgba(255,255,255,0.08);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 10px;
  }
  .prompt.hidden { opacity: 0; }

  .complete-msg {
    position: fixed;
    bottom: 10%;
    left: 10%; right: 10%;
    text-align: center;
    z-index: 20;
    pointer-events: none;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 2s ease, transform 2s ease;
  }
  .complete-msg.show { opacity: 1; transform: translateY(0); }
  .complete-msg .full-text {
    font-family: 'Caveat', cursive;
    font-size: 1.4rem;
    font-weight: 600;
    color: rgba(255,255,255,0.7);
    line-height: 1.6;
    text-shadow: 0 0 30px rgba(255,150,200,0.2);
  }

  .progress {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px; height: 2px;
    background: rgba(255,255,255,0.04);
    border-radius: 2px;
    z-index: 20;
    overflow: hidden;
    transition: opacity 1s;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, rgba(255,130,180,0.4), rgba(180,130,255,0.4));
    border-radius: 2px;
    transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1);
  }
  .progress.hidden { opacity: 0; }

  .back-link { position: fixed; top: 14px; left: 14px; font-size: 0.65rem; color: #ffffff12; text-decoration: none; z-index: 200; }
  .block-label { position: fixed; top: 14px; right: 14px; font-size: 0.5rem; color: #ffffff0a; letter-spacing: 1px; z-index: 200; }
</style>
</head>
<body>

<a href="../building-blocks.html" class="back-link">← blocks</a>
<div class="block-label">closr · bloom garden</div>

<div class="stars" id="stars"></div>
<div class="moon"></div>
<div class="ground"></div>

<canvas id="garden"></canvas>

<div class="prompt" id="prompt">
  <!-- SLOT: prompt_text -->
  <div class="prompt-line1">tap anywhere to plant</div>
  <!-- /SLOT -->
  <div class="prompt-line2">each bloom holds a word for you</div>
</div>

<div class="progress" id="progress">
  <div class="progress-fill" id="progressFill"></div>
</div>

<div class="complete-msg" id="completeMsg">
  <div class="full-text" id="fullText"></div>
</div>

<script>
(function(){
  // <!-- SLOT: bloom_words --> Array of words/phrases forming the message
  var words = [
    "You","brought","color","into","a","world",
    "I","didn't","know","was","grey","—",
    "and","now","everything","blooms"
  ];
  // <!-- /SLOT -->

  // <!-- SLOT: complete_message --> Full message shown at end
  var completeMessage = "You brought color into a world I didn\u2019t know was grey \u2014 and now everything blooms \ud83c\udf38";
  // <!-- /SLOT -->

  var canvas = document.getElementById('garden');
  var ctx = canvas.getContext('2d');
  var blooms = [];
  var wordIndex = 0;
  var totalWords = words.length;
  var completed = false;
  var particles = [];

  function resize() {
    canvas.width = window.innerWidth * 2;
    canvas.height = window.innerHeight * 2;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.setTransform(2, 0, 0, 2, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  var starsEl = document.getElementById('stars');
  for (var i = 0; i < 50; i++) {
    var s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random()*100+'%';
    s.style.top = Math.random()*60+'%';
    s.style.animationDelay = Math.random()*4+'s';
    s.style.animationDuration = (3+Math.random()*3)+'s';
    var sz = (Math.random()*1.5+0.5)+'px';
    s.style.width = sz; s.style.height = sz;
    starsEl.appendChild(s);
  }

  var palettes = [
    {petals:'#ff8ab5',center:'#ffcc66',glow:'rgba(255,138,181,0.3)'},
    {petals:'#c490f0',center:'#ffd9a0',glow:'rgba(196,144,240,0.3)'},
    {petals:'#89d4f5',center:'#ffeeaa',glow:'rgba(137,212,245,0.25)'},
    {petals:'#ffb3d1',center:'#fffacd',glow:'rgba(255,179,209,0.3)'},
    {petals:'#a8e6a3',center:'#fff5a0',glow:'rgba(168,230,163,0.25)'},
    {petals:'#f0a0d0',center:'#ffd580',glow:'rgba(240,160,208,0.3)'},
    {petals:'#b8a0f0',center:'#ffe0a0',glow:'rgba(184,160,240,0.25)'},
  ];

  function createBloom(x,y,word){
    var pal = palettes[Math.floor(Math.random()*palettes.length)];
    blooms.push({
      x:x,y:y,word:word,palette:pal,
      petalCount:5+Math.floor(Math.random()*3),
      size:18+Math.random()*10,
      rotation:Math.random()*Math.PI*2,
      scale:0,targetScale:1,opacity:0,targetOpacity:1,
      wobble:0,wobbleSpeed:0.02+Math.random()*0.01,
      stemHeight:30+Math.random()*40,stemGrown:0,
      phase:'stem',time:0,wordOpacity:0
    });
    for(var i=0;i<8;i++){
      var a=(Math.PI*2/8)*i+Math.random()*0.5;
      var sp=1+Math.random()*2;
      particles.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,life:1,decay:0.015+Math.random()*0.01,color:pal.petals,size:2+Math.random()*2});
    }
    if(navigator.vibrate)navigator.vibrate(15);
  }

  function drawStem(b){
    if(b.stemGrown<=0)return;
    ctx.save();
    ctx.strokeStyle='rgba(80,140,70,0.5)';
    ctx.lineWidth=1.5;
    ctx.beginPath();
    var baseY=b.y,topY=b.y-b.stemHeight*b.stemGrown;
    ctx.moveTo(b.x,baseY);
    ctx.quadraticCurveTo(b.x+Math.sin(b.wobble)*4,(baseY+topY)/2,b.x+Math.sin(b.wobble)*2,topY);
    ctx.stroke();
    if(b.stemGrown>0.5){
      ctx.fillStyle='rgba(100,170,80,0.35)';
      ctx.beginPath();
      ctx.ellipse(b.x+6,baseY-b.stemHeight*0.45,5,2.5,0.5,0,Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawFlower(b){
    if(b.scale<=0.01)return;
    var fx=b.x+Math.sin(b.wobble)*2;
    var fy=b.y-b.stemHeight*b.stemGrown;
    ctx.save();
    ctx.translate(fx,fy);
    ctx.scale(b.scale,b.scale);
    ctx.rotate(b.rotation);
    ctx.globalAlpha=b.opacity;
    ctx.shadowColor=b.palette.glow;
    ctx.shadowBlur=20;
    ctx.fillStyle=b.palette.petals;
    for(var i=0;i<b.petalCount;i++){
      var a=(Math.PI*2/b.petalCount)*i;
      ctx.save();ctx.rotate(a);
      ctx.beginPath();
      ctx.ellipse(0,-b.size*0.55,b.size*0.32,b.size*0.55,0,0,Math.PI*2);
      ctx.fill();ctx.restore();
    }
    ctx.shadowBlur=0;
    ctx.fillStyle=b.palette.center;
    ctx.beginPath();ctx.arc(0,0,b.size*0.22,0,Math.PI*2);ctx.fill();
    ctx.restore();
    if(b.wordOpacity>0){
      ctx.save();
      ctx.globalAlpha=b.wordOpacity*0.85;
      ctx.font='600 13px Caveat, cursive';
      ctx.fillStyle='#fff';
      ctx.textAlign='center';
      ctx.shadowColor='rgba(0,0,0,0.6)';
      ctx.shadowBlur=6;
      ctx.fillText(b.word,fx,fy-b.size-8);
      ctx.restore();
    }
  }

  function updateBloom(b){
    b.wobble+=b.wobbleSpeed;
    if(b.phase==='stem'){
      b.stemGrown+=0.03;
      if(b.stemGrown>=1){b.stemGrown=1;b.phase='bloom';}
    }else if(b.phase==='bloom'){
      b.scale+=(b.targetScale-b.scale)*0.08;
      b.opacity+=(b.targetOpacity-b.opacity)*0.08;
      if(b.scale>0.9)b.phase='word';
    }else{
      b.scale+=(b.targetScale-b.scale)*0.04;
      b.opacity+=(b.targetOpacity-b.opacity)*0.04;
      b.wordOpacity+=(1-b.wordOpacity)*0.05;
    }
  }

  function drawParticles(){
    for(var i=particles.length-1;i>=0;i--){
      var p=particles[i];
      p.x+=p.vx;p.y+=p.vy;p.vy+=0.03;p.life-=p.decay;
      if(p.life<=0){particles.splice(i,1);continue;}
      ctx.save();ctx.globalAlpha=p.life*0.7;
      ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=4;
      ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }
  }

  var fireflies=[];
  for(var i=0;i<8;i++){
    fireflies.push({
      x:Math.random()*window.innerWidth,
      y:window.innerHeight*0.3+Math.random()*window.innerHeight*0.5,
      phase:Math.random()*Math.PI*2,
      speed:0.005+Math.random()*0.008,
      radius:20+Math.random()*40
    });
  }

  function drawFireflies(){
    for(var i=0;i<fireflies.length;i++){
      var f=fireflies[i];f.phase+=f.speed;
      var fx=f.x+Math.sin(f.phase)*f.radius;
      var fy=f.y+Math.cos(f.phase*0.7)*f.radius*0.5;
      var g=0.15+Math.sin(f.phase*2)*0.1;
      ctx.save();ctx.globalAlpha=g;ctx.fillStyle='#ffe88a';
      ctx.shadowColor='rgba(255,232,138,0.4)';ctx.shadowBlur=10;
      ctx.beginPath();ctx.arc(fx,fy,2,0,Math.PI*2);ctx.fill();ctx.restore();
    }
  }

  function render(){
    ctx.clearRect(0,0,canvas.width/2,canvas.height/2);
    drawFireflies();
    for(var i=0;i<blooms.length;i++){updateBloom(blooms[i]);drawStem(blooms[i]);drawFlower(blooms[i]);}
    drawParticles();
    requestAnimationFrame(render);
  }
  requestAnimationFrame(render);

  function handleTap(cx,cy){
    if(completed||wordIndex>=totalWords)return;
    var word=words[wordIndex];wordIndex++;
    var x=cx+(Math.random()-0.5)*30;
    var y=cy+(Math.random()-0.5)*20;
    x=Math.max(40,Math.min(window.innerWidth-40,x));
    y=Math.max(100,Math.min(window.innerHeight-80,y));
    createBloom(x,y,word);
    document.getElementById('progressFill').style.width=(wordIndex/totalWords*100)+'%';
    if(wordIndex===1)document.getElementById('prompt').classList.add('hidden');
    if(wordIndex>=totalWords){
      completed=true;
      setTimeout(function(){
        document.getElementById('progress').classList.add('hidden');
        document.getElementById('fullText').textContent=completeMessage;
        document.getElementById('completeMsg').classList.add('show');
        for(var i=0;i<30;i++){
          var a=Math.random()*Math.PI*2,sp=1+Math.random()*3;
          var pl=palettes[Math.floor(Math.random()*palettes.length)];
          particles.push({x:window.innerWidth/2,y:window.innerHeight/2,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,life:1,decay:0.008+Math.random()*0.006,color:pl.petals,size:2+Math.random()*3});
        }
        if(navigator.vibrate)navigator.vibrate([20,50,20]);
      },1800);
    }
  }

  canvas.addEventListener('click',function(e){handleTap(e.clientX,e.clientY);});
  canvas.addEventListener('touchstart',function(e){e.preventDefault();handleTap(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
})();
</script>
</body>
</html>
