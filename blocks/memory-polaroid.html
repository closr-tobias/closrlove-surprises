<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Memory Polaroid — Closr Building Block</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: #0a0a12;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: 'Inter', sans-serif;
    min-height: 100dvh;
    touch-action: none;
    user-select: none; -webkit-user-select: none;
  }

  .stack {
    position: relative;
    width: min(72vw, 280px);
    height: min(92vw, 380px);
  }

  .polaroid {
    position: absolute;
    inset: 0;
    background: #f5f0e8;
    padding: 12px 12px 44px 12px;
    border-radius: 3px;
    box-shadow: 0 6px 30px rgba(0,0,0,0.5);
    display: flex; flex-direction: column;
    will-change: transform;
    cursor: grab;
  }
  .polaroid:active { cursor: grabbing; }

  .polaroid-img {
    flex: 1;
    background: linear-gradient(135deg, #c8b8a0, #e8d8c4);
    border-radius: 1px;
    display: flex; align-items: center; justify-content: center;
    font-size: 3.5rem;
    overflow: hidden;
  }

  .polaroid-caption {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 0.8rem;
    color: #3a3028;
    text-align: center;
    margin-top: 10px;
    line-height: 1.5;
  }

  .counter {
    position: fixed;
    bottom: 50px;
    left: 0; right: 0;
    text-align: center;
    font-size: 0.65rem;
    color: #ffffff20;
    letter-spacing: 3px;
    pointer-events: none;
  }

  .hint {
    position: fixed;
    bottom: 28px;
    left: 0; right: 0;
    text-align: center;
    font-size: 0.55rem;
    color: #ffffff12;
    letter-spacing: 2px;
    text-transform: uppercase;
    pointer-events: none;
  }

  .back-link {
    position: fixed; top: 14px; left: 14px;
    font-size: 0.65rem; color: #ffffff15;
    text-decoration: none; z-index: 200;
  }
  .block-label {
    position: fixed; top: 14px; right: 14px;
    font-size: 0.55rem; color: #ffffff10;
    letter-spacing: 1px; z-index: 200;
  }
</style>
</head>
<body>

<a href="../building-blocks.html" class="back-link">← blocks</a>
<div class="block-label">closr · memory polaroid</div>

<div class="stack" id="stack">
  <div class="polaroid"><div class="polaroid-img">🐱</div><div class="polaroid-caption">Kiru approved of me. That's when I knew I was in</div></div>
  <div class="polaroid"><div class="polaroid-img">✈️</div><div class="polaroid-caption">Airport goodbye. You held on so tight I almost missed the flight</div></div>
  <div class="polaroid"><div class="polaroid-img">😂</div><div class="polaroid-caption">When you tried to surf and lasted exactly four seconds</div></div>
  <div class="polaroid"><div class="polaroid-img">🌅</div><div class="polaroid-caption">The sunset in Hawaii when you said "I could do this forever"</div></div>
</div>

<div class="counter" id="counter">1 / 4</div>
<div class="hint">swipe to flip through</div>

<script>
(function(){
  var stack = document.getElementById('stack');
  var counter = document.getElementById('counter');
  var total = stack.children.length;
  var startX = 0, deltaX = 0, isDragging = false, animating = false;
  var threshold = 70;

  getCards().forEach(function(c, i){ c.dataset.origIndex = i; });

  function getCards() { return Array.from(stack.children); }

  function backTransform(depth) {
    var s = 1 - depth * 0.025;
    var y = depth * 4;
    var rot = depth % 2 === 0 ? 1.5 : -1;
    return 'rotate(' + rot + 'deg) scale(' + s + ') translateY(' + y + 'px)';
  }

  function layoutStack(skipCard) {
    var cards = getCards();
    for (var i = 0; i < cards.length; i++) {
      var card = cards[i];
      if (card === skipCard) continue;
      var depth = cards.length - 1 - i;
      card.style.zIndex = i;
      card.style.transition = 'transform 0.5s cubic-bezier(0.25, 1, 0.5, 1)';
      card.style.pointerEvents = (i === cards.length - 1) ? 'auto' : 'none';
      card.style.opacity = '1';
      if (depth === 0) {
        card.style.transform = 'rotate(-2deg) scale(1)';
      } else {
        card.style.transform = backTransform(depth);
      }
    }
  }

  function updateCounter() {
    var top = getCards().slice(-1)[0];
    counter.textContent = (parseInt(top.dataset.origIndex) + 1) + ' / ' + total;
  }

  function getTopCard() { return getCards().slice(-1)[0]; }

  var hasMoved = false;

  function onStart(cx) {
    if (animating) return;
    isDragging = true;
    hasMoved = false;
    startX = cx;
    deltaX = 0;
    getTopCard().style.transition = 'none';
  }

  function onMove(cx) {
    if (!isDragging) return;
    deltaX = cx - startX;
    if (Math.abs(deltaX) > 5) hasMoved = true;
    var top = getTopCard();
    var rot = -2 + deltaX * 0.1;
    top.style.transform = 'translateX(' + deltaX + 'px) rotate(' + rot + 'deg)';
  }

  function onEnd() {
    if (!isDragging) return;
    isDragging = false;
    var top = getTopCard();

    if (!hasMoved && Math.abs(deltaX) < 10) {
      // TAP — shuffle to back with same animation as swipe
      animating = true;
      top.style.pointerEvents = 'none';

      // Step 1: Kick it to the side (like a mini swipe)
      top.style.transition = 'transform 0.25s ease-out';
      top.style.transform = 'translateX(100px) rotate(8deg)';

      setTimeout(function(){
        // Step 2: Drop behind everything
        stack.insertBefore(top, stack.firstChild);
        top.style.zIndex = 0;
        getCards().forEach(function(c, i) {
          if (c !== top) c.style.zIndex = i;
        });

        // Step 3: Slow arc to back position
        var tapDepth = getCards().length - 1;
        requestAnimationFrame(function(){
          top.style.transition = 'transform 0.8s cubic-bezier(0.25, 1, 0.5, 1)';
          top.style.transform = backTransform(tapDepth);
          layoutStack(top);
          updateCounter();
          setTimeout(function(){ animating = false; }, 820);
        });
      }, 250);
      return;
    }

    if (Math.abs(deltaX) > threshold) {
      animating = true;

      // Immediately move DOM to back (first child) and set z-index to 0
      // This prevents any overlap — it's behind everything instantly
      stack.insertBefore(top, stack.firstChild);
      top.style.zIndex = 0;
      top.style.pointerEvents = 'none';

      // Keep it at its current swiped position (no jump)
      // transition is still 'none' from drag
      var dir = deltaX > 0 ? 1 : -1;

      // Bump z of all other cards
      getCards().forEach(function(c, i) {
        if (c !== top) {
          c.style.zIndex = i;
        }
      });

      // Now animate slowly to back-of-stack position
      var depth = getCards().length - 1; // it's at index 0, depth = length-1
      requestAnimationFrame(function(){
        top.style.transition = 'transform 0.8s cubic-bezier(0.25, 1, 0.5, 1)';
        top.style.transform = backTransform(depth);

        // Also re-layout the rest to shift up
        layoutStack(top);
        updateCounter();

        setTimeout(function(){
          animating = false;
        }, 820);
      });

    } else {
      top.style.transition = 'transform 0.5s cubic-bezier(0.34,1.56,0.64,1)';
      top.style.transform = 'rotate(-2deg) scale(1)';
    }
  }

  stack.addEventListener('mousedown', function(e){ e.preventDefault(); onStart(e.clientX); });
  window.addEventListener('mousemove', function(e){ onMove(e.clientX); });
  window.addEventListener('mouseup', function(){ onEnd(); });
  stack.addEventListener('touchstart', function(e){ e.preventDefault(); onStart(e.touches[0].clientX); }, {passive:false});
  window.addEventListener('touchmove', function(e){ if(isDragging) onMove(e.touches[0].clientX); }, {passive:false});
  window.addEventListener('touchend', function(){ onEnd(); });

  layoutStack();
  updateCounter();
})();
</script>

</body>
</html>
