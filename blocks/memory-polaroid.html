<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Memory Polaroid — Closr Building Block</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: #0a0a12;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: 'Inter', sans-serif;
    min-height: 100dvh;
    touch-action: none;
    user-select: none; -webkit-user-select: none;
  }

  .stack {
    position: relative;
    width: min(72vw, 280px);
    height: min(92vw, 380px);
  }

  .polaroid {
    position: absolute;
    inset: 0;
    background: #f5f0e8;
    padding: 12px 12px 44px 12px;
    border-radius: 3px;
    box-shadow: 0 6px 30px rgba(0,0,0,0.5);
    display: flex; flex-direction: column;
    will-change: transform;
    cursor: grab;
  }
  .polaroid:active { cursor: grabbing; }

  .polaroid-img {
    flex: 1;
    background: linear-gradient(135deg, #c8b8a0, #e8d8c4);
    border-radius: 1px;
    display: flex; align-items: center; justify-content: center;
    font-size: 3.5rem;
    overflow: hidden;
  }
  .polaroid-img img { width: 100%; height: 100%; object-fit: cover; }

  .polaroid-caption {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 0.8rem;
    color: #3a3028;
    text-align: center;
    margin-top: 10px;
    line-height: 1.5;
  }

  .counter {
    position: fixed;
    bottom: 50px;
    left: 0; right: 0;
    text-align: center;
    font-size: 0.65rem;
    color: #ffffff20;
    letter-spacing: 3px;
    pointer-events: none;
  }

  .hint {
    position: fixed;
    bottom: 28px;
    left: 0; right: 0;
    text-align: center;
    font-size: 0.55rem;
    color: #ffffff12;
    letter-spacing: 2px;
    text-transform: uppercase;
    pointer-events: none;
  }

  .back-link {
    position: fixed; top: 14px; left: 14px;
    font-size: 0.65rem; color: #ffffff15;
    text-decoration: none; z-index: 200;
  }
  .block-label {
    position: fixed; top: 14px; right: 14px;
    font-size: 0.55rem; color: #ffffff10;
    letter-spacing: 1px; z-index: 200;
  }
</style>
</head>
<body>

<a href="../building-blocks.html" class="back-link">← blocks</a>
<div class="block-label">closr · memory polaroid</div>

<div class="stack" id="stack">
  <div class="polaroid"><div class="polaroid-img">🐱</div><div class="polaroid-caption">Kiru approved of me. That's when I knew I was in</div></div>
  <div class="polaroid"><div class="polaroid-img">✈️</div><div class="polaroid-caption">Airport goodbye. You held on so tight I almost missed the flight</div></div>
  <div class="polaroid"><div class="polaroid-img">😂</div><div class="polaroid-caption">When you tried to surf and lasted exactly four seconds</div></div>
  <div class="polaroid"><div class="polaroid-img">🌅</div><div class="polaroid-caption">The sunset in Hawaii when you said "I could do this forever"</div></div>
</div>

<div class="counter" id="counter">1 / 4</div>
<div class="hint">swipe to flip through</div>

<script>
(function(){
  var stack = document.getElementById('stack');
  var counter = document.getElementById('counter');
  var cards = Array.from(stack.children);
  var total = cards.length;
  var topIndex = 0; // which card in our order is on top

  // Order array — tracks the visual stack order
  var order = cards.map(function(_, i){ return i; });

  var startX = 0, deltaX = 0, deltaY = 0, isDragging = false;
  var threshold = 70;
  var animating = false;

  function layout() {
    for (var i = 0; i < total; i++) {
      var pos = (i - topIndex + total) % total; // 0 = top, total-1 = bottom
      var depth = total - 1 - pos; // z-index: top gets highest
      var card = cards[order[i]];
      if (card._swiping) continue;
      card.style.zIndex = depth;
      card.style.transition = 'transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s';
      if (pos === 0) {
        // Top card
        card.style.transform = 'rotate(-2deg) scale(1)';
        card.style.opacity = '1';
        card.style.pointerEvents = 'auto';
      } else {
        // Stack cards behind with slight offset
        var s = 1 - pos * 0.02;
        var y = pos * 3;
        var rot = pos % 2 === 0 ? 1 : -1;
        card.style.transform = 'rotate(' + rot + 'deg) scale(' + s + ') translateY(' + y + 'px)';
        card.style.opacity = pos < 3 ? (1 - pos * 0.15) : 0;
        card.style.pointerEvents = 'none';
      }
    }
    var showing = (topIndex % total) + 1;
    counter.textContent = showing + ' / ' + total;
  }

  function getTopCard() {
    return cards[order[topIndex % total]];
  }

  function onStart(cx) {
    if (animating) return;
    isDragging = true;
    startX = cx;
    deltaX = 0;
    var top = getTopCard();
    top.style.transition = 'none';
  }

  function onMove(cx, cy) {
    if (!isDragging) return;
    deltaX = cx - startX;
    var top = getTopCard();
    var rot = -2 + deltaX * 0.08;
    top.style.transform = 'translateX(' + deltaX + 'px) rotate(' + rot + 'deg)';
  }

  function onEnd() {
    if (!isDragging) return;
    isDragging = false;
    var top = getTopCard();

    if (Math.abs(deltaX) > threshold) {
      // Swipe away, then send to back
      animating = true;
      var dir = deltaX > 0 ? 1 : -1;
      top._swiping = true;
      top.style.transition = 'transform 0.35s ease-in, opacity 0.35s ease-in';
      top.style.transform = 'translateX(' + (dir * 500) + 'px) rotate(' + (dir * 25) + 'deg)';
      top.style.opacity = '0';

      setTimeout(function(){
        top._swiping = false;
        // Move to next
        topIndex = (topIndex + 1) % total;
        // Reset swiped card instantly (no transition) so it appears at back
        top.style.transition = 'none';
        top.style.transform = 'rotate(1deg) scale(0.92) translateY(12px)';
        top.style.opacity = '0';
        // Force reflow
        top.offsetHeight;
        // Now animate into back position
        layout();
        animating = false;
      }, 350);
    } else {
      // Snap back
      top.style.transition = 'transform 0.4s cubic-bezier(0.34,1.56,0.64,1)';
      top.style.transform = 'rotate(-2deg) scale(1)';
    }
  }

  stack.addEventListener('mousedown', function(e){ e.preventDefault(); onStart(e.clientX); });
  window.addEventListener('mousemove', function(e){ onMove(e.clientX, e.clientY); });
  window.addEventListener('mouseup', function(){ onEnd(); });
  stack.addEventListener('touchstart', function(e){ e.preventDefault(); onStart(e.touches[0].clientX); }, {passive:false});
  window.addEventListener('touchmove', function(e){ if(isDragging){ onMove(e.touches[0].clientX, e.touches[0].clientY); }}, {passive:false});
  window.addEventListener('touchend', function(){ onEnd(); });

  layout();
})();
</script>

</body>
</html>
