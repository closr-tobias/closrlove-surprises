<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Memory Polaroid — Closr Building Block</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: #0a0a12;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
  }

  .polaroid {
    background: #f5f0e8;
    padding: 16px 16px 52px 16px;
    border-radius: 3px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 80px rgba(255,105,180,0.05);
    transform: rotate(-2deg);
    width: min(75vw, 320px);
    animation: polaroidDrop 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    cursor: grab;
    user-select: none;
    -webkit-user-select: none;
  }
  .polaroid:active { cursor: grabbing; }

  .polaroid-img {
    width: 100%;
    aspect-ratio: 1;
    background: linear-gradient(135deg, #c8b8a0, #e8d8c4);
    border-radius: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 4rem;
    overflow: hidden;
  }
  .polaroid-img img {
    width: 100%; height: 100%; object-fit: cover;
  }

  .polaroid-caption {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 1rem;
    color: #3a3028;
    text-align: center;
    margin-top: 14px;
    line-height: 1.6;
    animation: captionFade 1s ease-out 0.6s both;
  }

  .polaroid-date {
    font-family: 'Inter', sans-serif;
    font-size: 0.65rem;
    color: #a09888;
    text-align: center;
    margin-top: 8px;
    letter-spacing: 1px;
    animation: captionFade 1s ease-out 0.9s both;
  }

  .scene-transition {
    font-size: 0.8rem;
    color: #ffffff18;
    margin-top: 28px;
    text-align: center;
    font-style: italic;
    animation: captionFade 1.2s ease-out 1.4s both;
    padding: 0 20px;
  }

  .back-link {
    position: fixed;
    top: 16px;
    left: 16px;
    font-size: 0.7rem;
    color: #ffffff20;
    text-decoration: none;
    z-index: 10;
  }
  .back-link:hover { color: #ffffff50; }

  .block-label {
    position: fixed;
    bottom: 16px;
    left: 0; right: 0;
    text-align: center;
    font-size: 0.6rem;
    color: #ffffff12;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  @keyframes polaroidDrop {
    from { opacity: 0; transform: rotate(-6deg) translateY(-50px) scale(0.85); }
    to { opacity: 1; transform: rotate(-2deg) translateY(0) scale(1); }
  }
  @keyframes captionFade {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<a href="../building-blocks.html" class="back-link">← blocks</a>

<div class="polaroid" id="polaroid">
  <div class="polaroid-img">
    <!-- SLOT: couple_photo --> 🌅 <!-- /SLOT -->
  </div>
  <div class="polaroid-caption">
    <!-- SLOT: ai_memory_caption --> The sunset in Hawaii when you said "I could do this forever" and meant it <!-- /SLOT -->
  </div>
  <div class="polaroid-date">
    <!-- SLOT: memory_date --> January 2026 <!-- /SLOT -->
  </div>
</div>

<div class="scene-transition">
  <!-- SLOT: ai_scene_transition --> that was the night everything changed <!-- /SLOT -->
</div>

<div class="block-label">closr — memory polaroid</div>

<script>
// Subtle tilt on drag / touch
(function(){
  var el = document.getElementById('polaroid');
  var startX, startY, currentRot = -2;
  
  function onMove(x, y) {
    var rect = el.getBoundingClientRect();
    var cx = rect.left + rect.width/2;
    var cy = rect.top + rect.height/2;
    var dx = (x - cx) / rect.width;
    var dy = (y - cy) / rect.height;
    var rot = -2 + dx * 8;
    var tiltX = dy * -5;
    el.style.transform = 'rotate('+rot+'deg) perspective(600px) rotateX('+tiltX+'deg)';
  }
  
  function onEnd() {
    el.style.transition = 'transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)';
    el.style.transform = 'rotate(-2deg)';
    setTimeout(function(){ el.style.transition = ''; }, 500);
  }

  el.addEventListener('mousemove', function(e){ onMove(e.clientX, e.clientY); });
  el.addEventListener('mouseleave', onEnd);
  el.addEventListener('touchmove', function(e){ 
    e.preventDefault();
    onMove(e.touches[0].clientX, e.touches[0].clientY); 
  }, {passive:false});
  el.addEventListener('touchend', onEnd);
})();
</script>

</body>
</html>
