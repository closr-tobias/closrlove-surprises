<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Slot Machine Love — Closr Building Block</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: #08080e;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: 'Inter', sans-serif;
    min-height: 100dvh;
    touch-action: none;
    user-select: none; -webkit-user-select: none;
    overflow: hidden;
    color: #fff;
  }

  .particle {
    position: fixed;
    width: 2px; height: 2px;
    background: rgba(255,255,255,0.04);
    border-radius: 50%;
    pointer-events: none;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0% { transform: translateY(0) translateX(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-100vh) translateX(20px); opacity: 0; }
  }

  .back-link { position: fixed; top: 14px; left: 14px; font-size: 0.65rem; color: #ffffff12; text-decoration: none; z-index: 200; }
  .block-label { position: fixed; top: 14px; right: 14px; font-size: 0.5rem; color: #ffffff0a; letter-spacing: 1px; z-index: 200; }

  .machine-wrapper {
    display: flex; flex-direction: column; align-items: center;
    gap: 28px;
    z-index: 10;
  }

  .title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 400;
    font-style: italic;
    color: rgba(255,255,255,0.25);
    letter-spacing: 2px;
    text-transform: lowercase;
  }

  .machine {
    position: relative;
    background: linear-gradient(180deg, #16141e 0%, #0f0d15 50%, #12101a 100%);
    border-radius: 18px;
    padding: 28px 20px 24px;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.04),
      0 4px 20px rgba(0,0,0,0.5),
      0 20px 60px rgba(0,0,0,0.4),
      inset 0 1px 0 rgba(255,255,255,0.03);
    width: min(85vw, 320px);
  }

  .machine::before {
    content: '';
    position: absolute;
    top: 0; left: 30px; right: 30px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,200,100,0.15), transparent);
  }

  .reels-container {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 24px;
  }

  .reel-frame {
    position: relative;
    width: 80px; height: 90px;
    background: rgba(0,0,0,0.4);
    border-radius: 10px;
    overflow: hidden;
    box-shadow:
      inset 0 2px 8px rgba(0,0,0,0.5),
      0 0 0 1px rgba(255,255,255,0.03);
    cursor: pointer;
    transition: box-shadow 0.3s;
  }
  .reel-frame:hover:not(.locked) {
    box-shadow:
      inset 0 2px 8px rgba(0,0,0,0.5),
      0 0 0 1px rgba(255,180,100,0.12),
      0 0 20px rgba(255,180,100,0.04);
  }
  .reel-frame.locked { cursor: default; }

  .reel-frame::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    top: 50%; transform: translateY(-50%);
    height: 32px;
    border-top: 1px solid rgba(255,200,120,0.08);
    border-bottom: 1px solid rgba(255,200,120,0.08);
    pointer-events: none;
    z-index: 2;
  }

  .reel-mask {
    position: absolute; inset: 0;
    background: linear-gradient(180deg,
      #16141e 0%,
      transparent 30%,
      transparent 70%,
      #0f0d15 100%
    );
    pointer-events: none;
    z-index: 1;
    border-radius: 10px;
  }

  .reel-strip {
    position: absolute;
    left: 0; right: 0;
    display: flex; flex-direction: column;
    align-items: center;
    will-change: transform;
  }

  .reel-item {
    width: 80px; height: 90px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    padding: 8px;
    text-align: center;
  }

  .reel-emoji { font-size: 2rem; line-height: 1; margin-bottom: 4px; }
  .reel-text {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.55rem;
    font-weight: 500;
    color: rgba(255,255,255,0.6);
    line-height: 1.3;
    letter-spacing: 0.3px;
  }

  .lock-flash {
    position: absolute; inset: 0;
    border-radius: 10px;
    border: 1.5px solid rgba(255,200,120,0.3);
    opacity: 0;
    pointer-events: none;
    z-index: 3;
    transition: opacity 0.15s;
  }
  .reel-frame.locked .lock-flash {
    animation: lockPulse 0.6s ease-out forwards;
  }
  @keyframes lockPulse {
    0% { opacity: 1; border-color: rgba(255,200,120,0.5); box-shadow: inset 0 0 20px rgba(255,200,120,0.1); }
    100% { opacity: 1; border-color: rgba(255,200,120,0.1); box-shadow: none; }
  }

  .pull-btn {
    display: flex; align-items: center; justify-content: center;
    width: 100%;
    height: 44px;
    border: none;
    border-radius: 10px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s;
  }

  .pull-btn.spin {
    background: linear-gradient(135deg, rgba(255,200,120,0.12), rgba(255,150,80,0.08));
    color: rgba(255,200,120,0.7);
    box-shadow: 0 0 0 1px rgba(255,200,120,0.1);
  }
  .pull-btn.spin:hover {
    background: linear-gradient(135deg, rgba(255,200,120,0.18), rgba(255,150,80,0.12));
    box-shadow: 0 0 0 1px rgba(255,200,120,0.2), 0 0 20px rgba(255,200,120,0.05);
  }
  .pull-btn.spin:active { transform: scale(0.97); }

  .pull-btn.stop {
    background: linear-gradient(135deg, rgba(255,100,120,0.12), rgba(255,80,100,0.08));
    color: rgba(255,150,160,0.7);
    box-shadow: 0 0 0 1px rgba(255,100,120,0.1);
    animation: stopPulse 1.5s ease-in-out infinite;
  }
  @keyframes stopPulse {
    0%, 100% { box-shadow: 0 0 0 1px rgba(255,100,120,0.1); }
    50% { box-shadow: 0 0 0 1px rgba(255,100,120,0.25), 0 0 15px rgba(255,100,120,0.05); }
  }

  .pull-btn.disabled {
    background: rgba(255,255,255,0.03);
    color: rgba(255,255,255,0.15);
    cursor: default;
    box-shadow: none;
    pointer-events: none;
  }

  .jackpot {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.8s;
    background: radial-gradient(ellipse at center, rgba(8,8,14,0.97), #08080e);
  }
  .jackpot.show { opacity: 1; pointer-events: auto; }

  .jackpot-emojis {
    font-size: 2.2rem;
    letter-spacing: 12px;
    margin-bottom: 24px;
    opacity: 0;
    transform: scale(0.8);
    transition: all 0.6s 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .jackpot.show .jackpot-emojis { opacity: 1; transform: scale(1); }

  .jackpot-text {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 400;
    font-style: italic;
    color: rgba(255,255,255,0.7);
    text-align: center;
    max-width: 280px;
    line-height: 1.7;
    opacity: 0;
    transform: translateY(12px);
    transition: all 0.6s 0.6s;
  }
  .jackpot.show .jackpot-text { opacity: 1; transform: translateY(0); }

  .jackpot-sub {
    font-size: 0.6rem;
    color: rgba(255,200,120,0.25);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 20px;
    opacity: 0;
    transition: opacity 0.6s 1s;
  }
  .jackpot.show .jackpot-sub { opacity: 1; }

  .confetti-piece {
    position: fixed;
    pointer-events: none;
    z-index: 101;
    border-radius: 1px;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  .hint {
    position: fixed;
    bottom: 24px;
    left: 0; right: 0;
    text-align: center;
    font-size: 0.5rem;
    color: #ffffff0d;
    letter-spacing: 3px;
    text-transform: uppercase;
    pointer-events: none;
  }
</style>
</head>
<body>

<a href="../building-blocks.html" class="back-link">← blocks</a>
<div class="block-label">closr · slot machine love</div>

<div class="machine-wrapper">
  <div class="title">things I love about you</div>
  <div class="machine">
    <div class="reels-container" id="reels-container"></div>
    <button class="pull-btn spin" id="pull-btn">SPIN</button>
  </div>
</div>

<div class="jackpot" id="jackpot">
  <div class="jackpot-emojis" id="jackpot-emojis"></div>
  <!-- SLOT: jackpot_message -->
  <div class="jackpot-text" id="jackpot-text">You're my jackpot, Erica.<br>Every single time.</div>
  <!-- /SLOT -->
  <div class="jackpot-sub">🎰 jackpot</div>
</div>

<div class="hint">tap spin to play</div>

<script>
(function(){
  // SLOT: reel_items
  var reelData = [
    { emoji: '😂', text: 'Your laugh' },
    { emoji: '🔥', text: 'Your stubborn streak' },
    { emoji: '🧥', text: 'You steal my hoodies' },
    { emoji: '💤', text: 'Your sleepy voice' },
    { emoji: '🐱', text: 'How you talk to Kiru' },
    { emoji: '🎮', text: 'Gaming with you at 2am' },
    { emoji: '👀', text: 'That look you give me' },
    { emoji: '💪', text: 'How hard you go' },
    { emoji: '🌮', text: 'Your taco obsession' },
    { emoji: '📸', text: 'Your ugly selfies' },
    { emoji: '💬', text: 'Your random 3am texts' },
    { emoji: '🫶', text: 'Everything, really' },
  ];
  // /SLOT

  var REEL_COUNT = 3;
  var ITEM_H = 90;

  for (var i = 0; i < 12; i++) {
    var p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.top = Math.random() * 100 + 'vh';
    p.style.animationDuration = (Math.random() * 15 + 10) + 's';
    p.style.animationDelay = (Math.random() * 10) + 's';
    document.body.appendChild(p);
  }

  var audioCtx;
  function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
  function playTick() {
    if (!audioCtx) return;
    var o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'sine';
    o.frequency.setValueAtTime(1800, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.06);
    g.gain.setValueAtTime(0.06, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
    o.start(); o.stop(audioCtx.currentTime + 0.08);
  }
  function playLock() {
    if (!audioCtx) return;
    var o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'triangle';
    o.frequency.setValueAtTime(880, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.12);
    g.gain.setValueAtTime(0.1, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
    o.start(); o.stop(audioCtx.currentTime + 0.2);
  }
  function playJackpot() {
    if (!audioCtx) return;
    [523,659,784,1047].forEach(function(f,i){
      var o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.type = 'sine'; o.frequency.value = f;
      g.gain.setValueAtTime(0, audioCtx.currentTime + i*0.12);
      g.gain.linearRampToValueAtTime(0.08, audioCtx.currentTime + i*0.12 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i*0.12 + 0.3);
      o.start(audioCtx.currentTime + i*0.12); o.stop(audioCtx.currentTime + i*0.12 + 0.3);
    });
  }

  function shuffle(a) { a = a.slice(); for (var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)),t=a[i];a[i]=a[j];a[j]=t;} return a; }

  var reelsContainer = document.getElementById('reels-container');
  var reels = [];
  var spinning = false, lockedCount = 0;

  for (var r = 0; r < REEL_COUNT; r++) {
    var frame = document.createElement('div');
    frame.className = 'reel-frame';
    var mask = document.createElement('div');
    mask.className = 'reel-mask';
    var flash = document.createElement('div');
    flash.className = 'lock-flash';
    var strip = document.createElement('div');
    strip.className = 'reel-strip';

    var items = shuffle(reelData);
    var allItems = items.concat(items).concat(items);
    allItems.forEach(function(d) {
      var item = document.createElement('div');
      item.className = 'reel-item';
      item.innerHTML = '<div><div class="reel-emoji">'+d.emoji+'</div><div class="reel-text">'+d.text+'</div></div>';
      strip.appendChild(item);
    });

    frame.appendChild(strip);
    frame.appendChild(mask);
    frame.appendChild(flash);
    reelsContainer.appendChild(frame);

    var obj = { frame:frame, strip:strip, items:allItems, offset:Math.floor(Math.random()*reelData.length)*ITEM_H, speed:0, locked:false, animId:null, targetItem:null };
    strip.style.transform = 'translateY('+(-obj.offset)+'px)';
    reels.push(obj);

    (function(rl){ rl.frame.addEventListener('click', function(){ if(!spinning||rl.locked) return; lockReel(rl); }); })(obj);
  }

  var btn = document.getElementById('pull-btn');
  btn.addEventListener('click', function(){ if(spinning) return; initAudio(); startSpin(); });

  function startSpin() {
    spinning = true; lockedCount = 0;
    btn.className = 'pull-btn stop';
    btn.textContent = 'TAP A REEL TO LOCK';
    reels.forEach(function(rl,i){
      rl.locked = false;
      rl.frame.classList.remove('locked');
      rl.speed = 12 + i*2;
      spinReel(rl);
    });
  }

  function spinReel(rl) {
    var tc = 0;
    function frame() {
      if (rl.locked) return;
      rl.offset += rl.speed;
      var totalH = rl.items.length * ITEM_H;
      if (rl.offset >= totalH * 0.66) rl.offset -= totalH * 0.33;
      rl.strip.style.transform = 'translateY('+(-rl.offset)+'px)';
      tc++; if (tc%6===0) playTick();
      rl.animId = requestAnimationFrame(frame);
    }
    rl.animId = requestAnimationFrame(frame);
  }

  function lockReel(rl) {
    rl.locked = true;
    if (rl.animId) cancelAnimationFrame(rl.animId);
    var snapped = Math.round(rl.offset/ITEM_H)*ITEM_H;
    rl.targetItem = reelData[Math.floor(snapped/ITEM_H) % reelData.length];
    var cur = rl.offset, target = snapped, start = performance.now();
    function anim(ts) {
      var t = Math.min((ts-start)/400, 1);
      rl.offset = cur + (target-cur)*(1-Math.pow(1-t,3));
      rl.strip.style.transform = 'translateY('+(-rl.offset)+'px)';
      if (t<1) { requestAnimationFrame(anim); }
      else {
        rl.frame.classList.add('locked');
        playLock();
        rl.frame.style.transition = 'transform 0.3s cubic-bezier(0.34,1.56,0.64,1)';
        rl.frame.style.transform = 'scale(1.04)';
        setTimeout(function(){ rl.frame.style.transform = 'scale(1)'; }, 200);
        lockedCount++;
        checkAllLocked();
      }
    }
    requestAnimationFrame(anim);
  }

  function checkAllLocked() {
    if (lockedCount >= REEL_COUNT) {
      btn.className = 'pull-btn disabled';
      btn.textContent = '\u{1F3B0} \u{1F3B0} \u{1F3B0}';
      document.getElementById('jackpot-emojis').textContent = reels.map(function(r){return r.targetItem.emoji}).join('  ');
      setTimeout(function(){
        playJackpot(); spawnConfetti();
        document.getElementById('jackpot').classList.add('show');
      }, 600);
      setTimeout(function(){
        spinning = false;
        btn.className = 'pull-btn spin';
        btn.textContent = 'SPIN AGAIN';
      }, 2500);
    } else {
      var rem = REEL_COUNT - lockedCount;
      btn.textContent = 'TAP '+rem+' MORE REEL'+(rem>1?'S':'');
    }
  }

  function spawnConfetti() {
    var colors = ['#ff6b8a','#ffb347','#7ec8e3','#c792ea','#f7dc6f','#82e0aa'];
    for (var i=0;i<40;i++) {
      var c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.left = Math.random()*100+'vw';
      c.style.top = '-10px';
      c.style.background = colors[Math.floor(Math.random()*colors.length)];
      c.style.width = (Math.random()*5+4)+'px';
      c.style.height = (Math.random()*8+6)+'px';
      c.style.borderRadius = Math.random()>0.5?'50%':'1px';
      c.style.animation = 'confettiFall '+(Math.random()*2+2)+'s linear '+(Math.random()*0.5)+'s forwards';
      document.body.appendChild(c);
      setTimeout(function(el){el.remove()}.bind(null,c), 4000);
    }
  }

  document.getElementById('jackpot').addEventListener('click', function(){ this.classList.remove('show'); });
})();
</script>
</body>
</html>
