<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Whisper Glow — Closr Building Block</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: #06060b;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: 'Inter', sans-serif;
    min-height: 100dvh;
    touch-action: none;
    user-select: none; -webkit-user-select: none;
    overflow: hidden;
    position: relative;
  }

  canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
  }

  .text-layer {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 5;
    pointer-events: none;
    padding: 40px 32px;
  }

  .phrase {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    font-size: clamp(1.6rem, 6vw, 2.8rem);
    color: rgba(255, 255, 255, 0);
    text-align: center;
    line-height: 1.5;
    letter-spacing: 0.3px;
    text-shadow: 0 0 0 transparent;
    transition: none;
    max-width: 520px;
  }

  .phrase.visible {
    animation: whisperIn 2.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  .phrase.fading {
    animation: whisperOut 0.8s ease-in forwards;
  }

  @keyframes whisperIn {
    0% { color: rgba(255,255,255,0); text-shadow: 0 0 40px rgba(255,180,220,0), 0 0 80px rgba(180,160,255,0); filter: blur(8px); transform: scale(0.94); }
    40% { filter: blur(2px); }
    100% { color: rgba(255,255,255,0.88); text-shadow: 0 0 30px rgba(255,180,220,0.15), 0 0 60px rgba(180,160,255,0.08); filter: blur(0px); transform: scale(1); }
  }

  @keyframes whisperOut {
    0% { color: rgba(255,255,255,0.88); text-shadow: 0 0 30px rgba(255,180,220,0.15), 0 0 60px rgba(180,160,255,0.08); filter: blur(0px); transform: scale(1); }
    100% { color: rgba(255,255,255,0); text-shadow: 0 0 60px rgba(255,180,220,0), 0 0 100px rgba(180,160,255,0); filter: blur(6px); transform: scale(1.03); }
  }

  .prompt {
    position: fixed;
    bottom: 60px;
    left: 0; right: 0;
    text-align: center;
    font-size: 0.55rem;
    color: rgba(255,255,255,0.06);
    letter-spacing: 4px;
    text-transform: uppercase;
    z-index: 10;
    pointer-events: none;
    transition: opacity 1s;
  }

  .prompt.hidden { opacity: 0; }

  .progress-dots {
    position: fixed;
    bottom: 36px;
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    gap: 10px;
    z-index: 10;
    pointer-events: none;
  }

  .pdot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .pdot.seen {
    background: rgba(255,180,220,0.25);
    box-shadow: 0 0 8px rgba(255,180,220,0.15);
  }

  .pdot.active {
    background: rgba(255,180,220,0.45);
    box-shadow: 0 0 12px rgba(255,180,220,0.3);
    transform: scale(1.5);
  }

  .sound-icon {
    position: fixed;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.5rem;
    color: rgba(255,255,255,0.06);
    letter-spacing: 2px;
    z-index: 20;
    pointer-events: none;
  }

  .back-link { position: fixed; top: 14px; left: 14px; font-size: 0.65rem; color: #ffffff12; text-decoration: none; z-index: 200; }
  .block-label { position: fixed; top: 14px; right: 14px; font-size: 0.5rem; color: #ffffff0a; letter-spacing: 1px; z-index: 200; }
</style>
</head>
<body>

<a href="../building-blocks.html" class="back-link">← blocks</a>
<div class="block-label">closr · whisper glow</div>
<div class="sound-icon">🔊 best with sound</div>

<canvas id="c"></canvas>

<div class="text-layer">
  <div class="phrase" id="phrase"></div>
</div>

<div class="progress-dots" id="dots"></div>
<div class="prompt" id="prompt">tap anywhere</div>

<!-- SLOT: phrases -->
<script id="slot-phrases" type="application/json">
[
  "I never told you this",
  "but the first time you laughed at something I said",
  "I felt like I\u2019d unlocked a secret level of the universe",
  "You make silence feel like a conversation",
  "and distance feel like a dare",
  "Every night I fall asleep mid-sentence\ntalking to you in my head",
  "You\u2019re my favorite almost-here",
  "and one day, the almost disappears"
]
</script>
<!-- /SLOT -->

<script>
(function(){
  var phrases = JSON.parse(document.getElementById('slot-phrases').textContent);
  var current = -1;
  var busy = false;
  var audioCtx = null;

  // Dots
  var dotsEl = document.getElementById('dots');
  phrases.forEach(function(){ var d = document.createElement('div'); d.className = 'pdot'; dotsEl.appendChild(d); });
  var dots = dotsEl.children;

  function updateDots() {
    for (var i = 0; i < dots.length; i++) {
      dots[i].className = 'pdot' + (i < current ? ' seen' : '') + (i === current ? ' active' : '');
    }
  }

  // Canvas particles
  var canvas = document.getElementById('c');
  var ctx = canvas.getContext('2d');
  var particles = [];
  var W, H;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for (var i = 0; i < 80; i++) {
    particles.push({
      x: Math.random() * (typeof W !== 'undefined' ? W : 400),
      y: Math.random() * (typeof H !== 'undefined' ? H : 800),
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      r: Math.random() * 1.5 + 0.5,
      alpha: Math.random() * 0.08 + 0.02,
      baseAlpha: Math.random() * 0.08 + 0.02,
      hue: Math.random() > 0.5 ? 330 : 260,
      gathering: false,
      gatherX: 0, gatherY: 0
    });
  }

  function triggerGather() {
    var cx = W / 2, cy = H / 2;
    particles.forEach(function(p) {
      p.gathering = true;
      p.gatherX = cx + (Math.random() - 0.5) * 120;
      p.gatherY = cy + (Math.random() - 0.5) * 60;
    });
    setTimeout(function() {
      particles.forEach(function(p) {
        p.gathering = false;
        p.vx = (Math.random() - 0.5) * 1.5;
        p.vy = (Math.random() - 0.5) * 1.5;
      });
    }, 1800);
  }

  function drawParticles() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(function(p) {
      if (p.gathering) {
        p.x += (p.gatherX - p.x) * 0.04;
        p.y += (p.gatherY - p.y) * 0.04;
        p.alpha = Math.min(p.alpha + 0.005, 0.25);
      } else {
        p.x += p.vx;
        p.y += p.vy;
        p.alpha += (p.baseAlpha - p.alpha) * 0.02;
        p.vx *= 0.998; p.vy *= 0.998;
        p.vx += (Math.random() - 0.5) * 0.02;
        p.vy += (Math.random() - 0.5) * 0.02;
      }
      if (p.x < -10) p.x = W + 10;
      if (p.x > W + 10) p.x = -10;
      if (p.y < -10) p.y = H + 10;
      if (p.y > H + 10) p.y = -10;

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = 'hsla(' + p.hue + ', 60%, 80%, ' + p.alpha + ')';
      ctx.fill();

      if (p.alpha > 0.1) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * 4, 0, Math.PI * 2);
        ctx.fillStyle = 'hsla(' + p.hue + ', 60%, 80%, ' + (p.alpha * 0.2) + ')';
        ctx.fill();
      }
    });
    requestAnimationFrame(drawParticles);
  }
  drawParticles();

  // Audio — synthesized ethereal tones
  function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  function playTone(noteIndex) {
    if (!audioCtx) return;
    var freqs = [261.6, 293.7, 329.6, 392.0, 440.0, 523.3, 587.3, 659.3];
    var freq = freqs[noteIndex % freqs.length];
    var now = audioCtx.currentTime;

    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    var filter = audioCtx.createBiquadFilter();
    osc.type = 'sine';
    osc.frequency.value = freq;
    filter.type = 'lowpass';
    filter.frequency.value = 800;
    filter.Q.value = 1;
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.06, now + 0.3);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 3);
    osc.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now + 3.5);

    // Breathy harmonic
    var osc2 = audioCtx.createOscillator();
    var gain2 = audioCtx.createGain();
    osc2.type = 'sine';
    osc2.frequency.value = freq * 2.01;
    gain2.gain.setValueAtTime(0, now);
    gain2.gain.linearRampToValueAtTime(0.015, now + 0.5);
    gain2.gain.exponentialRampToValueAtTime(0.001, now + 2.5);
    osc2.connect(gain2);
    gain2.connect(audioCtx.destination);
    osc2.start(now);
    osc2.stop(now + 3);
  }

  function haptic() { if (navigator.vibrate) navigator.vibrate(30); }

  // Phrase cycling
  var phraseEl = document.getElementById('phrase');
  var promptEl = document.getElementById('prompt');

  function showNext() {
    if (busy) return;
    if (current >= phrases.length - 1) { current = -1; }
    busy = true;
    initAudio();

    if (current >= 0) {
      phraseEl.className = 'phrase fading';
      setTimeout(doReveal, 800);
    } else {
      doReveal();
    }

    function doReveal() {
      current++;
      updateDots();
      promptEl.classList.add('hidden');
      triggerGather();
      playTone(current);
      haptic();

      phraseEl.className = 'phrase';
      phraseEl.innerHTML = phrases[current].replace(/\n/g, '<br>');
      void phraseEl.offsetWidth;
      phraseEl.className = 'phrase visible';

      setTimeout(function() {
        busy = false;
        if (current < phrases.length - 1) promptEl.classList.remove('hidden');
      }, 2500);
    }
  }

  document.body.addEventListener('click', function(e) {
    if (e.target.closest('.back-link')) return;
    showNext();
  });
  document.body.addEventListener('touchend', function(e) {
    if (e.target.closest('.back-link')) return;
    e.preventDefault();
    showNext();
  }, { passive: false });
})();
</script>
</body>
</html>
