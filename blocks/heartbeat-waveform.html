<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Heartbeat Waveform — Closr Building Block</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: #08080e;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: 'Inter', sans-serif;
    min-height: 100dvh;
    touch-action: none;
    user-select: none; -webkit-user-select: none;
    overflow: hidden;
    color: #fff;
  }
  .back-link {
    position: fixed; top: 16px; left: 16px;
    color: rgba(255,255,255,0.3); text-decoration: none;
    font-size: 0.8rem; z-index: 100;
    transition: color 0.3s;
  }
  .back-link:hover { color: rgba(255,255,255,0.6); }
  .sound-badge {
    position: fixed; top: 16px; right: 16px;
    font-size: 0.7rem; color: rgba(255,255,255,0.25);
    z-index: 100; display: flex; align-items: center; gap: 4px;
    opacity: 0; transition: opacity 0.6s;
  }
  .sound-badge.visible { opacity: 1; }
  .start-screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 50; background: #08080e;
    transition: opacity 0.8s ease; cursor: pointer;
  }
  .start-screen.hidden { opacity: 0; pointer-events: none; }
  .start-icon {
    width: 80px; height: 80px;
    border: 2px solid rgba(255,80,120,0.3);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 24px; animation: pulseRing 2s ease-in-out infinite;
    position: relative;
  }
  .start-icon::before {
    content: ''; position: absolute; width: 100%; height: 100%;
    border-radius: 50%; border: 1px solid rgba(255,80,120,0.15);
    animation: pulseRing 2s ease-in-out infinite 0.3s;
  }
  @keyframes pulseRing {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.15); opacity: 0.5; }
  }
  .start-heart { font-size: 1.8rem; animation: heartPump 1s ease-in-out infinite; }
  @keyframes heartPump {
    0%, 100% { transform: scale(1); }
    15% { transform: scale(1.2); }
    30% { transform: scale(1); }
    45% { transform: scale(1.15); }
  }
  .start-text {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem; color: rgba(255,255,255,0.5);
    letter-spacing: 0.05em;
  }
  .start-sub { font-size: 0.7rem; color: rgba(255,255,255,0.2); margin-top: 8px; }
  .scene {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    opacity: 0; transition: opacity 1s ease 0.5s;
  }
  .scene.active { opacity: 1; }
  canvas#waveform {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%); z-index: 1;
  }
  .bpm {
    position: fixed; bottom: 60px; left: 50%;
    transform: translateX(-50%);
    font-size: 0.65rem; color: rgba(255,80,120,0.25);
    letter-spacing: 0.15em; text-transform: uppercase; z-index: 10;
  }
  .bpm span { font-variant-numeric: tabular-nums; color: rgba(255,80,120,0.4); }
  .message-layer {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 20; pointer-events: none; padding: 40px;
  }
  .message-text {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem; line-height: 1.5; text-align: center;
    color: rgba(255,255,255,0); white-space: pre-line;
    transition: color 1.2s ease, text-shadow 1.2s ease, transform 1.2s ease;
    transform: translateY(8px); max-width: 320px;
  }
  .message-text.visible {
    color: rgba(255,255,255,0.9);
    text-shadow: 0 0 30px rgba(255,80,120,0.3), 0 0 60px rgba(255,80,120,0.1);
    transform: translateY(0);
  }
  .message-text.fading { color: rgba(255,255,255,0); transform: translateY(-8px); }
  .hold-prompt {
    position: fixed; bottom: 90px; left: 50%;
    transform: translateX(-50%);
    font-size: 0.7rem; color: rgba(255,255,255,0.2);
    z-index: 30; opacity: 0; transition: opacity 0.8s; text-align: center;
  }
  .hold-prompt.visible { opacity: 1; }
  .ambient-particle {
    position: fixed; width: 1.5px; height: 1.5px;
    background: rgba(255,80,120,0.08); border-radius: 50%;
    pointer-events: none; animation: driftUp linear infinite;
  }
  @keyframes driftUp {
    0% { transform: translateY(0) translateX(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-100vh) translateX(20px); opacity: 0; }
  }
  .glow-backdrop {
    position: fixed; width: 300px; height: 300px;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,60,100,0.06) 0%, transparent 70%);
    filter: blur(60px); pointer-events: none; z-index: 0;
    transition: opacity 0.3s;
  }
  .finale {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 40; opacity: 0; pointer-events: none;
    transition: opacity 1.5s ease;
  }
  .finale.visible { opacity: 1; pointer-events: auto; }
  .finale-heart { font-size: 3rem; animation: heartPump 1s ease-in-out infinite; margin-bottom: 20px; }
  .finale-text {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem; color: rgba(255,255,255,0.6);
    text-align: center; line-height: 1.6; white-space: pre-line;
  }
</style>
</head>
<body>
<a class="back-link" href="../building-blocks.html">← blocks</a>
<div class="sound-badge" id="soundBadge">🔊 best with sound</div>

<div class="start-screen" id="startScreen">
  <div class="start-icon"><div class="start-heart">💗</div></div>
  <div class="start-text">tap to feel the beat</div>
  <div class="start-sub">🎧 headphones recommended</div>
</div>

<div class="scene" id="scene">
  <canvas id="waveform"></canvas>
  <div class="glow-backdrop" id="glowBackdrop"></div>
  <div class="message-layer"><div class="message-text" id="messageText"></div></div>
  <div class="bpm" id="bpmDisplay">♡ <span id="bpmValue">72</span> bpm</div>
  <div class="hold-prompt" id="holdPrompt">hold anywhere to feel closer</div>
</div>

<div class="finale" id="finale">
  <div class="finale-heart">💗</div>
  <div class="finale-text" id="finaleText"></div>
</div>

<script>
// === CONTENT SLOTS ===
/* <!-- SLOT: messages --> */
const messages = [
  "Every heartbeat\nis a word I can't say\nout loud",
  "I carry you\nin the space between\nmy ribs",
  "Some nights I swear\nI can hear yours\nfrom here",
  "This is the rhythm\nof missing you",
  "Two hearts,\none frequency"
];
/* <!-- /SLOT --> */

/* <!-- SLOT: finale_message --> */
const finaleMessage = "My heart beats\nin your time zone";
/* <!-- /SLOT --> */

/* <!-- SLOT: bpm --> */
const heartBPM = 72;
/* <!-- /SLOT --> */

// === AUDIO ENGINE ===
let audioCtx, gainNode;
const beatInterval = 60000 / heartBPM;

function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  gainNode = audioCtx.createGain();
  gainNode.gain.value = 0.15;
  gainNode.connect(audioCtx.destination);
}

function playHeartbeat(strong) {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  // Lub
  const o1 = audioCtx.createOscillator(), g1 = audioCtx.createGain();
  o1.type = 'sine';
  o1.frequency.setValueAtTime(strong ? 55 : 45, now);
  o1.frequency.exponentialRampToValueAtTime(30, now + 0.15);
  g1.gain.setValueAtTime(strong ? 0.5 : 0.3, now);
  g1.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
  o1.connect(g1).connect(gainNode);
  o1.start(now); o1.stop(now + 0.2);
  // Dub
  const o2 = audioCtx.createOscillator(), g2 = audioCtx.createGain();
  o2.type = 'sine';
  o2.frequency.setValueAtTime(strong ? 80 : 65, now + 0.1);
  o2.frequency.exponentialRampToValueAtTime(40, now + 0.22);
  g2.gain.setValueAtTime(0, now);
  g2.gain.setValueAtTime(strong ? 0.35 : 0.2, now + 0.1);
  g2.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
  o2.connect(g2).connect(gainNode);
  o2.start(now + 0.1); o2.stop(now + 0.25);
  if (navigator.vibrate) navigator.vibrate(strong ? [60, 80, 40] : [30, 60, 20]);
}

// === CANVAS ===
const canvas = document.getElementById('waveform');
const ctx = canvas.getContext('2d');
let W, H, centerX, centerY;
let intensity = 0, holdIntensity = 0, isHolding = false, morphToHeart = 0;

function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  centerX = W / 2; centerY = H / 2;
}
window.addEventListener('resize', resize);
resize();

function heartX(t) { return 16 * Math.pow(Math.sin(t), 3); }
function heartY(t) { return -(13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t)); }

function drawWaveform(time) {
  ctx.clearRect(0, 0, W, H);
  const numPts = 200;
  const waveWidth = Math.min(W * 0.85, 380);
  const waveHeight = 60 + intensity * 40 + holdIntensity * 30;

  for (let layer = 0; layer < 3; layer++) {
    const alpha = [0.5, 0.25, 0.12][layer];
    const spread = [0, 4, 8][layer];
    const tOff = layer * 0.3;
    ctx.beginPath();
    for (let i = 0; i <= numPts; i++) {
      const t = i / numPts;
      let wY = 0;
      // ECG shape
      const p = (t - 0.35) * 30;
      wY += Math.exp(-p*p) * 0.15 * intensity;
      const q = (t - 0.45) * 50;
      wY -= Math.exp(-q*q) * 0.2 * intensity;
      const r = (t - 0.5) * 40;
      wY += Math.exp(-r*r) * 1.0 * intensity;
      const s = (t - 0.55) * 50;
      wY -= Math.exp(-s*s) * 0.3 * intensity;
      const tw = (t - 0.65) * 25;
      wY += Math.exp(-tw*tw) * 0.25 * intensity;
      wY += Math.sin(t * 12 + time * 0.001 + tOff) * 0.03 * (1 + holdIntensity);

      const heartT = t * Math.PI * 2 - Math.PI;
      const hx = heartX(heartT) * 5;
      const hy = heartY(heartT) * 5;
      const lineX = (t - 0.5) * waveWidth;
      const lineY = -wY * waveHeight;
      const fx = centerX + lineX * (1 - morphToHeart) + hx * morphToHeart;
      const fy = centerY + lineY * (1 - morphToHeart) + hy * morphToHeart + spread;
      if (i === 0) ctx.moveTo(fx, fy); else ctx.lineTo(fx, fy);
    }
    const g = Math.round(60 + holdIntensity * 40);
    const b = Math.round(100 + holdIntensity * 55);
    ctx.strokeStyle = `rgba(255, ${g}, ${b}, ${alpha})`;
    ctx.lineWidth = layer === 0 ? 2 : 1;
    if (layer === 0) { ctx.shadowColor = `rgba(255, 80, 120, ${alpha * 0.5})`; ctx.shadowBlur = 15 + intensity * 10; }
    ctx.stroke();
    ctx.shadowBlur = 0;
  }
}

// === MAIN LOOP ===
let running = false, startTime = 0, lastBeatTime = 0, beatCount = 0;
let msgTimer = null, finaleShown = false;

function animate(time) {
  if (!running) return;
  const tSinceBeat = time - lastBeatTime;
  intensity *= 0.94;
  holdIntensity = isHolding ? Math.min(holdIntensity + 0.008, 1) : holdIntensity * 0.97;
  const targetMorph = finaleShown ? 1 : holdIntensity * 0.6;
  morphToHeart += (targetMorph - morphToHeart) * 0.02;

  if (tSinceBeat >= beatInterval) {
    lastBeatTime = time;
    intensity = 1;
    beatCount++;
    playHeartbeat(beatCount % 2 === 0);
    const glow = document.getElementById('glowBackdrop');
    glow.style.opacity = '1.5';
    setTimeout(() => glow.style.opacity = '1', 300);

    if (!finaleShown) {
      if (beatCount === 4) showMsg(0);
      else if (beatCount === 12) showMsg(1);
      else if (beatCount === 20) showMsg(2);
      else if (beatCount === 28) showMsg(3);
      else if (beatCount === 36) showMsg(4);
      else if (beatCount === 44) showFinale();
    }
  }
  drawWaveform(time);
  requestAnimationFrame(animate);
}

function showMsg(i) {
  const el = document.getElementById('messageText');
  el.classList.remove('visible'); el.classList.add('fading');
  setTimeout(() => {
    el.textContent = messages[i];
    el.classList.remove('fading');
    void el.offsetWidth;
    el.classList.add('visible');
  }, 600);
  clearTimeout(msgTimer);
  msgTimer = setTimeout(() => {
    el.classList.remove('visible'); el.classList.add('fading');
  }, beatInterval * 6);
}

function showFinale() {
  finaleShown = true;
  const el = document.getElementById('messageText');
  el.classList.remove('visible'); el.classList.add('fading');
  setTimeout(() => {
    document.getElementById('finaleText').textContent = finaleMessage;
    document.getElementById('finale').classList.add('visible');
  }, 1500);
}

// === INTERACTION ===
document.getElementById('startScreen').addEventListener('click', () => {
  initAudio();
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('scene').classList.add('active');
  const sb = document.getElementById('soundBadge');
  sb.classList.add('visible');
  setTimeout(() => sb.classList.remove('visible'), 3000);
  setTimeout(() => {
    const hp = document.getElementById('holdPrompt');
    hp.classList.add('visible');
    setTimeout(() => hp.classList.remove('visible'), 4000);
  }, beatInterval * 8);
  document.getElementById('bpmValue').textContent = heartBPM;
  running = true;
  startTime = performance.now();
  lastBeatTime = startTime;
  requestAnimationFrame(animate);
});

document.addEventListener('mousedown', () => { if (running) isHolding = true; });
document.addEventListener('mouseup', () => { isHolding = false; });
document.addEventListener('touchstart', (e) => {
  if (running && !document.getElementById('startScreen').contains(e.target)) isHolding = true;
});
document.addEventListener('touchend', () => { isHolding = false; });

// === PARTICLES ===
for (let i = 0; i < 20; i++) {
  const p = document.createElement('div');
  p.className = 'ambient-particle';
  p.style.left = Math.random() * 100 + '%';
  p.style.top = (60 + Math.random() * 40) + '%';
  p.style.animationDuration = (8 + Math.random() * 12) + 's';
  p.style.animationDelay = (-Math.random() * 15) + 's';
  p.style.width = p.style.height = (1 + Math.random() * 1.5) + 'px';
  document.body.appendChild(p);
}
</script>
</body>
</html>
