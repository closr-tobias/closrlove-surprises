<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Comfort Cocoon — Closr Building Block</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: #08080e;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100dvh;
    user-select: none; -webkit-user-select: none;
    touch-action: none;
    overflow: hidden;
    font-family: 'Cormorant Garamond', serif;
    transition: background 3s cubic-bezier(0.25,0.46,0.45,0.94);
  }
  body.warm { background: #0e0a0c; }

  .back-link { position: fixed; top: 14px; left: 14px; font-size: 0.65rem; color: #ffffff12; text-decoration: none; z-index: 200; font-family: 'Inter', sans-serif; }
  .block-label { position: fixed; top: 14px; right: 14px; font-size: 0.5rem; color: #ffffff0a; letter-spacing: 1px; z-index: 200; font-family: 'Inter', sans-serif; }

  .orb {
    position: fixed;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,180,140,0.12) 0%, rgba(232,164,184,0.06) 40%, transparent 70%);
    filter: blur(30px);
    pointer-events: none;
    transition: width 2s cubic-bezier(0.25,0.46,0.45,0.94), height 2s cubic-bezier(0.25,0.46,0.45,0.94), filter 2s, opacity 1.5s;
    opacity: 0.4;
    z-index: 0;
  }
  .orb.warm { width: 800px; height: 800px; filter: blur(80px); opacity: 1; }

  .orb-ring {
    position: fixed;
    width: 80px; height: 80px;
    border-radius: 50%;
    border: 1px solid rgba(255,180,140,0.0);
    pointer-events: none;
    transition: width 2.5s cubic-bezier(0.25,0.46,0.45,0.94), height 2.5s cubic-bezier(0.25,0.46,0.45,0.94), border-color 2s, opacity 2s;
    opacity: 0; z-index: 0;
  }
  .orb-ring.warm { width: 500px; height: 500px; border-color: rgba(255,180,140,0.06); opacity: 1; }

  .pulse-ring {
    position: fixed;
    width: 60px; height: 60px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,180,140,0.15);
    pointer-events: none; z-index: 1; opacity: 0;
  }
  .pulse-ring.active { animation: pulseOut 2s cubic-bezier(0.25,0.46,0.45,0.94) infinite; }
  @keyframes pulseOut {
    0% { width: 60px; height: 60px; opacity: 0.3; }
    100% { width: 350px; height: 350px; opacity: 0; }
  }

  .ember {
    position: fixed;
    width: 2px; height: 2px;
    background: rgba(255,180,140,0.0);
    border-radius: 50%;
    pointer-events: none;
    transition: background 2s;
  }
  .ember.warm { background: rgba(255,180,140,0.12); }

  .comfort-layer {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none; z-index: 10;
  }

  .comfort-text {
    position: absolute;
    font-weight: 300;
    color: rgba(255,230,220,0);
    text-align: center;
    line-height: 1.5;
    letter-spacing: 0.02em;
    transition: color 1.2s cubic-bezier(0.25,0.46,0.45,0.94), transform 1.2s cubic-bezier(0.25,0.46,0.45,0.94), filter 1.2s;
    filter: blur(8px);
    max-width: 80vw;
  }
  .comfort-text.visible { color: rgba(255,230,220,0.85); filter: blur(0px); }
  .comfort-text.fading { color: rgba(255,230,220,0); filter: blur(8px); }

  .layer-1 { font-size: clamp(1.1rem, 4.5vw, 1.6rem); font-style: italic; transform: translateY(8px); }
  .layer-1.visible { transform: translateY(0); }
  .layer-2 { font-size: clamp(1.3rem, 5vw, 1.9rem); font-weight: 400; transform: translateY(8px); }
  .layer-2.visible { transform: translateY(0); }
  .layer-3 { font-size: clamp(0.85rem, 3.5vw, 1.1rem); font-weight: 300; bottom: 28%; transform: translateY(6px); letter-spacing: 0.08em; }
  .layer-3.visible { transform: translateY(0); }
  .layer-4 { font-size: clamp(0.75rem, 2.8vw, 0.95rem); font-weight: 300; font-style: italic; top: 22%; transform: translateY(-6px); }
  .layer-4.visible { transform: translateY(0); }

  .prompt {
    position: fixed; bottom: 14%; left: 0; right: 0;
    text-align: center; font-family: 'Inter', sans-serif;
    font-size: 0.6rem; color: rgba(255,180,140,0.2);
    letter-spacing: 3px; text-transform: uppercase;
    pointer-events: none; z-index: 20; transition: opacity 1s;
  }
  .prompt.hidden { opacity: 0; }

  .heart {
    position: fixed; bottom: 18%;
    font-size: 1.2rem; opacity: 0.08;
    pointer-events: none; z-index: 20;
    transition: opacity 1.5s, transform 0.6s;
  }
  .heart.warm { opacity: 0.25; animation: heartbeat 1.2s ease-in-out infinite; }
  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    15% { transform: scale(1.15); }
    30% { transform: scale(1); }
    45% { transform: scale(1.1); }
  }

  .vignette {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(8,8,14,0.6) 100%);
    pointer-events: none; z-index: 5; transition: background 2s;
  }
  .vignette.warm { background: radial-gradient(ellipse at center, transparent 60%, rgba(8,8,14,0.3) 100%); }
</style>
</head>
<body>

<a href="../building-blocks.html" class="back-link">← blocks</a>
<div class="block-label">closr · comfort cocoon</div>

<div class="orb" id="orb"></div>
<div class="orb-ring" id="orbRing"></div>
<div class="pulse-ring" id="pulseRing"></div>
<div class="vignette" id="vignette"></div>

<div class="comfort-layer">
  <!-- SLOT: opener --> <div class="comfort-text layer-1" id="layer1">hey… I know today was heavy</div> <!-- /SLOT -->
  <!-- SLOT: heart --> <div class="comfort-text layer-2" id="layer2">you don't have to carry it alone —<br>I'm right here, and I'm not going anywhere</div> <!-- /SLOT -->
  <!-- SLOT: anchor --> <div class="comfort-text layer-3" id="layer3">breathe with me. in… and out.</div> <!-- /SLOT -->
  <!-- SLOT: whisper --> <div class="comfort-text layer-4" id="layer4">you are so much stronger than you know</div> <!-- /SLOT -->
</div>

<div class="heart" id="heart">♥</div>
<div class="prompt" id="prompt">press &amp; hold anywhere</div>

<script>
(function(){
  var body = document.body;
  var orb = document.getElementById('orb');
  var orbRing = document.getElementById('orbRing');
  var pulseRing = document.getElementById('pulseRing');
  var vignette = document.getElementById('vignette');
  var heart = document.getElementById('heart');
  var prompt = document.getElementById('prompt');
  var layers = [
    document.getElementById('layer1'),
    document.getElementById('layer2'),
    document.getElementById('layer3'),
    document.getElementById('layer4')
  ];

  var holding = false, holdStart = 0, revealed = [], raf;

  // Spawn embers
  var embers = [];
  for (var i = 0; i < 25; i++) {
    var e = document.createElement('div');
    e.className = 'ember';
    e.style.left = Math.random() * 100 + 'vw';
    e.style.top = Math.random() * 100 + 'vh';
    var sz = (Math.random() * 2.5 + 1) + 'px';
    e.style.width = sz; e.style.height = sz;
    e.dataset.phase = (Math.random() * Math.PI * 2).toString();
    e.dataset.speed = (Math.random() * 0.5 + 0.2).toString();
    document.body.appendChild(e);
    embers.push(e);
  }

  var time = 0;
  function animateEmbers() {
    time += 0.008;
    embers.forEach(function(e) {
      var phase = parseFloat(e.dataset.phase);
      var speed = parseFloat(e.dataset.speed);
      var dx = Math.sin(time * speed + phase) * 15;
      var dy = Math.cos(time * speed * 0.7 + phase) * 10 - time * 2 * speed;
      e.style.transform = 'translate(' + dx + 'px, ' + dy + 'px)';
    });
    requestAnimationFrame(animateEmbers);
  }
  animateEmbers();

  var thresholds = [0.4, 2.0, 4.0, 6.0];

  function updateWarmth() {
    if (!holding) return;
    var elapsed = (Date.now() - holdStart) / 1000;
    for (var i = 0; i < thresholds.length; i++) {
      if (elapsed >= thresholds[i] && revealed.indexOf(i) === -1) revealLayer(i);
    }
    raf = requestAnimationFrame(updateWarmth);
  }

  function revealLayer(idx) {
    revealed.push(idx);
    if (idx === 1) {
      layers[0].classList.remove('visible');
      layers[0].classList.add('fading');
    }
    setTimeout(function() {
      layers[idx].classList.add('visible');
      layers[idx].classList.remove('fading');
    }, idx === 1 ? 600 : 0);
  }

  function startHold() {
    if (holding) return;
    holding = true;
    holdStart = Date.now();
    body.classList.add('warm');
    orb.classList.add('warm');
    orbRing.classList.add('warm');
    pulseRing.classList.add('active');
    vignette.classList.add('warm');
    heart.classList.add('warm');
    prompt.classList.add('hidden');
    embers.forEach(function(e) { e.classList.add('warm'); });
    updateWarmth();
  }

  function endHold() {
    if (!holding) return;
    holding = false;
    cancelAnimationFrame(raf);
    var elapsed = (Date.now() - holdStart) / 1000;
    pulseRing.classList.remove('active');
    if (elapsed < 3) {
      setTimeout(function() {
        if (holding) return;
        body.classList.remove('warm');
        orb.classList.remove('warm');
        orbRing.classList.remove('warm');
        vignette.classList.remove('warm');
        heart.classList.remove('warm');
        embers.forEach(function(e) { e.classList.remove('warm'); });
        revealed.forEach(function(i) {
          layers[i].classList.remove('visible');
          layers[i].classList.add('fading');
        });
        revealed = [];
        prompt.classList.remove('hidden');
      }, 800);
    }
  }

  body.addEventListener('touchstart', function(e) { e.preventDefault(); startHold(); }, { passive: false });
  body.addEventListener('touchend', function() { endHold(); });
  body.addEventListener('touchcancel', function() { endHold(); });
  body.addEventListener('mousedown', function(e) { if (e.target.tagName === 'A') return; e.preventDefault(); startHold(); });
  window.addEventListener('mouseup', function() { endHold(); });
})();
</script>
</body>
</html>
