<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Aurora Sky</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a1a;font-family:'Georgia',serif;touch-action:none;user-select:none}
canvas#sky{position:fixed;top:0;left:0;width:100%;height:100%}
#stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--dur) ease-in-out infinite alternate}
@keyframes twinkle{0%{opacity:.2;transform:scale(.8)}100%{opacity:1;transform:scale(1.2)}}
#message-layer{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10}
.aurora-msg{color:#fff;font-size:clamp(1.2rem,5vw,2rem);text-align:center;opacity:0;transform:translateY(30px);transition:all 1.2s cubic-bezier(.23,1,.32,1);text-shadow:0 0 40px rgba(100,255,200,.6),0 0 80px rgba(100,200,255,.3);padding:0 2rem;line-height:1.6;max-width:90%;letter-spacing:.02em}
.aurora-msg.visible{opacity:1;transform:translateY(0)}
.aurora-msg.fade{opacity:0;transform:translateY(-30px)}
#hint{position:fixed;bottom:40px;left:0;width:100%;text-align:center;color:rgba(255,255,255,.4);font-size:.85rem;z-index:20;transition:opacity 1s;letter-spacing:.1em}
#progress{position:fixed;bottom:0;left:0;height:3px;background:linear-gradient(90deg,#64ffda,#a78bfa,#f472b6);z-index:20;transition:width .6s ease;width:0}
.shooting-star{position:fixed;width:3px;height:3px;background:#fff;border-radius:50%;pointer-events:none;z-index:5}
.shooting-star::after{content:'';position:absolute;top:0;right:0;width:60px;height:1px;background:linear-gradient(90deg,rgba(255,255,255,.8),transparent);transform-origin:right center}
</style>
</head>
<body>
<canvas id="sky"></canvas>
<div id="stars"></div>
<div id="message-layer"><div class="aurora-msg" id="msg"></div></div>
<div id="hint">touch & drag to paint the aurora ✦</div>
<div id="progress"></div>
<script>
const canvas=document.getElementById('sky'),ctx=canvas.getContext('2d');
let W,H;function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}
resize();addEventListener('resize',resize);
const starsEl=document.getElementById('stars');
for(let i=0;i<120;i++){const s=document.createElement('div');s.className='star';const size=Math.random()*2.5+.5;Object.assign(s.style,{width:size+'px',height:size+'px',left:Math.random()*100+'%',top:Math.random()*70+'%','--dur':(2+Math.random()*4)+'s',animationDelay:-Math.random()*4+'s'});starsEl.appendChild(s)}
const ribbons=[];
const palettes=[['#64ffda','#00bfa5','#1de9b6'],['#a78bfa','#7c3aed','#c084fc'],['#f472b6','#ec4899','#fb7185'],['#38bdf8','#0ea5e9','#7dd3fc'],['#fbbf24','#f59e0b','#fcd34d']];
class Ribbon{constructor(x,y,palette){this.points=[{x,y}];this.palette=palette;this.life=1;this.width=60+Math.random()*40;this.phase=Math.random()*Math.PI*2}addPoint(x,y){if(this.points.length>80)this.points.shift();this.points.push({x,y});this.life=1}draw(ctx,t){if(this.points.length<2)return false;this.life-=.003;if(this.life<=0)return false;const a=this.life*.6;ctx.save();ctx.globalAlpha=a;ctx.globalCompositeOperation='screen';const grad=ctx.createLinearGradient(0,0,W,0);this.palette.forEach((c,i)=>grad.addColorStop(i/(this.palette.length-1),c));ctx.strokeStyle=grad;ctx.lineWidth=this.width*this.life;ctx.lineCap='round';ctx.lineJoin='round';ctx.shadowColor=this.palette[0];ctx.shadowBlur=40*this.life;ctx.beginPath();const pts=this.points;ctx.moveTo(pts[0].x,pts[0].y+Math.sin(t*.002+this.phase)*8);for(let i=1;i<pts.length;i++){const xc=(pts[i-1].x+pts[i].x)/2,yc=(pts[i-1].y+pts[i].y)/2+Math.sin(t*.002+i*.1+this.phase)*8;ctx.quadraticCurveTo(pts[i-1].x,pts[i-1].y+Math.sin(t*.002+(i-1)*.1+this.phase)*8,xc,yc)}ctx.stroke();ctx.restore();return true}}
let painting=false,currentRibbon=null,paletteIdx=0,touchCount=0;
function getPos(e){const t=e.touches?e.touches[0]:e;return{x:t.clientX,y:t.clientY}}
document.addEventListener('touchstart',e=>{e.preventDefault();start(getPos(e))},{passive:false});
document.addEventListener('mousedown',e=>start(getPos(e)));
function start(p){painting=true;paletteIdx=(paletteIdx+1)%palettes.length;currentRibbon=new Ribbon(p.x,p.y,palettes[paletteIdx]);ribbons.push(currentRibbon);touchCount++;if(touchCount===1)document.getElementById('hint').style.opacity='0';checkMessages()}
document.addEventListener('touchmove',e=>{e.preventDefault();move(getPos(e))},{passive:false});
document.addEventListener('mousemove',e=>{if(painting)move(getPos(e))});
function move(p){if(painting&&currentRibbon)currentRibbon.addPoint(p.x,p.y)}
document.addEventListener('touchend',()=>{painting=false;currentRibbon=null});
document.addEventListener('mouseup',()=>{painting=false;currentRibbon=null});
const messages=["Under the same sky,\nwe found each other","Every color in this aurora\nis a moment I fell deeper","You are my favorite\nconstellation","Some people search\ntheir whole lives\nfor what we have","I'd paint the whole sky\njust to make you smile","This is our universe —\nbeautiful, infinite, ours"];
let msgIndex=0,msgEl=document.getElementById('msg'),progEl=document.getElementById('progress');
const msgThresholds=[2,5,9,14,20,27];
function checkMessages(){if(msgIndex>=messages.length)return;if(touchCount>=msgThresholds[msgIndex]){showMessage(messages[msgIndex]);msgIndex++;progEl.style.width=(msgIndex/messages.length*100)+'%'}}
function showMessage(text){msgEl.className='aurora-msg';msgEl.innerHTML=text.replace(/\n/g,'<br>');requestAnimationFrame(()=>msgEl.classList.add('visible'));setTimeout(()=>{msgEl.classList.remove('visible');msgEl.classList.add('fade')},4000)}
function spawnShootingStar(){const el=document.createElement('div');el.className='shooting-star';const x=Math.random()*W,y=Math.random()*H*.4;Object.assign(el.style,{left:x+'px',top:y+'px'});document.body.appendChild(el);const angle=-15-Math.random()*20,speed=8+Math.random()*6,rad=angle*Math.PI/180;let life=0;function anim(){life++;el.style.transform=`translate(${Math.cos(rad)*speed*life}px,${-Math.sin(rad)*speed*life}px) rotate(${angle}deg)`;el.style.opacity=Math.max(0,1-life/40);if(life<40)requestAnimationFrame(anim);else el.remove()}anim()}
setInterval(()=>{if(Math.random()<.4)spawnShootingStar()},3000);setTimeout(spawnShootingStar,1500);
const ambientPhases=[Math.random()*6,Math.random()*6,Math.random()*6];
function draw(t){ctx.clearRect(0,0,W,H);for(let i=0;i<3;i++){const x=W*(.2+i*.3)+Math.sin(t*.0005+ambientPhases[i])*W*.1,y=H*.15+Math.sin(t*.0008+i)*20,grad=ctx.createRadialGradient(x,y,0,x,y,H*.4),col=palettes[i][0];grad.addColorStop(0,col+'18');grad.addColorStop(.5,col+'08');grad.addColorStop(1,'transparent');ctx.globalCompositeOperation='screen';ctx.fillStyle=grad;ctx.fillRect(0,0,W,H)}ctx.globalCompositeOperation='source-over';for(let i=ribbons.length-1;i>=0;i--){if(!ribbons[i].draw(ctx,t))ribbons.splice(i,1)}requestAnimationFrame(draw)}
requestAnimationFrame(draw);
</script>
</body>
</html>
