<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Hot Air Balloon</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=Inter:wght@300;400;500&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',sans-serif;height:100vh;overflow:hidden;transition:background 2s}
  .sky{position:fixed;top:0;left:0;width:100%;height:100%;transition:all 2s}
  .balloon-wrap{position:fixed;bottom:30%;left:50%;transform:translateX(-50%);z-index:2;transition:transform 2s cubic-bezier(.4,0,.2,1)}
  svg.balloon{width:120px;height:180px;filter:drop-shadow(0 10px 30px rgba(0,0,0,.2))}
  .clouds{position:fixed;width:100%;height:100%;z-index:1;pointer-events:none;overflow:hidden}
  .cloud{position:absolute;background:rgba(255,255,255,.15);border-radius:50%;filter:blur(30px);transition:all 2s}
  .message-area{position:fixed;top:10%;left:50%;transform:translateX(-50%);z-index:3;text-align:center;width:85%;max-width:360px}
  .msg-text{font-family:'Caveat',cursive;font-size:1.8rem;line-height:1.5;opacity:0;transition:all 1s;transform:translateY(30px)}
  .msg-text.show{opacity:1;transform:translateY(0)}
  .msg-label{font-size:.6rem;letter-spacing:3px;opacity:0;transition:all .5s .5s;margin-top:12px}
  .msg-label.show{opacity:.3}
  .hint{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);font-size:.75rem;z-index:4;animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.2}50%{opacity:.5}}
  .altitude{position:fixed;right:16px;top:50%;transform:translateY(-50%);width:3px;height:40%;background:rgba(255,255,255,.06);border-radius:2px;z-index:4}
  .alt-fill{position:absolute;bottom:0;width:100%;background:rgba(255,255,255,.25);border-radius:2px;transition:height 2s}
  .alt-label{position:absolute;top:-20px;left:50%;transform:translateX(-50%);font-size:.5rem;letter-spacing:1px;white-space:nowrap}
</style>
</head>
<body>
<div class="sky" id="sky"></div>
<div class="clouds" id="clouds"></div>
<div class="balloon-wrap" id="balloonWrap">
  <svg class="balloon" viewBox="0 0 120 180">
    <defs>
      <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ff6b6b"/><stop offset="50%" stop-color="#ee5a24"/><stop offset="100%" stop-color="#f9ca24"/></linearGradient>
    </defs>
    <ellipse cx="60" cy="60" rx="42" ry="55" fill="url(#bg)" opacity=".95"/>
    <path d="M18 60 Q60 130 102 60" fill="none" stroke="rgba(255,255,255,.15)" stroke-width="1"/>
    <path d="M30 60 Q60 120 90 60" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="1"/>
    <line x1="40" y1="110" x2="45" y2="135" stroke="#8a7a5a" stroke-width="1.5"/>
    <line x1="80" y1="110" x2="75" y2="135" stroke="#8a7a5a" stroke-width="1.5"/>
    <rect x="42" y="135" width="36" height="25" rx="3" fill="#8a6a3a" opacity=".8"/>
    <rect x="42" y="135" width="36" height="25" rx="3" fill="none" stroke="#a07a4a" stroke-width="1"/>
  </svg>
</div>
<div class="message-area">
  <div class="msg-text" id="msgText"></div>
  <div class="msg-label" id="msgLabel"></div>
</div>
<div class="altitude"><div class="alt-fill" id="altFill"></div><div class="alt-label" id="altLabel" style="color:rgba(255,255,255,.2)"></div></div>
<div class="hint" id="hint" style="color:rgba(255,255,255,.3)">tap to rise</div>
<script>
const levels = [
  { text:"Every journey starts with a single breath of courage.", label:"GROUND LEVEL", bgTop:'#1a1a2e', bgBot:'#16213e', msgColor:'#c0d0e8', altitude:0 },
  { text:"The higher you go, the smaller your worries become.", label:"THROUGH THE MIST", bgTop:'#1e2a4a', bgBot:'#2a3a5e', msgColor:'#b8c8e0', altitude:20 },
  { text:"Above the clouds, everything becomes clear.", label:"CLOUD BREAK", bgTop:'#2a3e6e', bgBot:'#4a6fa5', msgColor:'#d0e0ff', altitude:40 },
  { text:"From up here, I can see our whole future stretching out.", label:"GOLDEN HOUR", bgTop:'#4a6fa5', bgBot:'#e8a040', msgColor:'#fff0d0', altitude:60 },
  { text:"Some people make you feel like you're flying even when you're standing still. You're that person.", label:"ABOVE IT ALL", bgTop:'#2a1a3e', bgBot:'#1a0a2e', msgColor:'#e0c0f0', altitude:80 },
  { text:"I'd float through a thousand skies just to land next to you.", label:"∞ FEET", bgTop:'#0a0614', bgBot:'#0a0a1e', msgColor:'#f0e0ff', altitude:100 },
];
let current = 0;
const balloonWrap = document.getElementById('balloonWrap');
const sky = document.getElementById('sky');
const msgText = document.getElementById('msgText');
const msgLabel = document.getElementById('msgLabel');
const altFill = document.getElementById('altFill');

// Generate clouds
const cloudsEl = document.getElementById('clouds');
for (let i = 0; i < 12; i++) {
  const c = document.createElement('div');
  c.className = 'cloud';
  c.style.width = (100 + Math.random()*200) + 'px';
  c.style.height = (60 + Math.random()*80) + 'px';
  c.style.left = (Math.random()*100) + '%';
  c.style.top = (20 + Math.random()*60) + '%';
  c.style.opacity = 0.05 + Math.random()*0.1;
  cloudsEl.appendChild(c);
}

function setLevel(idx) {
  const l = levels[idx];
  sky.style.background = `linear-gradient(180deg, ${l.bgTop}, ${l.bgBot})`;
  msgText.classList.remove('show'); msgLabel.classList.remove('show');
  msgText.style.color = l.msgColor;
  msgLabel.style.color = l.msgColor;
  balloonWrap.style.transform = `translateX(-50%) translateY(${-idx * 15}px)`;
  altFill.style.height = l.altitude + '%';
  document.getElementById('altLabel').textContent = l.altitude === 100 ? '∞ ft' : (l.altitude * 100) + ' ft';
  setTimeout(() => {
    msgText.textContent = l.text;
    msgLabel.textContent = l.label;
    msgText.classList.add('show');
    msgLabel.classList.add('show');
  }, 500);
  document.querySelectorAll('.cloud').forEach(c => {
    c.style.transform = `translateY(${idx * 40}px)`;
    c.style.opacity = Math.max(0.02, 0.1 - idx * 0.015);
  });
}

setLevel(0);
document.addEventListener('click', () => {
  current++;
  if (current >= levels.length) current = 0;
  setLevel(current);
  document.getElementById('hint').style.display = 'none';
});
</script>
</body>
</html>
