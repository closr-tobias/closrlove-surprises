<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Zippo Lighter</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0a;font-family:'Georgia',serif;user-select:none;-webkit-user-select:none}
canvas{position:fixed;top:0;left:0;width:100%;height:100%}
#hint{position:fixed;bottom:60px;left:0;width:100%;text-align:center;color:rgba(255,200,140,.5);font-size:13px;letter-spacing:2px;z-index:3;animation:pulse 2s ease-in-out infinite;transition:opacity .8s}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:.8}}
#message{position:fixed;top:10%;left:0;width:100%;text-align:center;z-index:3;opacity:0;transition:opacity 1.5s;padding:0 30px}
#message .line{color:rgba(255,220,170,0);font-size:22px;line-height:1.7;letter-spacing:1px;transition:color 2s}
#message .line.visible{color:rgba(255,220,170,.9)}
#counter{position:fixed;top:20px;right:20px;color:rgba(255,200,140,.3);font-size:12px;z-index:3;letter-spacing:1px}
#lighter-zone{position:fixed;bottom:0;left:0;width:100%;height:55%;z-index:4;cursor:pointer}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">FLICK UPWARD TO LIGHT</div>
<div id="message"></div>
<div id="counter"></div>
<div id="lighter-zone"></div>
<script>
const messages=[
"You make the dark\nfeel less heavy",
"Every time I hear your voice\nthe world gets warmer",
"I didn't know what home meant\nuntil I found you",
"You're the reason\nI believe in forever",
"Some people search\ntheir whole lives\nfor what we have",
"I carry you with me\neverywhere I go",
"You turned my ordinary\ninto extraordinary",
"The best part of my day\nis any part with you"
];
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H,dpr,lit=false,flameIntensity=0,currentMsg=0,touchStartY=0,particles=[],flickCooldown=false;
function resize(){dpr=Math.min(window.devicePixelRatio||1,2);W=window.innerWidth;H=window.innerHeight;canvas.width=W*dpr;canvas.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0)}
resize();window.addEventListener('resize',resize);
function getLighter(){const w=Math.min(W*.28,120),h=w*2.6,x=W/2-w/2,y=H-h-40;return{x,y,w,h}}
class Particle{constructor(x,y){this.x=x+(Math.random()-.5)*8;this.y=y;this.vx=(Math.random()-.5)*.8;this.vy=-(1.5+Math.random()*2);this.life=1;this.decay=.015+Math.random()*.02;this.size=2+Math.random()*3}update(){this.x+=this.vx;this.vy-=.02;this.y+=this.vy;this.life-=this.decay;this.size*=.995}draw(){if(this.life<=0)return;const a=this.life*flameIntensity;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fillStyle=this.life>.6?`rgba(255,200,80,${a})`:this.life>.3?`rgba(255,120,30,${a*.7})`:`rgba(255,60,20,${a*.4})`;ctx.fill()}}
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath()}
function drawLighter(){const l=getLighter();
ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(l.x+6,l.y+6,l.w,l.h);
const bg=ctx.createLinearGradient(l.x,l.y,l.x+l.w,l.y);bg.addColorStop(0,'#3a3a3a');bg.addColorStop(.3,'#5a5a5a');bg.addColorStop(.5,'#6a6a6a');bg.addColorStop(.7,'#5a5a5a');bg.addColorStop(1,'#3a3a3a');ctx.fillStyle=bg;roundRect(l.x,l.y+l.h*.15,l.w,l.h*.85,4);ctx.fill();
const lidY=l.y,lidH=l.h*.18;const lg=ctx.createLinearGradient(l.x,lidY,l.x+l.w,lidY);lg.addColorStop(0,'#4a4a4a');lg.addColorStop(.5,'#7a7a7a');lg.addColorStop(1,'#4a4a4a');ctx.fillStyle=lg;roundRect(l.x,lidY,l.w,lidH,4);ctx.fill();
ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(l.x,l.y+lidH);ctx.lineTo(l.x+l.w,l.y+lidH);ctx.stroke();
const wickX=l.x+l.w/2,wickY=l.y+8;ctx.fillStyle='#2a2a2a';ctx.fillRect(wickX-4,wickY,8,lidH-10);ctx.fillStyle='#1a1a1a';ctx.beginPath();ctx.arc(wickX,wickY,4,0,Math.PI*2);ctx.fill();
ctx.fillStyle=`rgba(255,200,140,${.08+flameIntensity*.12})`;ctx.font=`${l.w*.14}px Georgia`;ctx.textAlign='center';ctx.fillText('\u2665',l.x+l.w/2,l.y+l.h*.65);
return{wickX,wickY}}
function drawFlame(wx,wy){if(flameIntensity<=0)return;
const glowR=60+Math.sin(Date.now()*.005)*10;const glow=ctx.createRadialGradient(wx,wy-20,0,wx,wy-20,glowR*flameIntensity);glow.addColorStop(0,`rgba(255,180,60,${.3*flameIntensity})`);glow.addColorStop(.5,`rgba(255,100,20,${.1*flameIntensity})`);glow.addColorStop(1,'rgba(255,60,10,0)');ctx.fillStyle=glow;ctx.fillRect(wx-80,wy-100,160,120);
const t=Date.now()*.003,flicker=Math.sin(t)*3,h=(30+Math.sin(t*1.3)*5)*flameIntensity;
ctx.beginPath();ctx.moveTo(wx-8,wy);ctx.quadraticCurveTo(wx-10+flicker,wy-h*.6,wx+flicker*.5,wy-h);ctx.quadraticCurveTo(wx+10-flicker,wy-h*.6,wx+8,wy);ctx.closePath();
const fg=ctx.createLinearGradient(wx,wy,wx,wy-h);fg.addColorStop(0,`rgba(255,200,100,${.9*flameIntensity})`);fg.addColorStop(.4,`rgba(255,150,30,${.8*flameIntensity})`);fg.addColorStop(.8,`rgba(255,80,10,${.5*flameIntensity})`);fg.addColorStop(1,`rgba(255,40,0,${.1*flameIntensity})`);ctx.fillStyle=fg;ctx.fill();
ctx.beginPath();ctx.ellipse(wx,wy-4,4*flameIntensity,8*flameIntensity,0,0,Math.PI*2);ctx.fillStyle=`rgba(100,150,255,${.5*flameIntensity})`;ctx.fill();
const sg=ctx.createRadialGradient(wx,wy-30,0,wx,wy-30,H*.6);sg.addColorStop(0,`rgba(255,150,50,${.06*flameIntensity})`);sg.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=sg;ctx.fillRect(0,0,W,H);
if(flameIntensity>.5&&Math.random()<.4)particles.push(new Particle(wx,wy-h*.8))}
function showMessage(idx){const el=document.getElementById('message'),lines=messages[idx].split('\n');el.innerHTML=lines.map(l=>`<div class="line">${l}</div>`).join('');el.style.opacity='1';document.getElementById('counter').textContent=`${idx+1} / ${messages.length}`;lines.forEach((_,i)=>{setTimeout(()=>{const e=el.querySelectorAll('.line')[i];if(e)e.classList.add('visible')},400+i*600)})}
function flick(){if(flickCooldown)return;flickCooldown=true;
if(lit){lit=false;document.getElementById('message').style.opacity='0';setTimeout(()=>{currentMsg=(currentMsg+1)%messages.length;lit=true;showMessage(currentMsg);flickCooldown=false},800)}else{lit=true;showMessage(currentMsg);document.getElementById('hint').textContent='FLICK AGAIN FOR NEXT';setTimeout(()=>{document.getElementById('hint').style.opacity='0'},2500);flickCooldown=false}}
const zone=document.getElementById('lighter-zone');
zone.addEventListener('touchstart',e=>{touchStartY=e.touches[0].clientY},{passive:true});
zone.addEventListener('touchend',e=>{if(touchStartY-e.changedTouches[0].clientY>30)flick()},{passive:true});
zone.addEventListener('click',flick);
function loop(){ctx.clearRect(0,0,W,H);ctx.fillStyle='#0a0a0a';ctx.fillRect(0,0,W,H);
if(Math.random()<.3){for(let i=0;i<20;i++){ctx.fillStyle=`rgba(255,255,255,${Math.random()*.015})`;ctx.fillRect(Math.random()*W,Math.random()*H,1,1)}}
const{wickX,wickY}=drawLighter();
if(lit)flameIntensity=Math.min(1,flameIntensity+.04);else flameIntensity=Math.max(0,flameIntensity-.06);
drawFlame(wickX,wickY);
particles.forEach(p=>{p.update();p.draw()});particles=particles.filter(p=>p.life>0);
requestAnimationFrame(loop)}
loop();
</script>
</body>
</html>
