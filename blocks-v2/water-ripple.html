<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Water Ripple</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=Inter:wght@300;400&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',sans-serif;background:linear-gradient(180deg,#060a14,#0a1628,#0e1e3a);color:#c0d8f0;height:100vh;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center}
  canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
  .content{position:relative;z-index:1;text-align:center;padding:20px}
  .message{font-family:'Caveat',cursive;font-size:2rem;color:rgba(180,220,255,.9);text-shadow:0 0 40px rgba(100,180,255,.3);opacity:0;transition:all 1.2s;transform:translateY(20px);line-height:1.5;max-width:360px;margin:0 auto}
  .message.show{opacity:1;transform:translateY(0)}
  .label{font-size:.6rem;color:rgba(150,200,255,.2);letter-spacing:3px;margin-top:16px;opacity:0;transition:all .5s .8s}
  .label.show{opacity:1}
  .hint{position:fixed;bottom:30px;font-size:.75rem;color:rgba(150,200,255,.2);animation:pulse 2s ease-in-out infinite;z-index:1}
  @keyframes pulse{0%,100%{opacity:.15}50%{opacity:.4}}
  .counter{position:fixed;top:20px;right:20px;font-size:.65rem;color:rgba(150,200,255,.15);z-index:1}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="content">
  <div class="message" id="msg"></div>
  <div class="label" id="lbl"></div>
</div>
<div class="hint" id="hint">tap the water</div>
<div class="counter" id="counter"></div>
<script>
const messages = [
  { text: "Every wave between us carries my thoughts to you.", label: "ACROSS THE WATER" },
  { text: "You are the calm in every storm I've ever known.", label: "STILLNESS" },
  { text: "Some connections run deeper than the ocean floor.", label: "DEPTH" },
  { text: "Like water finds its way, I'll always find my way to you.", label: "CURRENT" },
  { text: "You're the reflection I see when the water goes still.", label: "MIRROR" },
];
let current = 0;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let ripples = [];
let W, H;

function resize() {
  W = canvas.width = window.innerWidth * 2;
  H = canvas.height = window.innerHeight * 2;
  canvas.style.width = '100%';
  canvas.style.height = '100%';
}
resize();
window.addEventListener('resize', resize);

function addRipple(x, y) {
  ripples.push({ x: x*2, y: y*2, r: 0, maxR: Math.min(W,H)*0.4, speed: 2.5, opacity: 0.6 });
  ripples.push({ x: x*2, y: y*2, r: 0, maxR: Math.min(W,H)*0.3, speed: 1.8, opacity: 0.4 });
  ripples.push({ x: x*2, y: y*2, r: 0, maxR: Math.min(W,H)*0.2, speed: 1.2, opacity: 0.3 });
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  // Ambient water shimmer
  const t = Date.now() * 0.001;
  for (let i = 0; i < 5; i++) {
    ctx.beginPath();
    ctx.arc(W/2 + Math.sin(t+i)*100, H/2 + Math.cos(t*0.7+i)*80, 200+i*40, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(100,180,255,${0.02 + Math.sin(t+i)*0.01})`;
    ctx.lineWidth = 1;
    ctx.stroke();
  }
  // Ripples
  ripples = ripples.filter(r => {
    r.r += r.speed;
    const life = 1 - r.r / r.maxR;
    if (life <= 0) return false;
    ctx.beginPath();
    ctx.arc(r.x, r.y, r.r, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(150,210,255,${life * r.opacity})`;
    ctx.lineWidth = 2 + life * 3;
    ctx.stroke();
    // Inner ring
    if (r.r > 20) {
      ctx.beginPath();
      ctx.arc(r.x, r.y, r.r * 0.7, 0, Math.PI*2);
      ctx.strokeStyle = `rgba(180,220,255,${life * r.opacity * 0.5})`;
      ctx.lineWidth = 1;
      ctx.stroke();
    }
    return true;
  });
  requestAnimationFrame(draw);
}
draw();

const msgEl = document.getElementById('msg');
const lblEl = document.getElementById('lbl');

document.addEventListener('click', (e) => {
  addRipple(e.clientX, e.clientY);
  if (current >= messages.length) {
    current = 0;
  }
  const m = messages[current];
  msgEl.classList.remove('show');
  lblEl.classList.remove('show');
  setTimeout(() => {
    msgEl.textContent = m.text;
    lblEl.textContent = m.label;
    msgEl.classList.add('show');
    lblEl.classList.add('show');
  }, 400);
  document.getElementById('counter').textContent = (current+1) + ' / ' + messages.length;
  document.getElementById('hint').style.display = 'none';
  current++;
});
</script>
</body>
</html>
