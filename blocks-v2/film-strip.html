<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Film Strip</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=Special+Elite&family=Inter:wght@300;400&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',sans-serif;background:#0a0a08;color:#e0d8c8;height:100vh;overflow:hidden;display:flex;flex-direction:column;align-items:center}
  .projector-light{position:fixed;top:0;left:50%;transform:translateX(-50%);width:300px;height:100%;background:radial-gradient(ellipse at top,rgba(255,240,200,.04),transparent 60%);pointer-events:none;z-index:0}
  .strip-container{position:relative;z-index:1;width:100%;height:100%;overflow:hidden;cursor:grab}
  .strip{display:flex;transition:transform .6s cubic-bezier(.4,0,.2,1);padding:0 calc(50vw - 120px)}
  .frame{flex-shrink:0;width:240px;margin:0 12px;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh}
  .frame-inner{background:#1a1810;border:3px solid #2a2820;border-radius:4px;padding:16px;width:240px;position:relative;box-shadow:0 0 40px rgba(0,0,0,.5)}
  .sprockets{display:flex;justify-content:space-between;padding:0 8px;margin-bottom:8px}
  .sprocket{width:16px;height:10px;background:#0a0a08;border-radius:2px;border:1px solid #2a2820}
  .frame-content{background:#12120e;border-radius:2px;padding:20px;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
  .frame-emoji{font-size:3rem;margin-bottom:12px}
  .frame-text{font-family:'Caveat',cursive;font-size:1.4rem;color:#d8c8a0;line-height:1.5}
  .frame-caption{font-family:'Special Elite',monospace;font-size:.65rem;color:rgba(200,180,140,.3);margin-top:12px;letter-spacing:2px}
  .sprockets.bottom{margin-top:8px;margin-bottom:0}
  .frame-number{font-family:'Special Elite',monospace;font-size:.55rem;color:rgba(200,180,140,.15);margin-top:8px;letter-spacing:1px}
  .nav{position:fixed;bottom:30px;display:flex;gap:8px;z-index:2}
  .nav-dot{width:8px;height:8px;border-radius:50%;background:rgba(200,180,140,.15);transition:all .3s;cursor:pointer}
  .nav-dot.active{background:rgba(200,180,140,.6);box-shadow:0 0 10px rgba(200,180,140,.2)}
  .grain{position:fixed;top:0;left:0;width:100%;height:100%;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='256' height='256' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:3;opacity:.5}
  .hint{position:fixed;bottom:60px;font-size:.7rem;color:rgba(200,180,140,.2);z-index:2;animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.15}50%{opacity:.4}}
</style>
</head>
<body>
<div class="projector-light"></div>
<div class="grain"></div>
<div class="strip-container" id="container">
  <div class="strip" id="strip"></div>
</div>
<div class="hint">swipe or tap arrows</div>
<div class="nav" id="nav"></div>
<script>
const frames = [
  { emoji:'🎬', text:'Every love story is beautiful, but ours is my favorite.', caption:'REEL ONE · THE OPENING' },
  { emoji:'✨', text:'The moment I knew, I knew forever.', caption:'REEL TWO · THE SPARK' },
  { emoji:'🌙', text:'Late nights talking about nothing and everything at once.', caption:'REEL THREE · THE HOURS' },
  { emoji:'🌊', text:'You showed me that vulnerability is the bravest thing.', caption:'REEL FOUR · THE DEPTH' },
  { emoji:'🔥', text:'Not every fire burns. Some fires warm.', caption:'REEL FIVE · THE WARMTH' },
  { emoji:'🌅', text:'The best scenes haven\'t been filmed yet.', caption:'REEL SIX · TO BE CONTINUED' },
];
const strip = document.getElementById('strip');
const nav = document.getElementById('nav');
let current = 0;

frames.forEach((f, i) => {
  strip.innerHTML += `
    <div class="frame">
      <div class="frame-inner">
        <div class="sprockets"><div class="sprocket"></div><div class="sprocket"></div><div class="sprocket"></div><div class="sprocket"></div></div>
        <div class="frame-content">
          <div class="frame-emoji">${f.emoji}</div>
          <div class="frame-text">${f.text}</div>
          <div class="frame-caption">${f.caption}</div>
        </div>
        <div class="sprockets bottom"><div class="sprocket"></div><div class="sprocket"></div><div class="sprocket"></div><div class="sprocket"></div></div>
        <div class="frame-number">FRAME ${String(i+1).padStart(4,'0')}</div>
      </div>
    </div>`;
  const dot = document.createElement('div');
  dot.className = 'nav-dot' + (i===0?' active':'');
  dot.onclick = () => goTo(i);
  nav.appendChild(dot);
});

function goTo(idx) {
  current = idx;
  strip.style.transform = `translateX(${-idx * 264}px)`;
  document.querySelectorAll('.nav-dot').forEach((d,i) => d.className = 'nav-dot' + (i===idx?' active':''));
}

let startX = 0;
const container = document.getElementById('container');
container.addEventListener('touchstart', e => startX = e.touches[0].clientX);
container.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - startX;
  if (Math.abs(dx) > 40) {
    if (dx < 0 && current < frames.length-1) goTo(current+1);
    else if (dx > 0 && current > 0) goTo(current-1);
  }
});
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' && current < frames.length-1) goTo(current+1);
  if (e.key === 'ArrowLeft' && current > 0) goTo(current-1);
});
</script>
</body>
</html>
