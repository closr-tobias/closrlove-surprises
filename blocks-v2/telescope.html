<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Telescope</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=Inter:wght@300;400&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',sans-serif;background:#050510;height:100vh;overflow:hidden;cursor:none;user-select:none}
  canvas#stars{position:fixed;top:0;left:0;width:100%;height:100%}
  .lens{position:fixed;width:220px;height:220px;border-radius:50%;pointer-events:none;z-index:10;transform:translate(-50%,-50%);border:4px solid rgba(180,150,90,.6);box-shadow:inset 0 0 40px rgba(0,0,0,.5),0 0 30px rgba(180,150,90,.15);overflow:hidden;display:none}
  .lens-inner{width:100%;height:100%;border-radius:50%;position:relative;overflow:hidden}
  .lens-glare{position:absolute;top:10%;left:15%;width:30%;height:20%;background:radial-gradient(ellipse,rgba(255,255,255,.08),transparent);border-radius:50%;transform:rotate(-20deg)}
  .lens-ring{position:absolute;inset:6px;border-radius:50%;border:1px solid rgba(180,150,90,.2)}
  .blurred-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(5,5,16,.6);backdrop-filter:blur(3px);z-index:5;pointer-events:none}
  .fragment{position:fixed;z-index:8;font-family:'Caveat',cursive;font-size:1.6rem;color:rgba(255,220,150,0);text-shadow:0 0 20px rgba(255,200,100,.3);pointer-events:none;transition:color .5s,text-shadow .5s;white-space:nowrap}
  .fragment.found{color:rgba(255,220,150,.95);text-shadow:0 0 30px rgba(255,200,100,.5)}
  .message-plate{position:fixed;bottom:0;left:0;right:0;z-index:20;text-align:center;padding:30px 20px 40px;background:linear-gradient(transparent,rgba(5,5,16,.95));opacity:0;transition:all 1s;transform:translateY(20px)}
  .message-plate.show{opacity:1;transform:translateY(0)}
  .plate-text{font-family:'Caveat',cursive;font-size:1.8rem;color:#ffe0a0;line-height:1.5;text-shadow:0 0 40px rgba(255,200,100,.2)}
  .plate-sub{font-size:.6rem;color:rgba(255,200,100,.2);letter-spacing:3px;margin-top:12px}
  .counter{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:20;font-size:.7rem;color:rgba(255,200,100,.2);letter-spacing:2px}
  .hint{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;font-size:.85rem;color:rgba(255,200,100,.25);animation:pulse 2s ease-in-out infinite;text-align:center;line-height:1.8}
  @keyframes pulse{0%,100%{opacity:.2}50%{opacity:.5}}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="blurred-overlay"></div>
<div class="lens" id="lens">
  <div class="lens-inner" id="lensInner">
    <div class="lens-glare"></div>
    <div class="lens-ring"></div>
  </div>
</div>
<div class="counter" id="counter"></div>
<div class="hint" id="hint">move across the sky<br>to find the hidden words</div>
<div class="message-plate" id="plate">
  <div class="plate-text" id="plateText"></div>
  <div class="plate-sub">WRITTEN IN THE STARS</div>
</div>
<script>
const fullMessage = "You are the light I search for in every dark sky";
const words = fullMessage.split(' ');
const fragments = [];
let found = 0;
const lens = document.getElementById('lens');
const lensInner = document.getElementById('lensInner');
const plate = document.getElementById('plate');
const hint = document.getElementById('hint');
const counter = document.getElementById('counter');

// Stars
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
let W, H;
const starData = [];

function resize() {
  W = canvas.width = window.innerWidth * 2;
  H = canvas.height = window.innerHeight * 2;
  canvas.style.width = '100%';
  canvas.style.height = '100%';
}
resize();

for (let i = 0; i < 400; i++) {
  starData.push({
    x: Math.random() * W, y: Math.random() * H,
    r: Math.random() * 2 + 0.3,
    a: Math.random() * 0.5 + 0.1,
    twinkleSpeed: Math.random() * 0.02 + 0.005,
    twinklePhase: Math.random() * Math.PI * 2
  });
}

function drawStars(t) {
  ctx.clearRect(0, 0, W, H);
  starData.forEach(s => {
    const twinkle = Math.sin(t * s.twinkleSpeed + s.twinklePhase) * 0.3 + 0.7;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,240,200,${s.a * twinkle})`;
    ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
drawStars(0);

// Place word fragments randomly
const margin = 80;
words.forEach((word, i) => {
  const el = document.createElement('div');
  el.className = 'fragment';
  el.textContent = word;
  el.style.left = (margin + Math.random() * (window.innerWidth - margin * 2)) + 'px';
  el.style.top = (margin + Math.random() * (window.innerHeight - margin * 2)) + 'px';
  document.body.appendChild(el);
  fragments.push({ el, found: false, x: parseInt(el.style.left), y: parseInt(el.style.top) });
});

counter.textContent = `0 / ${words.length}`;

function moveLens(cx, cy) {
  lens.style.left = cx + 'px';
  lens.style.top = cy + 'px';
  lens.style.display = 'block';
  hint.style.display = 'none';

  // Check proximity to fragments
  fragments.forEach(f => {
    if (f.found) return;
    const dx = cx - f.x;
    const dy = cy - f.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 110) {
      f.found = true;
      f.el.classList.add('found');
      found++;
      counter.textContent = `${found} / ${words.length}`;
      if (found === words.length) {
        setTimeout(() => {
          document.getElementById('plateText').textContent = fullMessage;
          plate.classList.add('show');
          lens.style.display = 'none';
          counter.style.display = 'none';
        }, 500);
      }
    }
  });
}

document.addEventListener('mousemove', e => moveLens(e.clientX, e.clientY));
document.addEventListener('touchmove', e => {
  e.preventDefault();
  moveLens(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });
document.addEventListener('touchstart', e => {
  moveLens(e.touches[0].clientX, e.touches[0].clientY);
});

window.addEventListener('resize', resize);
</script>
</body>
</html>
