<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Candle</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=Inter:wght@300;400&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',sans-serif;background:#0a0806;height:100vh;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:flex-end}
  .room{position:fixed;top:0;left:0;width:100%;height:100%;transition:background 2s}
  .room-glow{position:fixed;bottom:25%;left:50%;transform:translateX(-50%);width:400px;height:300px;background:radial-gradient(ellipse,rgba(255,160,60,.06),transparent 70%);pointer-events:none;transition:opacity 2s}
  .candle-wrap{position:relative;z-index:2;margin-bottom:20vh;display:flex;flex-direction:column;align-items:center}
  .candle-body{width:36px;height:140px;background:linear-gradient(90deg,#e8d8b8,#f0e8d0 40%,#e0d0b0);border-radius:4px 4px 0 0;position:relative;box-shadow:-2px 0 8px rgba(0,0,0,.2)}
  .candle-body::after{content:'';position:absolute;bottom:0;left:-3px;right:-3px;height:20px;background:linear-gradient(#d0c8a8,#c0b898);border-radius:0 0 4px 4px}
  .wick{width:2px;height:14px;background:linear-gradient(#1a1a1a,#3a3020);position:absolute;top:-14px;left:50%;transform:translateX(-50%);border-radius:1px}
  .flame-wrap{position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:40px;height:50px;cursor:pointer;transition:opacity .8s}
  .flame{position:absolute;bottom:0;left:50%;transform:translateX(-50%)}
  .flame-outer{width:14px;height:36px;background:radial-gradient(ellipse at bottom,#ff8800,#ff4400 50%,transparent);border-radius:50% 50% 50% 50%/60% 60% 40% 40%;animation:flicker .3s ease-in-out infinite alternate;filter:blur(1px)}
  .flame-inner{width:8px;height:22px;background:radial-gradient(ellipse at bottom,#ffe866,#ffaa00 60%,transparent);border-radius:50% 50% 50% 50%/60% 60% 40% 40%;position:absolute;bottom:0;left:50%;transform:translateX(-50%);animation:flicker .25s ease-in-out infinite alternate}
  .flame-glow{position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);width:60px;height:30px;background:radial-gradient(rgba(255,150,50,.4),transparent);border-radius:50%;filter:blur(8px)}
  @keyframes flicker{0%{transform:translateX(-50%) scaleY(1) scaleX(1) rotate(-1deg)}100%{transform:translateX(-50%) scaleY(1.08) scaleX(.95) rotate(1deg)}}
  .smoke-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:3}
  .smoke-particle{position:absolute;border-radius:50%;background:rgba(200,190,170,.15);filter:blur(6px)}
  .smoke-letter{position:absolute;font-family:'Caveat',cursive;font-size:1.4rem;color:rgba(255,220,160,0);transition:color 2s;pointer-events:none}
  .smoke-letter.visible{color:rgba(255,220,160,.85);text-shadow:0 0 20px rgba(255,180,80,.3)}
  .hint{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);font-size:.75rem;color:rgba(255,200,120,.2);z-index:5;animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.15}50%{opacity:.4}}
  .message-final{position:fixed;top:30%;left:50%;transform:translateX(-50%);text-align:center;z-index:5;opacity:0;transition:all 2s;width:85%;max-width:360px}
  .message-final.show{opacity:1}
  .message-final .text{font-family:'Caveat',cursive;font-size:2rem;color:rgba(255,220,160,.9);line-height:1.5;text-shadow:0 0 40px rgba(255,180,80,.2)}
  .message-final .sub{font-size:.6rem;color:rgba(255,200,120,.2);letter-spacing:3px;margin-top:16px}
  .holder{width:50px;height:14px;background:linear-gradient(#8a7040,#6a5530);border-radius:3px;margin-top:-1px;box-shadow:0 2px 8px rgba(0,0,0,.4)}
</style>
</head>
<body>
<div class="room" id="room"></div>
<div class="room-glow" id="roomGlow"></div>
<div class="smoke-container" id="smokeContainer"></div>
<div class="candle-wrap" id="candleWrap">
  <div class="flame-wrap" id="flameWrap">
    <div class="flame">
      <div class="flame-glow"></div>
      <div class="flame-outer"></div>
      <div class="flame-inner"></div>
    </div>
  </div>
  <div class="candle-body"><div class="wick"></div></div>
  <div class="holder"></div>
</div>
<div class="hint" id="hint">hold the flame</div>
<div class="message-final" id="msgFinal">
  <div class="text" id="msgText"></div>
  <div class="sub">FROM THE SMOKE</div>
</div>
<script>
const message = "Even in darkness, you are the warmth I reach for";
const words = message.split(' ');
const flameWrap = document.getElementById('flameWrap');
const smokeContainer = document.getElementById('smokeContainer');
const room = document.getElementById('room');
const roomGlow = document.getElementById('roomGlow');
const msgFinal = document.getElementById('msgFinal');
let holdTimer = null;
let holdProgress = 0;
let extinguished = false;
const HOLD_TIME = 2500;

function spawnSmoke(x, y) {
  for (let i = 0; i < 3; i++) {
    const p = document.createElement('div');
    p.className = 'smoke-particle';
    p.style.left = (x + Math.random()*30-15) + 'px';
    p.style.top = y + 'px';
    p.style.width = p.style.height = (8+Math.random()*16)+'px';
    smokeContainer.appendChild(p);
    const dx = Math.random()*60-30;
    let py = y, op = 0.2, size = 8+Math.random()*16;
    function rise() {
      py -= 1.5 + Math.random();
      op -= 0.002;
      size += 0.3;
      p.style.top = py + 'px';
      p.style.left = (parseFloat(p.style.left) + Math.sin(py*0.02)*0.5) + 'px';
      p.style.opacity = Math.max(0, op);
      p.style.width = p.style.height = size + 'px';
      if (op > 0) requestAnimationFrame(rise);
      else p.remove();
    }
    setTimeout(rise, i * 100);
  }
}

function extinguish() {
  if (extinguished) return;
  extinguished = true;
  flameWrap.style.opacity = '0';
  roomGlow.style.opacity = '0';
  room.style.background = '#050403';
  document.getElementById('hint').style.display = 'none';

  const candleRect = document.getElementById('candleWrap').getBoundingClientRect();
  const smokeX = candleRect.left + candleRect.width/2;
  const smokeStartY = candleRect.top;

  // Spawn smoke burst
  for (let i = 0; i < 30; i++) {
    setTimeout(() => spawnSmoke(smokeX, smokeStartY - i*8), i * 60);
  }

  // Reveal words rising like smoke
  words.forEach((word, i) => {
    const el = document.createElement('div');
    el.className = 'smoke-letter';
    el.textContent = word;
    el.style.left = (smokeX - 40 + Math.random()*80) + 'px';
    el.style.top = (smokeStartY - 40 - i * 36) + 'px';
    smokeContainer.appendChild(el);
    setTimeout(() => {
      el.classList.add('visible');
      el.style.top = (smokeStartY - 80 - i * 40) + 'px';
      el.style.transition = 'all 3s ease-out';
    }, 800 + i * 400);
  });

  // Final message
  setTimeout(() => {
    document.getElementById('msgText').textContent = message;
    msgFinal.classList.add('show');
  }, 800 + words.length * 400 + 1500);
}

flameWrap.addEventListener('mousedown', startHold);
flameWrap.addEventListener('touchstart', e => { e.preventDefault(); startHold(); });
document.addEventListener('mouseup', stopHold);
document.addEventListener('touchend', stopHold);

function startHold() {
  if (extinguished) return;
  holdTimer = setInterval(() => {
    holdProgress += 50;
    // Flame flickers more intensely
    flameWrap.style.filter = `brightness(${1 + holdProgress/HOLD_TIME})`;
    if (holdProgress >= HOLD_TIME) {
      clearInterval(holdTimer);
      extinguish();
    }
  }, 50);
}

function stopHold() {
  clearInterval(holdTimer);
  holdProgress = Math.max(0, holdProgress - 200);
  if (!extinguished) flameWrap.style.filter = 'brightness(1)';
}
</script>
</body>
</html>
