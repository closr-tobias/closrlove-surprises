<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Fortune Cookie</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=Inter:wght@300;400;500&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0a0810,#150a18);color:#e0d0c0;height:100vh;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .cookie-area{position:relative;width:200px;height:200px;cursor:pointer;margin-bottom:30px}
  .cookie{width:100%;height:100%;position:relative;transition:all .5s}
  .cookie-half{position:absolute;width:100px;height:90px;transition:all .6s cubic-bezier(.68,-.55,.27,1.55)}
  .cookie-half.left{left:10px;top:55px;background:radial-gradient(ellipse at 60% 40%,#e8c56a,#c9952a);border-radius:80px 10px 10px 80px;transform-origin:right center}
  .cookie-half.right{right:10px;top:55px;background:radial-gradient(ellipse at 40% 40%,#e8c56a,#c9952a);border-radius:10px 80px 80px 10px;transform-origin:left center}
  .cookie.cracked .left{transform:rotate(-25deg) translateX(-20px);opacity:.7}
  .cookie.cracked .right{transform:rotate(25deg) translateX(20px);opacity:.7}
  .paper{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:160px;background:#faf0d8;border-radius:4px;padding:12px 8px;text-align:center;opacity:0;transition:all .8s .3s;box-shadow:0 2px 20px rgba(0,0,0,.3)}
  .cookie.cracked .paper{opacity:1;transform:translate(-50%,-80%)}
  .paper-text{font-family:'Caveat',cursive;font-size:1rem;color:#3a2a10;line-height:1.4}
  .paper-lucky{font-size:.55rem;color:#8a7a5a;margin-top:8px;font-family:'Inter',sans-serif}
  .fortune-display{text-align:center;min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 30px}
  .fortune-text{font-family:'Caveat',cursive;font-size:1.8rem;color:#ffe0a0;text-shadow:0 0 30px rgba(255,200,100,.2);opacity:0;transition:all 1s;transform:translateY(20px);line-height:1.4}
  .fortune-text.show{opacity:1;transform:translateY(0)}
  .fortune-number{font-size:.7rem;color:rgba(255,200,150,.2);margin-top:12px;letter-spacing:3px;opacity:0;transition:all .5s .5s}
  .fortune-number.show{opacity:1}
  .counter{font-size:.7rem;color:rgba(255,200,150,.2);position:fixed;bottom:20px}
  .sparkle{position:fixed;pointer-events:none;width:6px;height:6px;border-radius:50%;background:rgba(255,220,100,.8);animation:sparkle .8s ease-out forwards}
  @keyframes sparkle{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(0) translateY(-40px)}}
  .hint{font-size:.75rem;color:rgba(255,200,150,.2);animation:pulse 2s ease-in-out infinite;margin-top:20px}
  @keyframes pulse{0%,100%{opacity:.2}50%{opacity:.5}}
  .particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
  .particle{position:absolute;width:3px;height:3px;background:rgba(255,200,100,.1);border-radius:50%;animation:float 8s linear infinite}
  @keyframes float{0%{transform:translateY(100vh) rotate(0deg);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-10vh) rotate(360deg);opacity:0}}
</style>
</head>
<body>
<div class="particles" id="particles"></div>
<div class="fortune-display">
  <div class="fortune-text" id="bigText"></div>
  <div class="fortune-number" id="bigNum"></div>
</div>
<div class="cookie-area" id="cookieArea">
  <div class="cookie" id="cookie">
    <div class="cookie-half left"></div>
    <div class="cookie-half right"></div>
    <div class="paper"><div class="paper-text" id="paperText"></div><div class="paper-lucky" id="paperLucky"></div></div>
  </div>
</div>
<div class="hint" id="hint">tap the cookie</div>
<div class="counter" id="counter"></div>
<script>
const fortunes = [
  { text: "The person reading this is loved more than they know.", lucky: "Lucky numbers: 8, 14, 25" },
  { text: "Your smile is someone's reason to believe in beautiful things.", lucky: "Lucky numbers: 3, 17, 42" },
  { text: "A great love story is being written, and you're the main character.", lucky: "Lucky numbers: 7, 21, 33" },
  { text: "The distance between two hearts is measured in trust, not miles.", lucky: "Lucky numbers: 4, 12, 28" },
  { text: "Someone falls asleep thinking about you every single night.", lucky: "Lucky numbers: 9, 16, 31" },
  { text: "Your future holds more laughter than you can possibly imagine.", lucky: "Lucky numbers: 2, 19, 44" },
];
let current = 0;
let cracked = false;
const cookie = document.getElementById('cookie');
const bigText = document.getElementById('bigText');
const bigNum = document.getElementById('bigNum');

// Particles
const pe = document.getElementById('particles');
for (let i = 0; i < 20; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.left = Math.random() * 100 + '%';
  p.style.animationDelay = Math.random() * 8 + 's';
  p.style.animationDuration = (6 + Math.random() * 4) + 's';
  pe.appendChild(p);
}

function sparkle(x, y) {
  for (let i = 0; i < 8; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.style.left = (x + Math.random()*40-20) + 'px';
    s.style.top = (y + Math.random()*40-20) + 'px';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 800);
  }
}

document.getElementById('cookieArea').addEventListener('click', (e) => {
  if (cracked) {
    // Reset for next fortune
    cracked = false;
    cookie.classList.remove('cracked');
    bigText.classList.remove('show');
    bigNum.classList.remove('show');
    current++;
    if (current >= fortunes.length) current = 0;
    document.getElementById('hint').textContent = 'tap for another';
    return;
  }
  const f = fortunes[current];
  document.getElementById('paperText').textContent = f.text;
  document.getElementById('paperLucky').textContent = f.lucky;
  cookie.classList.add('cracked');
  cracked = true;
  sparkle(e.clientX, e.clientY);
  setTimeout(() => {
    bigText.textContent = f.text;
    bigText.classList.add('show');
    bigNum.textContent = f.lucky;
    bigNum.classList.add('show');
  }, 600);
  document.getElementById('hint').textContent = 'tap for next cookie';
  document.getElementById('counter').textContent = (current+1) + ' / ' + fortunes.length;
});
</script>
</body>
</html>
