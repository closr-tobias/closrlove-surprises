<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Wishing Well</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0f;font-family:'Georgia','Times New Roman',serif;user-select:none;-webkit-user-select:none;touch-action:none}
canvas#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
.scene{position:relative;z-index:1;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center}
.well-container{position:relative;width:320px;height:400px;display:flex;align-items:center;justify-content:center}
.well{position:relative;width:280px;height:320px}
.well-rim{position:absolute;top:60px;left:50%;transform:translateX(-50%);width:260px;height:60px;border-radius:50%;background:radial-gradient(ellipse,#3a3028 0%,#2a2018 40%,#1a1510 100%);border:3px solid #4a3c2e;box-shadow:0 0 30px rgba(0,0,0,0.8),inset 0 -8px 20px rgba(0,0,0,0.6);z-index:3}
.well-hole{position:absolute;top:72px;left:50%;transform:translateX(-50%);width:220px;height:40px;border-radius:50%;background:radial-gradient(ellipse,#020208 0%,#050510 60%,#0a0a18 100%);z-index:4;overflow:visible}
.water-surface{position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:200px;height:30px;border-radius:50%;background:radial-gradient(ellipse,rgba(20,40,80,0.6) 0%,rgba(10,20,50,0.3) 100%);z-index:5;opacity:0.7}
.well-body{position:absolute;top:88px;left:50%;transform:translateX(-50%);width:250px;height:220px;background:linear-gradient(180deg,#2a2018 0%,#1e1810 30%,#161210 100%);border-left:3px solid #3a2c1e;border-right:3px solid #3a2c1e;border-bottom:3px solid #2a1c10;border-radius:0 0 20px 20px;z-index:2}
.well-body::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,transparent,transparent 18px,rgba(0,0,0,0.15) 18px,rgba(0,0,0,0.15) 20px),repeating-linear-gradient(90deg,transparent,transparent 30px,rgba(0,0,0,0.08) 30px,rgba(0,0,0,0.08) 32px);border-radius:0 0 20px 20px}
.well-body::after{content:'';position:absolute;top:10px;left:15px;width:40px;height:15px;background:radial-gradient(ellipse,rgba(30,60,20,0.4),transparent);border-radius:50%;box-shadow:180px 30px 0 0 rgba(25,55,18,0.3),20px 80px 0 0 rgba(35,65,25,0.25),160px 120px 0 0 rgba(28,58,22,0.35)}
.well-roof{position:absolute;top:0;left:50%;transform:translateX(-50%);width:200px;height:50px;z-index:6}
.roof-beam-l,.roof-beam-r{position:absolute;bottom:0;width:8px;height:130px;background:linear-gradient(90deg,#3a2a1a,#2a1c10);border-radius:2px;z-index:2}
.roof-beam-l{left:30px}
.roof-beam-r{right:30px}
.roof-top{position:absolute;top:-20px;left:50%;transform:translateX(-50%);width:180px;height:30px;background:linear-gradient(180deg,#4a3828,#3a2818);clip-path:polygon(50% 0%,0% 100%,100% 100%);z-index:3}
.rope{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:2px;height:60px;background:repeating-linear-gradient(180deg,#8a7a5a,#6a5a3a 3px);z-index:7;transform-origin:top center}
.bucket{position:absolute;top:65px;left:50%;transform:translateX(-50%);width:28px;height:24px;background:linear-gradient(180deg,#5a4a3a,#3a2a1a);border-radius:0 0 4px 4px;border:1.5px solid #6a5a4a;z-index:7}
.bucket::before{content:'';position:absolute;top:-8px;left:50%;transform:translateX(-50%);width:20px;height:10px;border:1.5px solid #7a6a5a;border-bottom:none;border-radius:10px 10px 0 0}
.coin{position:absolute;z-index:10;width:44px;height:44px;cursor:pointer;transition:transform 0.1s ease}
.coin-inner{width:100%;height:100%;border-radius:50%;background:radial-gradient(ellipse at 35% 30%,#ffd700,#daa520 40%,#b8860b 70%,#8b6914 100%);box-shadow:0 0 20px rgba(255,215,0,0.4),0 2px 8px rgba(0,0,0,0.6),inset 0 -2px 4px rgba(0,0,0,0.3),inset 0 2px 4px rgba(255,255,200,0.3);position:relative;overflow:hidden}
.coin-inner::before{content:'\2661';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:20px;color:rgba(139,105,20,0.6);text-shadow:0 1px 0 rgba(255,255,200,0.3)}
.coin-inner::after{content:'';position:absolute;top:-20%;left:-20%;width:60%;height:60%;background:linear-gradient(135deg,rgba(255,255,255,0.3),transparent);border-radius:50%;transform:rotate(-15deg)}
.coin:active .coin-inner{transform:scale(0.95)}
@keyframes coinShimmer{0%,100%{filter:brightness(1)}50%{filter:brightness(1.2)}}
.coin .coin-inner{animation:coinShimmer 3s ease-in-out infinite}
.splash-container{position:absolute;top:72px;left:50%;transform:translateX(-50%);width:220px;height:60px;z-index:8;pointer-events:none;overflow:visible}
.ripple{position:absolute;border-radius:50%;border:1.5px solid rgba(100,140,200,0.5);opacity:0;pointer-events:none}
.message-container{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);width:90%;max-width:340px;text-align:center;z-index:20;opacity:0;transition:opacity 1.5s ease;pointer-events:none}
.message-text{font-size:18px;line-height:1.6;color:#c8b890;text-shadow:0 0 20px rgba(200,184,144,0.3),0 0 40px rgba(200,184,144,0.1);letter-spacing:0.5px;font-style:italic}
.message-sub{font-size:12px;color:rgba(200,184,144,0.3);margin-top:16px;letter-spacing:2px;text-transform:uppercase}
.instruction{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(200,184,144,0.25);font-size:12px;letter-spacing:3px;text-transform:uppercase;z-index:20;transition:opacity 0.8s ease}
.fog{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;opacity:0.15}
.firefly{position:fixed;width:3px;height:3px;border-radius:50%;background:rgba(200,180,100,0.6);box-shadow:0 0 6px rgba(200,180,100,0.4);z-index:2;pointer-events:none}
.well-glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:350px;height:350px;border-radius:50%;background:radial-gradient(ellipse,rgba(40,30,15,0.3) 0%,transparent 70%);z-index:0;pointer-events:none}
.well-star{position:absolute;width:2px;height:2px;border-radius:50%;background:rgba(150,180,255,0.5);z-index:5;pointer-events:none}
.droplet{position:absolute;width:4px;height:4px;border-radius:50%;background:radial-gradient(circle,rgba(120,160,220,0.7),rgba(80,120,180,0.3));z-index:9;pointer-events:none}
.wish-count{position:absolute;top:20px;right:20px;color:rgba(200,184,144,0.2);font-size:11px;letter-spacing:2px;z-index:20}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="fog" id="fog"></div>
<div class="scene" id="scene">
  <div class="well-container" id="wellContainer">
    <div class="well-glow"></div>
    <div class="well">
      <div class="well-roof">
        <div class="roof-top"></div>
        <div class="roof-beam-l"></div>
        <div class="roof-beam-r"></div>
        <div class="rope"></div>
        <div class="bucket"></div>
      </div>
      <div class="well-rim"></div>
      <div class="well-hole" id="wellHole">
        <div class="water-surface" id="waterSurface"></div>
      </div>
      <div class="well-body"></div>
    </div>
  </div>
  <div class="coin" id="coin" style="bottom:100px;left:50%;transform:translateX(-50%)">
    <div class="coin-inner"></div>
  </div>
  <div class="splash-container" id="splashContainer"></div>
  <div class="message-container" id="messageContainer">
    <div class="message-text" id="messageText"></div>
    <div class="message-sub">your wish came true</div>
  </div>
  <div class="wish-count" id="wishCount"></div>
  <div class="instruction" id="instruction">drag the coin to the well</div>
</div>
<script>
const messages=[
  "Every night I fall asleep\nwishing the distance\nwould disappear by morning.",
  "You are the wish\nI didn't know I was making\nevery time I closed my eyes.",
  "Some people toss coins\nand hope for luck.\nI already found mine \u2014 you.",
  "If I had one wish left,\nI'd spend it on one more minute\nwith you right now.",
  "The well is deep\nbut not as deep\nas how much I miss you tonight.",
  "Every coin in this well\nis another day closer\nto holding you again.",
  "I wished for someone\nwho'd make the world\nfeel less heavy. Then you arrived.",
  "They say wishes don't come true.\nBut then how do you\nexplain us?",
  "I'd throw every coin I own\ninto any well, any fountain,\nany ocean \u2014 just for you.",
  "You're not a wish.\nYou're the answer\nto every one I ever made."
];
let msgIndex=0,wishCount=0;

// Background canvas
const canvas=document.getElementById('bg'),ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}
resize();addEventListener('resize',resize);

const stars=[];
for(let i=0;i<80;i++)stars.push({x:Math.random()*2000,y:Math.random()*800,r:Math.random()*1.5+0.3,a:Math.random(),speed:Math.random()*0.005+0.002,phase:Math.random()*Math.PI*2});

const fogLayers=[];
for(let i=0;i<5;i++)fogLayers.push({x:Math.random()*2000,y:400+Math.random()*400,w:200+Math.random()*300,h:40+Math.random()*60,speed:(Math.random()-0.5)*0.3,a:0.02+Math.random()*0.03});

const dustMotes=[];
for(let i=0;i<30;i++)dustMotes.push({x:Math.random()*2000,y:Math.random()*2000,r:Math.random()*1.2+0.5,vx:(Math.random()-0.5)*0.2,vy:-Math.random()*0.3-0.1,a:Math.random()*0.3,phase:Math.random()*Math.PI*2});

let time=0;
function drawBg(){
  ctx.clearRect(0,0,W,H);
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#08080f');grad.addColorStop(0.4,'#0c0c18');grad.addColorStop(1,'#0a0a12');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
  time+=0.016;
  stars.forEach(s=>{
    const tw=0.4+0.6*Math.sin(time*s.speed*100+s.phase);
    ctx.beginPath();ctx.arc(s.x%W,s.y%H,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(180,200,255,${s.a*tw})`;ctx.fill();
  });
  fogLayers.forEach(f=>{
    f.x+=f.speed;if(f.x>W+f.w)f.x=-f.w;if(f.x<-f.w)f.x=W+f.w;
    const g=ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,f.w);
    g.addColorStop(0,`rgba(100,110,130,${f.a})`);g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.fillRect(f.x-f.w,f.y-f.h,f.w*2,f.h*2);
  });
  dustMotes.forEach(d=>{
    d.x+=d.vx+Math.sin(time+d.phase)*0.1;d.y+=d.vy;
    if(d.y<-10){d.y=H+10;d.x=Math.random()*W}
    const pulse=0.5+0.5*Math.sin(time*2+d.phase);
    ctx.beginPath();ctx.arc(((d.x%W)+W)%W,((d.y%H)+H)%H,d.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(180,160,120,${d.a*pulse})`;ctx.fill();
  });
  const vg=ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.9);
  vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(0,0,0,0.5)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
  requestAnimationFrame(drawBg);
}
drawBg();

// Fireflies
function createFirefly(){
  const el=document.createElement('div');el.className='firefly';
  el.style.left=Math.random()*100+'%';el.style.top=Math.random()*100+'%';
  document.body.appendChild(el);
  const dur=4000+Math.random()*6000,dx=(Math.random()-0.5)*100,dy=(Math.random()-0.5)*80;
  el.animate([
    {transform:'translate(0,0)',opacity:0},
    {opacity:0.7,offset:0.3},{opacity:0.8,offset:0.5},{opacity:0.4,offset:0.7},
    {transform:`translate(${dx}px,${dy}px)`,opacity:0}
  ],{duration:dur,easing:'ease-in-out'}).onfinish=()=>{el.remove();setTimeout(createFirefly,Math.random()*2000)};
}
for(let i=0;i<8;i++)setTimeout(createFirefly,i*500);

// Water shimmer
const waterSurface=document.getElementById('waterSurface');
function shimmerWater(){
  const t=Date.now()*0.001,op=0.5+0.2*Math.sin(t*0.8)+0.1*Math.sin(t*1.3);
  waterSurface.style.opacity=op;
  waterSurface.style.transform=`translateX(-50%) scaleX(${1+0.02*Math.sin(t*1.1)})`;
  requestAnimationFrame(shimmerWater);
}
shimmerWater();

// Well stars (reflection)
const wellHole=document.getElementById('wellHole');
for(let i=0;i<5;i++){
  const star=document.createElement('div');star.className='well-star';
  star.style.left=(30+Math.random()*60)+'%';star.style.top=(40+Math.random()*40)+'%';
  wellHole.appendChild(star);
  star.animate([{opacity:0.2},{opacity:0.7},{opacity:0.2}],{duration:2000+Math.random()*3000,iterations:Infinity,easing:'ease-in-out'});
}

// Coin drag
const coin=document.getElementById('coin'),scene=document.getElementById('scene');
const messageContainer=document.getElementById('messageContainer'),messageText=document.getElementById('messageText');
const instruction=document.getElementById('instruction'),wishCountEl=document.getElementById('wishCount');
let isDragging=false,dragOffsetX,dragOffsetY,coinActive=true;

function resetCoinPosition(){
  coin.style.position='absolute';coin.style.bottom='100px';coin.style.left='50%';
  coin.style.top='';coin.style.transform='translateX(-50%)';coin.style.opacity='1';
  coin.style.transition='none';coinActive=true;
}

function getCoinCenter(){const r=coin.getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2}}
function getWellCenter(){const r=wellHole.getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2}}

coin.addEventListener('pointerdown',e=>{
  if(!coinActive)return;e.preventDefault();isDragging=true;
  const r=coin.getBoundingClientRect();
  dragOffsetX=e.clientX-r.left;dragOffsetY=e.clientY-r.top;
  coin.style.position='fixed';coin.style.left=r.left+'px';coin.style.top=r.top+'px';
  coin.style.bottom='';coin.style.transform='none';coin.style.transition='none';coin.style.zIndex='100';
  coin.setPointerCapture(e.pointerId);
  coin.querySelector('.coin-inner').style.boxShadow='0 0 30px rgba(255,215,0,0.6),0 4px 16px rgba(0,0,0,0.8),inset 0 -2px 4px rgba(0,0,0,0.3),inset 0 2px 4px rgba(255,255,200,0.4)';
  instruction.style.opacity='0';
});

document.addEventListener('pointermove',e=>{
  if(!isDragging)return;e.preventDefault();
  coin.style.left=(e.clientX-dragOffsetX)+'px';coin.style.top=(e.clientY-dragOffsetY)+'px';
  const cc=getCoinCenter(),wc=getWellCenter(),dist=Math.hypot(cc.x-wc.x,cc.y-wc.y);
  if(dist<120){
    const intensity=1-dist/120;
    waterSurface.style.background=`radial-gradient(ellipse,rgba(40,80,160,${0.3+intensity*0.4}) 0%,rgba(10,20,50,0.3) 100%)`;
    coin.style.filter=`brightness(${1+intensity*0.3})`;
  }else{waterSurface.style.background='';coin.style.filter=''}
});

document.addEventListener('pointerup',e=>{
  if(!isDragging)return;isDragging=false;
  coin.querySelector('.coin-inner').style.boxShadow='';waterSurface.style.background='';coin.style.filter='';
  const cc=getCoinCenter(),wc=getWellCenter(),dist=Math.hypot(cc.x-wc.x,cc.y-wc.y);
  if(dist<80){dropCoinIntoWell(cc,wc)}
  else{coin.style.transition='all 0.5s cubic-bezier(0.34,1.56,0.64,1)';resetCoinPosition();setTimeout(()=>{instruction.style.opacity='1'},600)}
});

function dropCoinIntoWell(coinPos,wellPos){
  coinActive=false;
  const wellRect=wellHole.getBoundingClientRect();
  const targetX=wellRect.left+wellRect.width/2-22,targetY=wellRect.top+wellRect.height/2-22;
  coin.animate([
    {transform:'scale(1) rotateY(0deg)',opacity:1},
    {transform:'scale(0.6) rotateY(180deg)',opacity:0.8,offset:0.3},
    {transform:'scale(0.3) rotateY(360deg)',opacity:0.5,offset:0.6},
    {transform:'scale(0.1) rotateY(540deg)',opacity:0}
  ],{duration:600,easing:'cubic-bezier(0.55,0.06,0.68,0.19)',fill:'forwards'});
  coin.style.transition='left 0.6s cubic-bezier(0.55,0.06,0.68,0.19),top 0.6s cubic-bezier(0.55,0.06,0.68,0.19)';
  coin.style.left=targetX+'px';coin.style.top=targetY+'px';
  setTimeout(()=>createSplash(),500);
  setTimeout(()=>createRipples(),600);
  setTimeout(()=>revealMessage(),1400);
  setTimeout(()=>{
    messageContainer.style.opacity='0';messageContainer.style.transform='translateX(-50%) translateY(30px)';
    setTimeout(()=>{resetCoinPosition();coin.style.zIndex='10';instruction.style.opacity='1'},800);
  },5500);
}

function createSplash(){
  waterSurface.animate([
    {transform:'translateX(-50%) scaleY(1)',background:'radial-gradient(ellipse,rgba(60,100,180,0.8) 0%,rgba(10,20,50,0.3) 100%)'},
    {transform:'translateX(-50%) scaleY(1.8)'},{transform:'translateX(-50%) scaleY(0.7)'},
    {transform:'translateX(-50%) scaleY(1.1)'},{transform:'translateX(-50%) scaleY(1)'}
  ],{duration:800,easing:'ease-out'});
  const wellRect=wellHole.getBoundingClientRect();
  for(let i=0;i<12;i++){
    const drop=document.createElement('div');drop.className='droplet';
    drop.style.position='fixed';
    drop.style.left=(wellRect.left+wellRect.width/2)+'px';
    drop.style.top=(wellRect.top+wellRect.height/2)+'px';
    drop.style.width=(2+Math.random()*4)+'px';drop.style.height=drop.style.width;
    document.body.appendChild(drop);
    const angle=-Math.PI/2+(Math.random()-0.5)*Math.PI*0.8,speed=40+Math.random()*80;
    const dx=Math.cos(angle)*speed,dy=Math.sin(angle)*speed;
    drop.animate([
      {transform:'translate(0,0) scale(1)',opacity:0.8},
      {transform:`translate(${dx}px,${dy-20}px) scale(0.8)`,opacity:0.6,offset:0.4},
      {transform:`translate(${dx*1.2}px,${dy+40}px) scale(0.3)`,opacity:0}
    ],{duration:600+Math.random()*300,easing:'cubic-bezier(0.25,0.46,0.45,0.94)'}).onfinish=()=>drop.remove();
  }
  const flash=document.createElement('div');
  flash.style.cssText=`position:fixed;left:${wellRect.left}px;top:${wellRect.top}px;width:${wellRect.width}px;height:${wellRect.height}px;background:radial-gradient(ellipse,rgba(100,150,255,0.4),transparent);border-radius:50%;z-index:8;pointer-events:none`;
  document.body.appendChild(flash);
  flash.animate([{opacity:1,transform:'scale(1)'},{opacity:0,transform:'scale(2.5)'}],{duration:500,easing:'ease-out'}).onfinish=()=>flash.remove();
}

function createRipples(){
  for(let i=0;i<4;i++){
    setTimeout(()=>{
      const ripple=document.createElement('div');ripple.className='ripple';
      ripple.style.position='absolute';ripple.style.left='50%';ripple.style.top='50%';
      ripple.style.width='10px';ripple.style.height='6px';ripple.style.transform='translate(-50%,-50%)';
      wellHole.appendChild(ripple);
      ripple.animate([
        {width:'10px',height:'6px',opacity:0.7,borderColor:'rgba(120,170,240,0.6)'},
        {width:'180px',height:'40px',opacity:0,borderColor:'rgba(120,170,240,0)'}
      ],{duration:1500,easing:'cubic-bezier(0,0.5,0.5,1)',fill:'forwards'}).onfinish=()=>ripple.remove();
    },i*250);
  }
}

function revealMessage(){
  const msg=messages[msgIndex%messages.length];msgIndex++;wishCount++;
  wishCountEl.textContent=wishCount===1?'1 wish':wishCount+' wishes';
  messageText.innerHTML=msg.replace(/\n/g,'<br>');
  messageContainer.style.opacity='0';messageContainer.style.transform='translateX(-50%) translateY(30px)';
  messageContainer.style.transition='none';
  requestAnimationFrame(()=>{
    messageContainer.style.transition='opacity 1.2s ease, transform 1.2s cubic-bezier(0.16,1,0.3,1)';
    messageContainer.style.opacity='1';messageContainer.style.transform='translateX(-50%) translateY(0)';
  });
  const glow=document.createElement('div');
  glow.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at 50% 40%,rgba(60,80,140,0.08),transparent 70%);z-index:0;pointer-events:none';
  document.body.appendChild(glow);
  glow.animate([{opacity:0},{opacity:1},{opacity:0}],{duration:3000,easing:'ease-in-out'}).onfinish=()=>glow.remove();
}

// Well pulse glow
function wellPulse(){
  const t=Date.now()*0.001,glow=15+5*Math.sin(t*0.5);
  wellHole.style.boxShadow=`inset 0 0 ${glow}px rgba(30,50,100,0.3)`;
  requestAnimationFrame(wellPulse);
}
wellPulse();
resetCoinPosition();
</script>
</body>
</html>
