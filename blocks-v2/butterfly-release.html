<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Butterfly Release</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=Inter:wght@300;400&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',sans-serif;background:linear-gradient(180deg,#0a1220,#162040,#1a2848);height:100vh;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .cocoon{width:60px;height:80px;background:radial-gradient(ellipse,#4a6848,#2a3a28);border-radius:30px 30px 20px 20px;cursor:pointer;position:relative;transition:all .5s;animation:glow 2s ease-in-out infinite}
  .cocoon::after{content:'';position:absolute;top:10%;left:50%;transform:translateX(-50%);width:2px;height:70%;background:rgba(255,255,255,.1)}
  .cocoon.pulse{animation:cocoonPulse .3s ease-in-out}
  .cocoon.burst{transform:scale(0);opacity:0}
  @keyframes glow{0%,100%{box-shadow:0 0 20px rgba(100,200,100,.1)}50%{box-shadow:0 0 40px rgba(150,255,150,.2)}}
  @keyframes cocoonPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
  .progress-ring{position:absolute;top:-15px;left:-15px;width:90px;height:110px}
  .butterfly{position:fixed;pointer-events:none;z-index:2}
  .butterfly svg{width:40px;height:30px;animation:fly 0.4s ease-in-out infinite alternate}
  @keyframes fly{0%{transform:scaleY(1)}100%{transform:scaleY(.6)}}
  .message{position:fixed;top:12%;left:50%;transform:translateX(-50%);text-align:center;width:85%;max-width:360px;z-index:3}
  .msg-text{font-family:'Caveat',cursive;font-size:1.7rem;color:rgba(200,180,255,.9);text-shadow:0 0 30px rgba(150,100,255,.2);line-height:1.5;opacity:0;transition:all 1s;transform:translateY(20px)}
  .msg-text.show{opacity:1;transform:translateY(0)}
  .msg-sub{font-size:.6rem;color:rgba(200,180,255,.2);letter-spacing:3px;margin-top:12px;opacity:0;transition:all .5s .5s}
  .msg-sub.show{opacity:1}
  .tap-count{position:fixed;bottom:80px;font-size:.7rem;color:rgba(200,180,255,.2)}
  .hint{position:fixed;bottom:30px;font-size:.75rem;color:rgba(200,180,255,.2);animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.2}50%{opacity:.5}}
  .garden-particles{position:fixed;bottom:0;width:100%;height:30%;pointer-events:none;z-index:0}
  .petal{position:absolute;border-radius:50%;animation:petalFloat linear infinite}
  @keyframes petalFloat{0%{transform:translateY(0) rotate(0deg);opacity:0}10%{opacity:.3}90%{opacity:.3}100%{transform:translateY(-100vh) rotate(360deg);opacity:0}}
</style>
</head>
<body>
<div class="garden-particles" id="garden"></div>
<div class="message">
  <div class="msg-text" id="msgText"></div>
  <div class="msg-sub" id="msgSub"></div>
</div>
<div style="position:relative">
  <div class="cocoon" id="cocoon">
    <svg class="progress-ring" viewBox="0 0 90 110"><circle cx="45" cy="55" r="38" fill="none" stroke="rgba(150,255,150,.15)" stroke-width="2" stroke-dasharray="240" stroke-dashoffset="240" id="ring" stroke-linecap="round"/></svg>
  </div>
</div>
<div class="tap-count" id="tapCount"></div>
<div class="hint">tap the cocoon</div>
<script>
const messages = [
  { text:"Something beautiful is about to begin.", sub:"AWAKENING" },
  { text:"Growth takes patience, but the result is always worth the wait.", sub:"TRANSFORMATION" },
  { text:"You gave me wings I never knew I had.", sub:"BECOMING" },
  { text:"Some souls are meant to fly together.", sub:"TOGETHER" },
  { text:"Love isn't a destination. It's learning to fly.", sub:"FREE" },
];
const colors = ['#c090ff','#ff90c0','#90c0ff','#ffcc70','#90ffc0'];
let taps = 0;
const TAPS_PER_MSG = 5;
let msgIdx = 0;
const cocoon = document.getElementById('cocoon');
const ring = document.getElementById('ring');
const msgText = document.getElementById('msgText');
const msgSub = document.getElementById('msgSub');

// Floating petals
const garden = document.getElementById('garden');
for (let i = 0; i < 15; i++) {
  const p = document.createElement('div');
  p.className = 'petal';
  p.style.left = Math.random()*100+'%';
  p.style.bottom = '-10px';
  p.style.width = p.style.height = (4+Math.random()*6)+'px';
  p.style.background = colors[Math.floor(Math.random()*colors.length)];
  p.style.opacity = 0;
  p.style.animationDuration = (8+Math.random()*6)+'s';
  p.style.animationDelay = Math.random()*8+'s';
  garden.appendChild(p);
}

function spawnButterfly(x, y, color) {
  const b = document.createElement('div');
  b.className = 'butterfly';
  b.style.left = x + 'px';
  b.style.top = y + 'px';
  b.innerHTML = `<svg viewBox="0 0 40 30"><path d="M20 15 Q10 0 0 8 Q10 16 20 15" fill="${color}" opacity=".8"/><path d="M20 15 Q30 0 40 8 Q30 16 20 15" fill="${color}" opacity=".8"/><path d="M20 15 Q12 20 5 28 Q15 22 20 15" fill="${color}" opacity=".6"/><path d="M20 15 Q28 20 35 28 Q25 22 20 15" fill="${color}" opacity=".6"/><line x1="18" y1="15" x2="14" y2="5" stroke="${color}" stroke-width=".5" opacity=".5"/><line x1="22" y1="15" x2="26" y2="5" stroke="${color}" stroke-width=".5" opacity=".5"/></svg>`;
  document.body.appendChild(b);
  const angle = Math.random() * Math.PI * 2;
  const speed = 1 + Math.random();
  let bx = x, by = y, t = 0;
  function move() {
    t += 0.02;
    bx += Math.cos(angle + Math.sin(t*2)*0.5) * speed;
    by -= speed * 1.5 + Math.sin(t*3) * 0.5;
    b.style.left = bx + 'px';
    b.style.top = by + 'px';
    b.style.opacity = Math.max(0, 1 - t * 0.3);
    if (b.style.opacity > 0) requestAnimationFrame(move);
    else b.remove();
  }
  move();
}

cocoon.addEventListener('click', (e) => {
  taps++;
  cocoon.classList.remove('pulse');
  void cocoon.offsetWidth;
  cocoon.classList.add('pulse');
  const progress = (taps % TAPS_PER_MSG) / TAPS_PER_MSG;
  ring.style.strokeDashoffset = 240 - (240 * progress);
  document.getElementById('tapCount').textContent = (taps % TAPS_PER_MSG) + ' / ' + TAPS_PER_MSG;
  if (taps % TAPS_PER_MSG === 0) {
    const m = messages[msgIdx % messages.length];
    cocoon.classList.add('burst');
    for (let i = 0; i < 6; i++) {
      setTimeout(() => spawnButterfly(e.clientX, e.clientY, colors[i % colors.length]), i * 100);
    }
    msgText.classList.remove('show'); msgSub.classList.remove('show');
    setTimeout(() => {
      msgText.textContent = m.text;
      msgSub.textContent = m.sub;
      msgText.classList.add('show');
      msgSub.classList.add('show');
    }, 400);
    msgIdx++;
    setTimeout(() => {
      cocoon.classList.remove('burst');
      ring.style.strokeDashoffset = 240;
    }, 2000);
  }
});
</script>
</body>
</html>
