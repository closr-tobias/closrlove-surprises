<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Closr Building Blocks — V2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',sans-serif;background:#0a0a12;color:#e0e0e0;min-height:100vh;padding:24px}
  h1{text-align:center;font-size:1.8rem;font-weight:700;background:linear-gradient(135deg,#ff5078,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
  .sub{text-align:center;color:rgba(255,255,255,.3);font-size:.75rem;letter-spacing:2px;margin-bottom:32px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;max-width:1200px;margin:0 auto}
  .card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:20px;cursor:pointer;transition:all .3s}
  .card:hover{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.12);transform:translateY(-2px)}
  .card .emoji{font-size:2rem;margin-bottom:10px}
  .card .name{font-size:1rem;font-weight:600;color:rgba(255,255,255,.8);margin-bottom:4px}
  .card .type{font-size:.65rem;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
  .card .desc{font-size:.8rem;color:rgba(255,255,255,.4);line-height:1.5}
  .count{text-align:center;margin-top:32px;font-size:.7rem;color:rgba(255,255,255,.15)}
</style>
</head>
<body>
<h1>Building Blocks V2</h1>
<div class="sub">CLOSR SURPRISE ENGINE · SECOND COLLECTION</div>
<div class="grid" id="grid"></div>
<div class="count" id="count"></div>
<script>
const blocks = [
  { emoji:'🏮', name:'Campfire Stories', type:'narrative · warmth', desc:'Crackling campfire with floating embers. Tap the flames to reveal stories and memories.', file:'campfire-stories.html' },
  { emoji:'🥠', name:'Fortune Cookie', type:'reveal · playful', desc:'Crack open golden fortune cookies. Each holds a personalized love fortune.', file:'fortune-cookie.html' },
  { emoji:'🫧', name:'Water Ripple', type:'reveal · calm', desc:'Drop pebbles into still water. Ripples expand outward revealing words on the surface.', file:'water-ripple.html' },
  { emoji:'🎈', name:'Hot Air Balloon', type:'journey · wonder', desc:'Rise through layered clouds. Each cloud reveals a message as the sky shifts.', file:'hot-air-balloon.html' },
  { emoji:'🦋', name:'Butterfly Release', type:'transformation · magical', desc:'Tap the glowing cocoon to release butterflies carrying messages into the sky.', file:'butterfly-release.html' },
  { emoji:'🎞️', name:'Film Strip', type:'gallery · nostalgic', desc:'Old 16mm film reel. Swipe through frames, each holding a moment and a feeling.', file:'film-strip.html' },
  { emoji:'🌌', name:'Aurora Sky', type:'atmosphere · wonder', desc:'Northern lights dance across the sky, revealing messages in the shifting colors.', file:'aurora-sky.html' },
  { emoji:'⛄', name:'Snow Globe', type:'reveal · magical', desc:'Shake to swirl snow around a hidden love message inside the globe.', file:'snow-globe.html' },
  { emoji:'🔥', name:'Zippo Lighter', type:'reveal · tactile', desc:'Flip open and strike a Zippo. The flame illuminates a message in the dark.', file:'zippo-lighter.html' },
  { emoji:'🔭', name:'Telescope', type:'discovery · exploration', desc:'Drag a brass telescope across the night sky to find hidden words among the stars.', file:'telescope.html' },
  { emoji:'🕯️', name:'Candle', type:'reveal · atmospheric', desc:'Hold the flame until it extinguishes. The message rises from the smoke.', file:'candle.html' },
  { emoji:'🧭', name:'Compass', type:'interactive · poetic', desc:'Guide the needle home. As it settles, the fog clears to reveal an engraved message.', file:'compass.html' },
  { emoji:'🪞', name:'Pocket Mirror', type:'reveal · intimate', desc:'Open an ornate mirror. Swipe the mercury surface to reveal the hidden message beneath.', file:'pocket-mirror.html' },
];
const grid = document.getElementById('grid');
blocks.forEach(b => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = '<div class="emoji">'+b.emoji+'</div><div class="name">'+b.name+'</div><div class="type">'+b.type+'</div><div class="desc">'+b.desc+'</div>';
  card.onclick = () => window.open('blocks-v2/' + b.file, '_blank');
  grid.appendChild(card);
});
document.getElementById('count').textContent = blocks.length + ' blocks';
</script>
</body>
</html>
